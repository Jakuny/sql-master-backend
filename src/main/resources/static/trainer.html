<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Master - Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alasql@1.7/dist/alasql.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/sql/sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/sql-hint.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .code-font { font-family: 'JetBrains Mono', monospace; }
        
        /* Редактор */
        .CodeMirror { 
            height: 100% !important; 
            border-radius: 0.5rem; 
            font-family: 'JetBrains Mono', monospace; 
            background-color: #1e293b !important; 
            color: #e2e8f0 !important; 
            border: 1px solid #334155; 
            font-size: 14px;
        }
        .CodeMirror-gutters { background-color: #1e293b !important; border-right: 1px solid #334155; }
        
        /* --- ИСПРАВЛЕННЫЕ ПОДСКАЗКИ (Autocomplete) --- */
        .CodeMirror-hints {
            background-color: #1e293b !important; /* Темно-синий фон контейнера */
            border: 1px solid #475569 !important; /* Рамка */
            border-radius: 6px !important;
            padding: 0 !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5) !important;
            font-family: 'JetBrains Mono', monospace !important;
            z-index: 99999 !important;
            overflow: hidden !important; /* Чтобы углы скруглялись */
        }

        /* Элемент списка (неактивный) */
        li.CodeMirror-hint {
            background-color: transparent !important;
            color: #cbd5e1 !important; /* Светло-серый текст */
            padding: 6px 10px !important;
            border-radius: 0 !important;
            font-size: 13px !important;
            transition: background 0.1s ease;
        }

        /* Элемент списка (АКТИВНЫЙ/Выбранный) */
        li.CodeMirror-hint-active {
            background-color: #3b82f6 !important; /* Ярко-синий фон */
            color: #ffffff !important; /* Белый текст */
            font-weight: bold !important;
        }

        /* Анимации */
        .collapsible-wrapper { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease-out; overflow: hidden; }
        .collapsible-wrapper.open { grid-template-rows: 1fr; }
        .collapsible-inner { min-height: 0; overflow: hidden; }

        /* Модальные окна */
        .modal-hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }
        .modal-visible { opacity: 1; pointer-events: auto; transform: scale(1); }
        #success-modal, #cheatsheet-modal { z-index: 9999; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="border-b border-slate-800 bg-slate-900 p-4 flex justify-between items-center shadow-lg z-10">
        <div class="flex items-center gap-4">
            <a href="index.html" class="text-slate-400 hover:text-white transition flex items-center gap-1 text-sm font-semibold">
                <span data-i18n="back_menu">← Меню</span>
            </a>
            <div class="h-6 w-px bg-slate-700"></div>
            <h1 class="text-lg font-bold tracking-tight text-white">SQL <span class="text-blue-500">Trainer</span></h1>
        </div>
        
        <div class="flex items-center gap-3">
            <select id="lang-select" onchange="if(window.changeLanguage) changeLanguage(this.value)" class="bg-slate-800 text-xs font-bold text-slate-300 border border-slate-700 rounded px-2 py-1 focus:outline-none cursor-pointer">
                <option value="ru">Русский</option>
                <option value="en">English</option>
                <option value="es">Español</option>
                <option value="zh">中文</option>
            </select>
            <div class="w-px h-6 bg-slate-700 mx-2"></div>
            <div class="text-sm text-slate-400 bg-slate-800 px-3 py-1 rounded-full border border-slate-700">
                <span id="current-task-num" class="text-blue-400 font-bold">1</span> / <span id="total-tasks">0</span>
            </div>
            <button onclick="resetProgress()" class="text-xs text-red-400 hover:text-red-300 ml-2" data-i18n="btn_reset">Сброс</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        <aside class="w-1/3 min-w-[350px] border-r border-slate-800 bg-slate-900/50 flex flex-col overflow-y-auto">
            <div class="p-6">
                <h2 class="text-lg font-semibold text-blue-400 mb-2" data-i18n="task_title">Задача</h2>
                <div id="task-description" class="text-slate-300 mb-6 leading-relaxed text-sm"></div>
                
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <button onclick="toggleCollapse('hint-wrapper')" class="text-xs font-semibold text-slate-400 hover:text-white bg-slate-800 border border-slate-700 hover:border-slate-500 px-3 py-2 rounded transition flex items-center justify-center gap-2">
                        💡 <span data-i18n="btn_hint">Подсказка</span>
                    </button>
                    <button onclick="toggleModal('cheatsheet-modal', true)" class="text-xs font-semibold text-slate-400 hover:text-white bg-slate-800 border border-slate-700 hover:border-slate-500 px-3 py-2 rounded transition flex items-center justify-center gap-2">
                        📘 <span data-i18n="btn_help">Справка</span>
                    </button>
                </div>
                
                <div id="hint-wrapper" class="collapsible-wrapper mb-2">
                    <div class="collapsible-inner">
                        <div class="p-3 bg-blue-900/20 border border-blue-500/30 rounded text-blue-200 text-xs italic">
                            <span id="hint-text"></span>
                        </div>
                    </div>
                </div>

                <div class="mb-8">
                    <button onclick="toggleCollapse('answer-wrapper')" class="w-full text-xs font-semibold text-slate-500 hover:text-red-400 border border-slate-700 hover:border-red-400 px-3 py-2 rounded transition flex items-center justify-center gap-2">
                        👁️ <span data-i18n="btn_answer">Ответ</span>
                    </button>
                    <div id="answer-wrapper" class="collapsible-wrapper mt-2">
                        <div class="collapsible-inner">
                            <div id="answer-box" class="p-3 bg-slate-800 rounded border border-yellow-600/30 text-yellow-100 text-xs code-font select-all"></div>
                        </div>
                    </div>
                </div>

                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3" data-i18n="sand_struct">Структура БД</h3>
                <div id="schema-container" class="space-y-4 text-sm"></div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-[#0f172a] relative">
            <div class="h-1/2 flex flex-col p-4 pb-0">
                <div class="flex justify-between items-end mb-2">
                    <label class="text-sm font-semibold text-slate-400" data-i18n="lbl_editor">SQL Редактор</label>
                    <div class="flex gap-2">
                        <button id="btn-next-inline" onclick="nextTask()" class="hidden bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded-md text-sm font-bold shadow-lg transition flex items-center gap-2">
                            <span>Дальше →</span>
                        </button>
                        <button id="btn-run" onclick="runQuerySequence()" class="bg-blue-600 hover:bg-blue-500 active:scale-95 text-white px-6 py-2 rounded-md text-sm font-bold shadow-lg transition">
                            ▶ <span data-i18n="btn_run">Выполнить</span>
                        </button>
                    </div>
                </div>
                <div class="flex-1 overflow-hidden rounded-lg shadow-inner">
                    <textarea id="editor" class="w-full h-full"></textarea>
                </div>
            </div>

            <div class="h-1/2 flex flex-col p-4 relative">
                <div class="flex justify-between items-center mb-2">
                    <label class="text-sm font-semibold text-slate-400" data-i18n="lbl_result">Результат</label>
                    <span id="status-msg" class="text-sm font-bold transition-opacity duration-300"></span>
                </div>
                <div class="flex-1 bg-slate-900 rounded-lg border border-slate-800 overflow-auto relative">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="bg-slate-800 sticky top-0 z-10"><tr id="result-head" class="text-slate-300"></tr></thead>
                        <tbody id="result-body" class="divide-y divide-slate-800 text-slate-400 code-font"></tbody>
                    </table>
                    <div id="empty-state" class="absolute inset-0 flex items-center justify-center text-slate-600 select-none">Waiting...</div>
                </div>
            </div>
        </main>
    </div>

    <div id="cheatsheet-modal" class="fixed inset-0 flex items-center justify-center p-4 transition-all duration-300 modal-hidden" style="background-color: rgba(0,0,0,0.7);" onclick="toggleModal('cheatsheet-modal', false)">
        <div class="bg-slate-900 border border-slate-600 w-full max-w-2xl rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]" onclick="event.stopPropagation()">
            <div id="cheatsheet-content-body" class="p-6 overflow-y-auto custom-scrollbar bg-[#0f172a] text-slate-300"></div>
        </div>
    </div>

    <div id="success-modal" class="fixed inset-0 flex items-center justify-center p-4 transition-all duration-300 modal-hidden" style="background-color: rgba(0,0,0,0.8);">
        <div class="bg-slate-800 border border-green-500/30 p-8 rounded-xl shadow-2xl max-w-sm w-full text-center transform transition-all duration-300 scale-95 opacity-0" id="success-content">
            <div class="text-6xl mb-4 animate-bounce">🎉</div>
            <h3 class="text-2xl font-bold text-white mb-2" data-i18n="msg_correct">Верно!</h3>
            <button onclick="nextTask()" class="w-full bg-green-600 hover:bg-green-500 text-white py-3 rounded-lg font-bold transition hover:shadow-lg hover:shadow-green-900/20" data-i18n="btn_next">
                Дальше
            </button>
        </div>
    </div>

    <script src="i18n.js"></script>
    <script src="tasks.js"></script>
    <script src="cheatsheet.js"></script>

    <script>
        let currentTaskIndex = 0;
        let cmEditor;
        const correctSound = new Audio('sounds/correct_sound.mp3');
        correctSound.volume = 0.5;

        // Безопасная функция перевода
        function safeT(key, def) {
            if (typeof window.t === 'function') return window.t(key);
            return def || key;
        }

        window.renderTask = function() {
            if (!window.SQL_TASKS) return;
            const task = window.SQL_TASKS[currentTaskIndex];
            let lang = localStorage.getItem('sql_lang') || 'ru';
            
            let desc = (task.desc && task.desc[lang]) ? task.desc[lang] : (task.desc && task.desc['ru'] ? task.desc['ru'] : "Loading...");
            let hint = (task.hint && task.hint[lang]) ? task.hint[lang] : (task.hint && task.hint['ru'] ? task.hint['ru'] : "");

            document.getElementById('current-task-num').innerText = task.id;
            document.getElementById('total-tasks').innerText = window.SQL_TASKS.length;
            document.getElementById('task-description').innerHTML = desc;
            document.getElementById('hint-text').innerHTML = `☝ ${hint}`;
            document.getElementById('answer-box').innerText = task.checkSql;
            
            document.getElementById('btn-next-inline').classList.add('hidden');
            
            if (cmEditor) {
                if(cmEditor.getValue() === "" || cmEditor.getValue() !== task.default) {
                    cmEditor.setValue(task.default);
                }
                setTimeout(() => cmEditor.refresh(), 50);
            }

            document.getElementById('result-head').innerHTML = '';
            document.getElementById('result-body').innerHTML = '';
            document.getElementById('status-msg').innerText = '';
            document.getElementById('empty-state').classList.remove('hidden');
        };

        function initApp() {
            if (typeof initTranslations === 'function') initTranslations();

            try {
                if (window.INIT_DB_SQL) {
                    alasql('DROP DATABASE IF EXISTS trainer_db');
                    alasql('CREATE DATABASE trainer_db');
                    alasql('USE trainer_db');
                    window.INIT_DB_SQL.forEach(sql => alasql(sql));
                }
            } catch(e) { console.error("DB Error", e); }

            const sheetBody = document.getElementById('cheatsheet-content-body');
            if (sheetBody && window.SQL_CHEATSHEET_HTML) {
                sheetBody.innerHTML = window.SQL_CHEATSHEET_HTML;
            }

            const area = document.getElementById("editor");
            if (area) {
                cmEditor = CodeMirror.fromTextArea(area, {
                    mode: "text/x-sql", theme: "dracula", lineNumbers: true, smartIndent: true,
                    extraKeys: {"Ctrl-Space": "autocomplete"},
                    hintOptions: window.SQL_AUTOCOMPLETE_CONFIG || {}
                });
                cmEditor.on("keyup", (cm, event) => {
                    if (!cm.state.completionActive && event.keyCode >= 65 && event.keyCode <= 90) 
                        CodeMirror.commands.autocomplete(cm, null, {completeSingle: false});
                });
            }

            loadState();
            renderSchema();
            renderTask();
        }

        function loadState() {
            const savedIndex = localStorage.getItem('sql_task_index');
            if (savedIndex) currentTaskIndex = parseInt(savedIndex);
            if (!window.SQL_TASKS || !window.SQL_TASKS[currentTaskIndex]) currentTaskIndex = 0;
        }

        function saveState() { localStorage.setItem('sql_task_index', currentTaskIndex); }
        
        function resetProgress() {
            if(confirm("Сбросить?")) {
                localStorage.removeItem('sql_task_index');
                location.reload();
            }
        }

        function toggleCollapse(id) { document.getElementById(id).classList.toggle('open'); }

        function toggleModal(id, show) {
            const el = document.getElementById(id);
            if(!el) return;
            if (show) { el.classList.remove('modal-hidden'); el.classList.add('modal-visible'); } 
            else { el.classList.remove('modal-visible'); el.classList.add('modal-hidden'); }
        }

        function renderSchema() {
            const container = document.getElementById('schema-container');
            container.innerHTML = '';
            try {
                alasql("SHOW TABLES").forEach(t => {
                    let html = `<div class="font-bold text-slate-300 mb-2 flex items-center gap-2 text-xs uppercase tracking-wide text-blue-400">▤ ${t.tableid}</div><ul class="space-y-1 pl-1">`;
                    alasql(`SHOW COLUMNS FROM ${t.tableid}`).forEach(c => { html += `<li class="flex justify-between text-[11px] font-mono border-b border-slate-700/30 pb-1 last:border-0"><span class="text-slate-300">${c.columnid}</span> <span class="text-slate-600">${c.type || 'INT'}</span></li>`; });
                    const div = document.createElement('div'); div.className = "bg-slate-800/50 rounded-md p-3 border border-slate-700/50 hover:border-slate-600 transition";
                    div.innerHTML = html + "</ul>"; container.appendChild(div);
                });
            } catch(e) {}
        }

        function runQuerySequence() {
            if (!cmEditor) return;
            const userSql = cmEditor.getValue();
            const task = window.SQL_TASKS[currentTaskIndex];
            
            try {
                const userResult = alasql(userSql);
                const expectedResult = alasql(task.checkSql);
                renderTable(userResult);

                if (JSON.stringify(userResult) === JSON.stringify(expectedResult)) {
                    document.getElementById('status-msg').innerHTML = `<span class="text-green-400">${safeT('msg_correct', 'Верно')}</span>`;
                    document.getElementById('btn-next-inline').classList.remove('hidden');
                    try { correctSound.play().catch(()=>{}); } catch(e){}
                    try { confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } }); } catch(e){}
                    toggleModal('success-modal', true);
                } else {
                    document.getElementById('status-msg').innerHTML = `<span class="text-red-400">${safeT('msg_wrong', 'Неверно')}</span>`;
                }
            } catch (e) {
                document.getElementById('status-msg').innerHTML = `<span class="text-red-500">${safeT('status_error', 'Ошибка')}</span>`;
                document.getElementById('result-body').innerHTML = `<tr><td class="p-4 text-red-400 font-mono text-xs bg-red-900/10 border border-red-900/50 rounded">${e.message}</td></tr>`;
                document.getElementById('empty-state').classList.add('hidden');
            }
        }

        function renderTable(data) {
            const head = document.getElementById('result-head');
            const body = document.getElementById('result-body');
            document.getElementById('empty-state').classList.add('hidden');
            head.innerHTML = ''; body.innerHTML = '';

            if (typeof data === 'number' || typeof data === 'string') {
                 body.innerHTML = `<tr><td class="p-4">${data}</td></tr>`; return;
            }
            if (!data || data.length === 0) {
                body.innerHTML = '<tr><td class="p-4 text-slate-500 italic">No Data</td></tr>'; return;
            }

            const keys = Object.keys(data[0]);
            keys.forEach(k => {
                const th = document.createElement('th');
                th.className = "px-4 py-2 bg-slate-800 border-b border-slate-700 text-blue-300 text-xs uppercase tracking-wider";
                th.innerText = k;
                head.appendChild(th);
            });

            data.forEach((row, idx) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-800/50 transition-colors";
                keys.forEach(k => {
                    const td = document.createElement('td');
                    td.className = "px-4 py-2 border-b border-slate-800/50 text-slate-300";
                    td.innerText = row[k];
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
        }

        function nextTask() {
            toggleModal('success-modal', false);
            if (currentTaskIndex < window.SQL_TASKS.length - 1) {
                currentTaskIndex++;
                saveState();
                renderTask();
            } else {
                alert("Курс завершен!");
                currentTaskIndex = 0;
                saveState();
                renderTask();
            }
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
