<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Master - Practice</title>

    <!-- Зависимости -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alasql@1.7/dist/alasql.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/eclipse.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/sql/sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/sql-hint.min.js"></script>

    <!-- Шрифты -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        /* --- ТЕМИЗАЦИЯ --- */
        :root {
            --bg-body: #0f172a;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.4);
            --card-border: rgba(51, 65, 85, 0.5);
            --nav-bg: rgba(15, 23, 42, 0.85);
            --border-color: #334155;
            --bg-editor: #1e293b;
        }

        [data-theme="light"] {
            --bg-body: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #475569;
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-border: rgba(203, 213, 225, 1);
            --nav-bg: rgba(255, 255, 255, 0.9);
            --border-color: #e2e8f0;
            --bg-editor: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s ease;
        }

        /* Утилиты */
        .app-bg { background-color: var(--bg-body); }
        .app-bg-sec { background-color: var(--card-bg); backdrop-filter: blur(12px); }
        .app-bg-ter { background-color: var(--bg-body); }
        .app-border { border-color: var(--border-color); }
        .app-text { color: var(--text-main); }
        .app-text-muted { color: var(--text-muted); }

        /* Логика отображения экранов */
        .view-section {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
            background-color: var(--bg-body);
        }

        .view-hidden {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            z-index: 0;
        }

        .view-active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            z-index: 10;
        }

        /* Анимация карточек */
        @keyframes cardPop {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .task-card-animate { opacity: 0; animation: cardPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        /* Цвета сложности */
        .diff-EASY { color: #4ade80; background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.2); }
        .diff-MEDIUM { color: #facc15; background: rgba(250, 204, 21, 0.1); border: 1px solid rgba(250, 204, 21, 0.2); }
        .diff-HARD { color: #f87171; background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.2); }

        /* CodeMirror */
        .CodeMirror {
            height: 100% !important;
            border-radius: 0;
            border: none;
            font-family: 'JetBrains Mono';
            font-size: 14px;
        }
        /* Темная тема для редактора */
        body:not([data-theme="light"]) .CodeMirror { background-color: #1e293b !important; color: #e2e8f0 !important; }
        body:not([data-theme="light"]) .CodeMirror-gutters { background-color: #1e293b !important; border-right: 1px solid #334155; }

        /* Подсказки */
        .CodeMirror-hints {
            background-color: var(--bg-editor) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-muted) !important;
            z-index: 99999;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
            border-radius: 8px;
        }
        .CodeMirror-hint-active { background-color: #3b82f6 !important; color: white !important; }

        .loader { border: 3px solid rgba(255, 255, 255, 0.1); border-left-color: #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background-color: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; border: 2px solid var(--bg-body); }

        /* SweetAlert */
        .swal2-popup { background: var(--bg-body) !important; border: 1px solid var(--border-color) !important; color: var(--text-main) !important; }
        .swal2-title { color: var(--text-main) !important; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<!-- ПУСТОЙ ХЕДЕР ДЛЯ КОМПОНЕНТА -->
<header id="main-header" class="fixed top-0 w-full bg-theme-nav z-50 transition-colors duration-500 border-b app-border" style="background-color: var(--nav-bg); border-color: var(--border-color);"></header>

<!-- ОСНОВНОЙ КОНТЕЙНЕР -->
<div id="app-container" class="flex-1 relative w-full h-full pt-20 app-bg">

    <!-- 1. МЕНЮ ВЫБОРА ЗАДАЧ -->
    <div id="menu-view" class="view-section view-active overflow-y-auto custom-scrollbar p-6 md:p-10">
        <div class="max-w-7xl mx-auto">
            <div class="mb-12 app-bg-sec border app-border rounded-[2rem] p-8 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-blue-500 to-purple-500"></div>
                <h1 class="text-4xl font-black app-text mb-2 tracking-tight" data-i18n="trainer_header">TRAINING CENTER</h1>
                <p class="app-text-muted font-medium" data-i18n="trainer_desc">Real backend tasks.</p>
            </div>
            <div id="tasks-loader" class="flex justify-center py-10"><div class="loader !w-10 !h-10 !border-4"></div></div>
            <div id="tasks-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-20 hidden"></div>
        </div>
    </div>

    <!-- 2. ИНТЕРФЕЙС ТРЕНАЖЕРА (Скрыт по умолчанию) -->
    <div id="trainer-view" class="view-section view-hidden hidden flex h-full">

        <!-- Левая колонка -->
        <div class="flex-1 flex flex-col min-w-0 border-r app-border">
            <div class="h-1/2 flex flex-col relative">
                <div class="app-bg-sec px-6 py-3 flex justify-between items-center border-b app-border">
                    <span class="text-[10px] font-black app-text-muted uppercase tracking-widest" data-i18n="lbl_editor">SQL Editor</span>
                    <div class="flex items-center gap-3">
                        <div id="query-spinner" class="loader !w-4 !h-4 hidden"></div>
                        <span class="text-[10px] app-text-muted hidden md:inline font-mono">Alt + Enter</span>
                        <button onclick="runQuery()" id="run-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-xl text-xs font-black uppercase tracking-widest shadow-lg shadow-blue-900/20 active:scale-95 transition flex items-center gap-2">
                            <span>▶</span> <span data-i18n="btn_run">RUN</span>
                        </button>
                    </div>
                </div>
                <div class="flex-1 relative overflow-hidden" style="background-color: var(--bg-editor);">
                    <textarea id="editor"></textarea>
                </div>
            </div>

            <div class="h-1/2 flex flex-col app-bg-ter relative">
                <div class="app-bg-sec px-6 py-3 border-b app-border flex justify-between items-center border-t app-border">
                    <span class="text-[10px] font-black app-text-muted uppercase tracking-widest" data-i18n="lbl_result">Output</span>
                    <span id="status-msg" class="text-xs font-bold uppercase tracking-wider ml-2"></span>
                </div>
                <div class="flex-1 overflow-auto custom-scrollbar p-0">
                    <table class="w-full text-left text-sm whitespace-nowrap hidden" id="result-table">
                        <thead class="app-bg-ter sticky top-0"><tr id="result-head" class="text-blue-500 text-[10px] font-black uppercase tracking-widest border-b app-border"></tr></thead>
                        <tbody id="result-body" class="divide-y app-border app-text-muted font-mono text-xs"></tbody>
                    </table>
                    <div id="empty-state" class="h-full flex items-center justify-center app-text-muted text-xs font-black uppercase tracking-widest select-none opacity-50" data-i18n="empty_state">
                        Ready
                    </div>
                </div>
            </div>
        </div>

        <!-- Правая колонка -->
        <aside class="w-96 app-bg-sec border-l app-border flex flex-col overflow-y-auto custom-scrollbar">

            <!-- Верхний блок -->
            <div class="p-8 border-b app-border">
                <button onclick="showMenu()" class="mb-6 flex items-center gap-2 text-[10px] font-black uppercase tracking-widest app-text-muted hover:text-blue-500 transition">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    <span data-i18n="btn_back_to_tasks">Back to Tasks</span>
                </button>

                <div class="flex justify-between items-start mb-4">
                    <span id="task-difficulty-badge" class="px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest border">...</span>
                    <div class="flex items-center gap-1 text-yellow-500 font-bold text-sm bg-yellow-500/10 px-3 py-1 rounded-lg border border-yellow-500/20">
                        <span>+</span><span id="task-xp">0</span><span>XP</span>
                    </div>
                </div>
                <h2 id="task-title" class="text-2xl font-black app-text mb-4 leading-tight">Loading...</h2>
                <div id="task-desc" class="text-sm app-text-muted leading-relaxed font-medium"></div>

                <!-- Кнопки подсказок -->
                <div class="grid grid-cols-2 gap-3 mt-6">
                    <button onclick="toggleCollapse('hint-wrapper')" class="app-bg-ter hover:bg-opacity-80 border app-border hover:border-blue-500/50 app-text-muted px-4 py-3 rounded-xl transition text-xs font-bold flex items-center justify-center gap-2 group">
                        <span class="group-hover:text-yellow-400 transition">💡</span> <span data-i18n="btn_hint">Hint</span>
                    </button>
                    <button onclick="showModal('cheatsheet-modal')" class="app-bg-ter hover:bg-opacity-80 border app-border hover:border-blue-500/50 app-text-muted px-4 py-3 rounded-xl transition text-xs font-bold flex items-center justify-center gap-2 group">
                        <span class="group-hover:text-blue-400 transition">📘</span> <span data-i18n="btn_help">Help</span>
                    </button>
                </div>

                <div id="hint-wrapper" class="collapsible-wrapper mt-2">
                    <div class="collapsible-inner">
                        <div class="p-4 bg-blue-900/10 border border-blue-500/20 rounded-2xl text-blue-300 text-xs italic shadow-inner">
                            <span id="hint-text"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-8 flex-1">
                <h3 class="text-[10px] font-black app-text-muted uppercase tracking-widest mb-4" data-i18n="sand_struct">DATABASE SCHEMA</h3>
                <div id="schema-container" class="space-y-4"></div>
            </div>
        </aside>
    </div>

</div>

<!-- Модалка Успеха -->
<div id="success-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-sm transition-opacity duration-300 opacity-0">
    <div class="app-bg-sec border border-green-500/20 p-10 rounded-[2rem] text-center max-w-sm w-full transform scale-95 transition-transform duration-300 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-green-400 to-emerald-600"></div>
        <div class="text-7xl mb-6 animate-bounce">🎉</div>
        <h3 class="text-3xl font-black app-text mb-1 uppercase tracking-tight" data-i18n="msg_correct">SOLVED!</h3>
        <p class="app-text-muted text-sm mb-8 font-medium" id="success-msg">Task completed</p>
        <button onclick="showMenu()" class="w-full bg-slate-700 hover:bg-slate-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-xs transition active:scale-95" data-i18n="btn_back_to_tasks">
            Back to Tasks
        </button>
    </div>
</div>

<!-- Модалка Справки -->
<div id="cheatsheet-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-sm transition-opacity duration-300 opacity-0">
    <div class="app-bg-sec border app-border w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[85vh] transform scale-95 transition-transform duration-300" onclick="event.stopPropagation()">
        <div id="cheatsheet-content-body" class="p-8 overflow-y-auto custom-scrollbar app-bg app-text-muted"></div>
    </div>
</div>

<!-- СКРИПТЫ -->
<script type="module">
    import { fetchWithAuth, logout } from '/js/api.js';
    import { renderHeader } from '/js/components/header.js';
    import { SQL_CHEATSHEET_HTML, SQL_AUTOCOMPLETE_CONFIG } from '/js/cheatsheet.js';

    window.logout = logout;
    const correctSound = new Audio('/sounds/correct_sound.mp3');
    correctSound.volume = 0.5;

    let cmEditor;
    let currentTaskId = null;
    let cachedTasks = [];
    let currentTaskData = null;
    let isCooldown = false;

    // --- ГЛОБАЛЬНЫЕ ФУНКЦИИ ---
    window.toggleTheme = function() {
        const body = document.body;
        const newTheme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        body.setAttribute('data-theme', newTheme);
        localStorage.setItem('sql_theme', newTheme);
        updateThemeIcons(newTheme);
        if (cmEditor) cmEditor.setOption("theme", newTheme === 'light' ? 'eclipse' : 'dracula');
    }
    function updateThemeIcons(theme) {
        const sun = document.getElementById('icon-sun');
        const moon = document.getElementById('icon-moon');
        if(sun && moon) {
            if (theme === 'light') { sun.classList.remove('hidden'); moon.classList.add('hidden'); }
            else { sun.classList.add('hidden'); moon.classList.remove('hidden'); }
        }
    }

    window.toggleLangMenu = () => document.getElementById('lang-menu').classList.toggle('open');
    window.handleLangChange = (lang, label) => {
        document.getElementById('lang-menu').classList.remove('open');
        if (window.changeLanguage) window.changeLanguage(lang);
        document.getElementById('current-lang-label').innerText = label;
    };

    window.confirmLogout = async function() {
        if (typeof Swal !== 'undefined') {
            // Пытаемся получить переводы, если их нет - фоллбек
            const t = window.t || ((k)=>k);
            const result = await Swal.fire({
                title: t('confirm_logout_title') || 'Are you sure?',
                text: t('confirm_logout_text') || 'Logout?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: t('confirm_logout_yes') || 'Yes',
                cancelButtonText: t('confirm_logout_no') || 'No',
                reverseButtons: true
            });
            if (result.isConfirmed) logout();
        } else logout();
    };

    window.toggleCollapse = (id) => document.getElementById(id).classList.toggle('open');

    window.showModal = (id) => {
        const el = document.getElementById(id);
        el.classList.remove('hidden');
        setTimeout(() => {
            el.classList.remove('opacity-0');
            el.querySelector('div').classList.remove('scale-95');
            el.querySelector('div').classList.add('scale-100');
        }, 10);
    };

    window.closeModal = (id) => {
        const el = document.getElementById(id);
        el.classList.add('opacity-0');
        el.querySelector('div').classList.remove('scale-100');
        el.querySelector('div').classList.add('scale-95');
        setTimeout(() => el.classList.add('hidden'), 300);
    };

    document.querySelectorAll('[id$="-modal"]').forEach(modal => {
        modal.addEventListener('click', (e) => {
            if(e.target === modal) window.closeModal(modal.id);
        });
    });

    // --- ИНИЦИАЛИЗАЦИЯ ---
    async function initApp() {
        if (window.initTranslations) window.initTranslations();

        const savedTheme = localStorage.getItem('sql_theme') || 'dark';
        document.body.setAttribute('data-theme', savedTheme);

        const token = localStorage.getItem('sql_token');
        let authData = { isLoggedIn: false };
        if(token) {
            try {
                const res = await fetchWithAuth('/api/v1/profiles/me');
                if(res.ok) authData = { isLoggedIn: true, ...(await res.json()) };
            } catch(e) {}
        }
        renderHeader(authData);
        updateThemeIcons(savedTheme);

        await loadTaskList();

        const theme = savedTheme === 'light' ? 'eclipse' : 'dracula';
        cmEditor = CodeMirror.fromTextArea(document.getElementById("editor"), {
            mode: "text/x-sql", theme: theme, lineNumbers: true, smartIndent: true,
            extraKeys: {"Alt-Enter": runQuery},
            hintOptions: SQL_AUTOCOMPLETE_CONFIG
        });
        cmEditor.on("keyup", (cm, event) => {
            if (!cm.state.completionActive && event.keyCode >= 65 && event.keyCode <= 90)
                CodeMirror.commands.autocomplete(cm, null, {completeSingle: false});
        });

        document.getElementById('cheatsheet-content-body').innerHTML = SQL_CHEATSHEET_HTML;
    }

    // --- ЛОГИКА ЗАДАЧ ---
    async function loadTaskList() {
        const grid = document.getElementById('tasks-grid');
        const loader = document.getElementById('tasks-loader');
        try {
            const response = await fetchWithAuth('/api/v1/tasks');
            if (!response.ok) throw new Error("Failed");
            cachedTasks = await response.json();
            renderMenu(cachedTasks);
            loader.classList.add('hidden');
            grid.classList.remove('hidden');
        } catch (e) {
            console.error(e);
            grid.innerHTML = `<div class="text-red-500 text-center col-span-full mt-10">Connection Error. Is backend running?</div>`;
            loader.classList.add('hidden');
            grid.classList.remove('hidden');
        }
    }

    function renderMenu(tasks) {
        const grid = document.getElementById('tasks-grid');
        grid.innerHTML = '';
        tasks.forEach((task, index) => {
            let diffClass = `diff-${task.difficulty}`;
            const card = document.createElement('div');
            card.className = "task-card-animate app-bg-sec border app-border rounded-[2rem] p-8 cursor-pointer transition-all duration-300 relative overflow-hidden group hover:border-blue-500/50 hover:-translate-y-2 hover:shadow-xl";
            card.style.animationDelay = `${index * 100}ms`;
            card.onclick = () => openTask(task.id);
            card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <span class="${diffClass} text-[10px] font-black px-3 py-1.5 rounded-lg uppercase tracking-widest border shadow-sm">${task.difficulty}</span>
                        <div class="flex items-center gap-1.5 bg-yellow-500/10 px-3 py-1 rounded-lg border border-yellow-500/20 text-yellow-500 font-bold text-xs"><span>+${task.xpReward}</span> XP</div>
                    </div>
                    <h3 class="text-2xl font-bold app-text mb-3 group-hover:text-blue-500 transition-colors leading-tight">${task.title}</h3>
                `;
            grid.appendChild(card);
        });
    }

    window.openTask = async function(id) {
        currentTaskId = id;

        // Скрытие меню и показ тренажера
        const menuView = document.getElementById('menu-view');
        const trainerView = document.getElementById('trainer-view');

        menuView.classList.remove('view-active');
        menuView.classList.add('view-hidden');

        trainerView.classList.remove('hidden');
        setTimeout(() => {
            trainerView.classList.remove('view-hidden');
            trainerView.classList.add('view-active');
        }, 50);

        document.getElementById('task-title').innerText = "Loading...";

        try {
            const lang = localStorage.getItem('sql_lang') || 'en';
            const response = await fetchWithAuth(`/api/v1/tasks/${id}?lang=${lang}`);
            if(!response.ok) throw new Error("Task not found");
            const task = await response.json();
            currentTaskData = task;

            document.getElementById('task-title').innerText = task.title;
            document.getElementById('task-desc').innerHTML = task.description;
            document.getElementById('task-xp').innerText = task.xpReward;
            document.getElementById('task-difficulty-badge').innerText = task.difficulty;
            document.getElementById('task-difficulty-badge').className = `px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest border diff-${task.difficulty}`;

            alasql('DROP DATABASE IF EXISTS task_db'); alasql('CREATE DATABASE task_db'); alasql('USE task_db');
            if (task.initScript) {
                const statements = task.initScript.split(';').filter(s => s.trim().length > 0);
                statements.forEach(sql => alasql(sql));
            }
            renderSchema();
            cmEditor.setValue("SELECT * FROM ..."); setTimeout(() => cmEditor.refresh(), 100);
        } catch(e) { console.error(e); window.showMenu(); }

        document.getElementById('empty-state').classList.remove('hidden');
        document.getElementById('result-table').classList.add('hidden');
        document.getElementById('status-msg').innerHTML = '';
    };

    window.showMenu = function() {
        const menuView = document.getElementById('menu-view');
        const trainerView = document.getElementById('trainer-view');

        trainerView.classList.remove('view-active');
        trainerView.classList.add('view-hidden');

        setTimeout(() => {
            trainerView.classList.add('hidden');
            menuView.classList.remove('view-hidden');
            menuView.classList.add('view-active');
            loadTaskList();
        }, 400);

        window.closeModal('success-modal');
    };

    window.runQuery = async function() {
        if (isCooldown) return;
        isCooldown = true;
        const sql = cmEditor.getValue();
        const status = document.getElementById('status-msg');
        const runBtn = document.getElementById('run-btn');
        const spinner = document.getElementById('query-spinner');
        const tbody = document.getElementById('result-body');
        const thead = document.getElementById('result-head');

        document.getElementById('empty-state').classList.add('hidden');
        document.getElementById('result-table').classList.remove('hidden');

        try {
            const localRes = alasql(sql);
            thead.innerHTML = ''; tbody.innerHTML = '';
            if(Array.isArray(localRes) && localRes.length > 0) {
                Object.keys(localRes[0]).forEach(k => {
                    const th = document.createElement('th'); th.className="px-4 py-3 border-b border-theme text-blue-500 text-[10px] font-black uppercase tracking-widest"; th.innerText=k; thead.appendChild(th);
                });
                localRes.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-800/30 transition-colors";
                    Object.values(row).forEach(v => {
                        const td = document.createElement('td'); td.className="px-4 py-2 app-text-muted border-b border-theme text-xs"; td.innerText=v; tr.appendChild(td);
                    });
                    tbody.appendChild(tr);
                });
            } else if(typeof localRes === 'object') {
                tbody.innerHTML = `<tr><td class="p-4 app-text-muted">${JSON.stringify(localRes)}</td></tr>`;
            }
        } catch (e) {
            status.innerHTML = `<span class="text-red-500">SYNTAX ERROR</span>`;
            tbody.innerHTML = `<tr><td class="p-4 text-red-500 text-xs font-mono">${e.message}</td></tr>`;
            resetCooldown(); return;
        }

        spinner.classList.remove('hidden');
        runBtn.classList.add('opacity-50');

        try {
            const serverRes = await fetchWithAuth(`/api/v1/tasks/${currentTaskId}`, {
                method: 'POST', body: sql, headers: { 'Content-Type': 'text/plain' }
            });
            const resultText = await serverRes.text();

            if (resultText.includes("result:true")) {
                status.innerHTML = '<span class="text-green-500">PASSED</span>';
                try { correctSound.currentTime = 0; correctSound.play().catch(()=>{}); } catch(e){}
                try { confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } }); } catch(e){}

                const t = window.t || ((k)=>k);
                let msg = resultText.includes("added") ? t('msg_correct_xp').replace('{xp}', currentTaskData.xpReward) : t('msg_correct_already');
                document.getElementById('success-msg').innerText = msg;
                window.showModal('success-modal');
            } else {
                status.innerHTML = '<span class="text-red-500">FAILED</span>';
            }
        } catch (e) { status.innerHTML = '<span class="text-red-500">SERVER ERROR</span>'; }
        finally {
            setTimeout(resetCooldown, 2000);
        }
    };

    function resetCooldown() {
        isCooldown = false;
        document.getElementById('query-spinner').classList.add('hidden');
        document.getElementById('run-btn').classList.remove('opacity-50');
    }

    function renderSchema() {
        const container = document.getElementById('schema-container');
        container.innerHTML = '';
        try {
            alasql("SHOW TABLES").forEach(t => {
                const div = document.createElement('div');
                div.className = "app-bg-ter rounded-xl p-4 border app-border mb-3";
                let html = `<div class="font-black text-blue-500 mb-3 flex items-center gap-2 text-[10px] uppercase tracking-widest">▤ ${t.tableid}</div><ul class="space-y-1.5 pl-1">`;
                alasql(`SHOW COLUMNS FROM ${t.tableid}`).forEach(c => { html += `<li class="flex justify-between text-[10px] font-mono border-b border-gray-700/20 pb-1 last:border-0"><span class="app-text font-bold">${c.columnid}</span> <span class="app-text-muted font-bold">${c.type || 'INT'}</span></li>`; });
                div.innerHTML = html + "</ul>"; container.appendChild(div);
            });
        } catch(e) {}
    }

    document.addEventListener('DOMContentLoaded', initApp);
</script>
<script src="/js/i18n.js"></script>
</body>
</html>
