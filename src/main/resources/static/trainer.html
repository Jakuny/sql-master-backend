<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Master - Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/alasql@1.7/dist/alasql.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/eclipse.min.css"> <!-- Light Theme -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/sql/sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/sql-hint.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        /* --- THEMING --- */
        :root {
            --bg-main: #0f172a;
            --bg-sec: #1e293b;
            --bg-ter: #0a0f1d;
            --border: #334155;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
        }

        [data-theme="light"] {
            --bg-main: #f8fafc;
            --bg-sec: #ffffff;
            --bg-ter: #f1f5f9;
            --border: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #2563eb;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .code-font { font-family: 'JetBrains Mono', monospace; }

        /* Utils */
        .app-bg { background-color: var(--bg-main); }
        .app-bg-sec { background-color: var(--bg-sec); }
        .app-bg-ter { background-color: var(--bg-ter); }
        .app-border { border-color: var(--border); }
        .app-text { color: var(--text-main); }
        .app-text-muted { color: var(--text-muted); }

        /* Animations */
        .view-section { transition: opacity 0.4s ease; opacity: 1; z-index: 10; width: 100%; height: 100%; }
        .view-hidden { opacity: 0; pointer-events: none; position: absolute; inset: 0; z-index: -1; }

        @keyframes cardPop {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .task-card-animate { opacity: 0; animation: cardPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        /* CodeMirror Customization */
        .CodeMirror { height: 100% !important; border: none; font-family: 'JetBrains Mono'; font-size: 14px; }
        /* Dark Mode CM overrides */
        body:not([data-theme="light"]) .CodeMirror { background-color: #1e293b !important; color: #e2e8f0 !important; }
        body:not([data-theme="light"]) .CodeMirror-gutters { background-color: #1e293b !important; border-right: 1px solid #334155; }
        /* Light Mode CM overrides handled by theme 'eclipse' */

        .CodeMirror-hints { z-index: 99999; }

        .logo-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .loader { border: 3px solid rgba(255, 255, 255, 0.1); border-left-color: var(--accent); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<!-- HEADER -->
<header class="app-bg-sec app-border border-b p-4 flex justify-between items-center shadow-lg z-50">
    <div class="flex items-center gap-6">
        <a href="/" class="font-bold text-xl tracking-tight flex items-center gap-3 select-none group app-text">
            <div class="bg-blue-600 px-3 py-1 rounded-lg logo-glow tracking-wide text-white group-hover:scale-105 transition-transform duration-300">SQL</div>
            <span class="group-hover:text-blue-500 transition-colors hidden sm:block">Master</span>
        </a>

        <button id="back-to-menu-btn" onclick="showMenu()" class="hidden flex items-center gap-2 text-[10px] font-black uppercase tracking-widest app-text-muted hover:text-blue-500 app-bg-sec border app-border px-4 py-2 rounded-lg transition hover:border-blue-500">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            <span data-i18n="btn_back">Back</span>
        </button>
    </div>

    <div class="flex items-center gap-4">
        <!-- Theme Toggle -->
        <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-white/5 transition app-text-muted hover:text-blue-500">
            <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            <svg id="icon-moon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>

        <div id="user-profile-block" class="flex items-center gap-4">
            <div class="loader"></div>
        </div>
    </div>
</header>

<!-- MAIN CONTAINER -->
<div class="flex-1 relative overflow-hidden app-bg">

    <!-- 1. TASK SELECTION MENU -->
    <div id="menu-view" class="view-section absolute inset-0 overflow-y-auto custom-scrollbar p-6 md:p-10 z-20">
        <div class="max-w-7xl mx-auto relative z-10">

            <div class="mb-12 app-bg-sec border app-border rounded-[2rem] p-8 flex flex-col md:flex-row items-center justify-between shadow-2xl relative overflow-hidden group">
                <div class="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-blue-500 to-purple-500"></div>
                <div class="mb-6 md:mb-0 text-center md:text-left relative z-10">
                    <h1 class="text-4xl font-black app-text mb-2 tracking-tight" data-i18n="trainer_header">TRAINING CENTER</h1>
                    <p class="app-text-muted font-medium" data-i18n="trainer_desc">Real backend tasks.</p>
                </div>
            </div>

            <div id="tasks-loader" class="flex justify-center py-10"><div class="loader"></div></div>
            <div id="tasks-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-20 hidden"></div>
        </div>
    </div>

    <!-- 2. TRAINER INTERFACE -->
    <div id="trainer-view" class="view-section view-hidden absolute inset-0 flex h-full z-30 app-bg">

        <!-- Left Column: Editor & Result -->
        <div class="flex-1 flex flex-col min-w-0 border-r app-border">
            <!-- Editor -->
            <div class="h-1/2 flex flex-col relative">
                <div class="app-bg-sec px-6 py-3 flex justify-between items-center border-b app-border">
                    <span class="text-[10px] font-black app-text-muted uppercase tracking-widest" data-i18n="lbl_editor">SQL EDITOR</span>
                    <div class="flex items-center gap-3">
                        <div id="query-spinner" class="loader !w-4 !h-4 hidden"></div>
                        <span class="text-[10px] text-slate-500 hidden md:inline font-mono">Alt + Enter</span>
                        <button onclick="runQuery()" id="run-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-xl text-xs font-black uppercase tracking-widest shadow-lg shadow-blue-900/20 active:scale-95 transition flex items-center gap-2">
                            <span>▶</span> <span data-i18n="btn_run">RUN</span>
                        </button>
                    </div>
                </div>
                <div class="flex-1 relative overflow-hidden">
                    <textarea id="editor"></textarea>
                </div>
            </div>

            <!-- Result -->
            <div class="h-1/2 flex flex-col app-bg-ter relative">
                <div class="app-bg-sec px-6 py-3 border-b app-border flex justify-between items-center border-t app-border">
                    <span class="text-[10px] font-black app-text-muted uppercase tracking-widest" data-i18n="lbl_result">OUTPUT</span>
                    <span id="status-msg" class="text-xs font-bold uppercase tracking-wider ml-2"></span>
                </div>
                <div class="flex-1 overflow-auto custom-scrollbar p-0">
                    <table class="w-full text-left text-sm whitespace-nowrap hidden" id="result-table">
                        <thead class="app-bg-ter sticky top-0"><tr id="result-head" class="text-blue-500 text-[10px] font-black uppercase tracking-widest border-b app-border"></tr></thead>
                        <tbody id="result-body" class="divide-y divide-slate-700/20 app-text-muted font-mono text-xs"></tbody>
                    </table>
                    <div id="empty-state" class="h-full flex items-center justify-center app-text-muted text-xs font-black uppercase tracking-widest select-none opacity-50" data-i18n="empty_state">
                        Ready to run
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: Task Info -->
        <aside class="w-96 app-bg-sec border-l app-border flex flex-col overflow-y-auto custom-scrollbar">
            <div class="p-8 border-b app-border">
                <div class="flex justify-between items-start mb-4">
                    <span id="task-difficulty-badge" class="px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest border">...</span>
                    <div class="flex items-center gap-1 text-yellow-500 font-bold text-sm bg-yellow-500/10 px-3 py-1 rounded-lg border border-yellow-500/20">
                        <span>+</span><span id="task-xp">0</span><span>XP</span>
                    </div>
                </div>
                <h2 id="task-title" class="text-2xl font-black app-text mb-4 leading-tight">Loading...</h2>
                <div id="task-desc" class="text-sm app-text-muted leading-relaxed font-medium"></div>
            </div>

            <div class="p-8 flex-1">
                <h3 class="text-[10px] font-black app-text-muted uppercase tracking-widest mb-4" data-i18n="sand_struct">DATABASE SCHEMA</h3>
                <div id="schema-container" class="space-y-4"></div>
            </div>
        </aside>
    </div>

</div>

<!-- Success Modal -->
<div id="success-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-sm transition-opacity duration-300 opacity-0">
    <div class="app-bg-sec border border-green-500/20 p-10 rounded-[2rem] text-center max-w-sm w-full transform scale-95 transition-transform duration-300 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-green-400 to-emerald-600"></div>
        <div class="text-7xl mb-6 animate-bounce">🎉</div>
        <h3 class="text-3xl font-black app-text mb-1 uppercase tracking-tight" data-i18n="msg_correct">SOLVED!</h3>
        <p class="app-text-muted text-sm mb-8 font-medium" id="success-msg">Task completed</p>
        <button onclick="showMenu()" class="w-full bg-slate-700 hover:bg-slate-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-xs transition active:scale-95" data-i18n="btn_back_to_tasks">
            Back to Tasks
        </button>
    </div>
</div>

<script type="module">
    import { fetchWithAuth, logout } from '/js/api.js';
    window.logout = logout;
    const correctSound = new Audio('/sounds/correct_sound.mp3');
    correctSound.volume = 0.5;

    let cmEditor;
    let currentTaskId = null;
    let cachedTasks = [];
    let currentTaskData = null;
    let isCooldown = false;

    // --- THEME LOGIC ---
    window.toggleTheme = function() {
        const body = document.body;
        const currentTheme = body.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        body.setAttribute('data-theme', newTheme);
        localStorage.setItem('sql_theme', newTheme);

        document.getElementById('icon-sun').classList.toggle('hidden');
        document.getElementById('icon-moon').classList.toggle('hidden');

        // Update CodeMirror Theme
        if (cmEditor) {
            cmEditor.setOption("theme", newTheme === 'light' ? 'eclipse' : 'dracula');
        }
    }

    const savedTheme = localStorage.getItem('sql_theme') || 'dark';
    document.body.setAttribute('data-theme', savedTheme);
    if(savedTheme === 'light') {
        document.getElementById('icon-sun').classList.remove('hidden');
        document.getElementById('icon-moon').classList.add('hidden');
    }

    // --- INITIALIZATION ---
    async function initApp() {
        if (window.initTranslations) window.initTranslations();
        await loadUserProfile();
        await loadTaskList();

        const theme = localStorage.getItem('sql_theme') === 'light' ? 'eclipse' : 'dracula';

        cmEditor = CodeMirror.fromTextArea(document.getElementById("editor"), {
            mode: "text/x-sql", theme: theme, lineNumbers: true, smartIndent: true,
            indentWithTabs: true
        });

        // HOTKEY: Alt + Enter
        document.addEventListener('keydown', (e) => {
            if (e.altKey && e.key === 'Enter') {
                e.preventDefault();
                if (!document.getElementById('trainer-view').classList.contains('view-hidden')) {
                    runQuery();
                }
            }
        });
    }

    // --- TASK LIST ---
    async function loadTaskList() {
        const grid = document.getElementById('tasks-grid');
        const loader = document.getElementById('tasks-loader');
        try {
            const response = await fetchWithAuth('/api/v1/tasks');
            if (!response.ok) throw new Error("Failed");
            cachedTasks = await response.json();
            renderMenu(cachedTasks);
            loader.classList.add('hidden');
            grid.classList.remove('hidden');
        } catch (e) {
            console.error(e);
            grid.innerHTML = `<div class="text-red-500 text-center col-span-3">Error loading tasks</div>`;
        }
    }

    function renderMenu(tasks) {
        const grid = document.getElementById('tasks-grid');
        grid.innerHTML = '';
        tasks.forEach((task, index) => {
            let diffColor = task.difficulty === 'EASY' ? 'text-green-500 border-green-500/30 bg-green-500/10' :
                task.difficulty === 'MEDIUM' ? 'text-yellow-500 border-yellow-500/30 bg-yellow-500/10' :
                    'text-red-500 border-red-500/30 bg-red-500/10';

            const card = document.createElement('div');
            card.className = "task-card-animate app-bg-sec app-border border rounded-3xl p-8 cursor-pointer transition-all duration-300 relative overflow-hidden group hover:border-blue-500/50 hover:-translate-y-2 hover:shadow-xl";
            card.style.animationDelay = `${index * 100}ms`;
            card.onclick = () => openTask(task.id);
            card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <span class="${diffColor} text-[10px] font-black px-3 py-1.5 rounded-lg uppercase tracking-widest border shadow-sm">${task.difficulty}</span>
                        <div class="flex items-center gap-1.5 bg-yellow-500/10 px-3 py-1 rounded-lg border border-yellow-500/20 text-yellow-500 font-bold text-xs"><span>+${task.xpReward}</span> XP</div>
                    </div>
                    <h3 class="text-2xl font-bold app-text mb-3 group-hover:text-blue-500 transition-colors leading-tight">${task.title}</h3>
                    <div class="absolute bottom-0 right-0 p-6 opacity-0 group-hover:opacity-100 transition-all duration-500 transform translate-y-4 group-hover:translate-y-0">
                        <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-blue-500/40 hover:scale-110 transition">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </div>
                    </div>
                `;
            grid.appendChild(card);
        });
    }

    // --- OPEN TASK ---
    window.openTask = async function(id) {
        currentTaskId = id;
        document.getElementById('menu-view').classList.add('view-hidden');
        document.getElementById('trainer-view').classList.remove('view-hidden');
        document.getElementById('back-to-menu-btn').classList.remove('hidden');
        document.getElementById('task-title').innerText = "Loading...";

        try {
            const lang = localStorage.getItem('sql_lang') || 'en';
            const response = await fetchWithAuth(`/api/v1/tasks/${id}?lang=${lang}`);
            if(!response.ok) throw new Error("Task not found");
            const task = await response.json();
            currentTaskData = task;

            document.getElementById('task-title').innerText = task.title;
            document.getElementById('task-desc').innerHTML = task.description;
            document.getElementById('task-xp').innerText = task.xpReward;
            document.getElementById('task-difficulty-badge').innerText = task.difficulty;

            alasql('DROP DATABASE IF EXISTS task_db'); alasql('CREATE DATABASE task_db'); alasql('USE task_db');
            if (task.initScript) task.initScript.split(';').filter(s=>s.trim()).forEach(sql => alasql(sql));
            renderSchema();
            cmEditor.setValue("SELECT * FROM ..."); setTimeout(() => cmEditor.refresh(), 100);
        } catch(e) { console.error(e); showMenu(); }

        document.getElementById('empty-msg').classList.remove('hidden');
        document.getElementById('result-table').classList.add('hidden');
        document.getElementById('status-msg').innerHTML = '';
    };

    window.showMenu = function() {
        document.getElementById('trainer-view').classList.add('view-hidden');
        document.getElementById('menu-view').classList.remove('view-hidden');
        document.getElementById('back-to-menu-btn').classList.add('hidden');
        document.getElementById('success-modal').classList.add('hidden');
    };

    // --- RUN QUERY (With Cooldown) ---
    window.runQuery = async function() {
        if (isCooldown) return;

        const sql = cmEditor.getValue();
        const status = document.getElementById('status-msg');
        const runBtn = document.getElementById('run-btn');
        const spinner = document.getElementById('query-spinner');

        // Start Cooldown
        isCooldown = true;
        runBtn.classList.add('opacity-50', 'cursor-not-allowed');

        // Local Check
        try {
            const localRes = alasql(sql);
            renderTable(localRes);
        } catch (e) {
            status.innerHTML = '<span class="text-red-500">SYNTAX ERROR</span>';
            document.getElementById('result-body').innerHTML = `<tr><td class="p-4 text-red-500 text-xs font-mono">${e.message}</td></tr>`;
            resetCooldown();
            return;
        }

        // Server Check
        spinner.classList.remove('hidden');
        try {
            const serverRes = await fetchWithAuth(`/api/v1/tasks/${currentTaskId}`, {
                method: 'POST', body: sql, headers: { 'Content-Type': 'text/plain' }
            });
            const resultText = await serverRes.text();

            if (resultText.includes("result:true")) {
                status.innerHTML = '<span class="text-green-500">PASSED</span>';
                try { correctSound.currentTime = 0; correctSound.play().catch(()=>{}); } catch(e){}
                try { confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } }); } catch(e){}
                const modal = document.getElementById('success-modal');

                const t = window.t || ((k)=>k);
                let msg = resultText.includes("added") ? t('msg_correct_xp').replace('{xp}', currentTaskData.xpReward) : t('msg_correct_already');
                document.getElementById('success-msg').innerText = msg;

                modal.classList.remove('hidden');
                setTimeout(() => { modal.classList.remove('opacity-0'); }, 10);
            } else {
                status.innerHTML = '<span class="text-red-500">FAILED</span>';
            }
        } catch (e) {
            status.innerHTML = '<span class="text-red-500">SERVER ERROR</span>';
        } finally {
            spinner.classList.add('hidden');
            setTimeout(resetCooldown, 2000); // 2 seconds cooldown
        }
    };

    function resetCooldown() {
        isCooldown = false;
        const runBtn = document.getElementById('run-btn');
        runBtn.classList.remove('opacity-50', 'cursor-not-allowed');
    }

    function renderTable(data) {
        const tbody = document.getElementById('result-body');
        const thead = document.getElementById('result-head');
        document.getElementById('empty-state').classList.add('hidden');
        document.getElementById('result-table').classList.remove('hidden');
        tbody.innerHTML = ''; thead.innerHTML = '';

        if(Array.isArray(data) && data.length > 0) {
            Object.keys(data[0]).forEach(k => {
                const th = document.createElement('th'); th.className="px-4 py-3 app-border border-b text-blue-500 text-[10px] font-black uppercase tracking-widest"; th.innerText=k; thead.appendChild(th);
            });
            data.forEach(row => {
                const tr = document.createElement('tr');
                Object.values(row).forEach(v => {
                    const td = document.createElement('td'); td.className="px-4 py-2 app-text-muted border-b app-border text-xs"; td.innerText=v; tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        } else if(typeof data === 'object') {
            tbody.innerHTML = `<tr><td class="p-4 app-text-muted">${JSON.stringify(data)}</td></tr>`;
        }
    }

    function renderSchema() {
        const container = document.getElementById('schema-container');
        container.innerHTML = '';
        try {
            alasql("SHOW TABLES").forEach(t => {
                const div = document.createElement('div');
                div.className = "app-bg-sec rounded-xl p-4 border app-border mb-3";
                let html = `<div class="font-black text-blue-500 mb-3 flex items-center gap-2 text-[10px] uppercase tracking-widest">▤ ${t.tableid}</div><ul class="space-y-1.5 pl-1">`;
                alasql(`SHOW COLUMNS FROM ${t.tableid}`).forEach(c => { html += `<li class="flex justify-between text-[10px] font-mono border-b border-gray-700/20 pb-1 last:border-0"><span class="app-text font-bold">${c.columnid}</span> <span class="app-text-muted font-bold">${c.type || 'INT'}</span></li>`; });
                div.innerHTML = html + "</ul>"; container.appendChild(div);
            });
        } catch(e) {}
    }

    async function loadUserProfile() {
        const container = document.getElementById('user-profile-block');
        try {
            const response = await fetchWithAuth('/api/v1/profiles/me');
            if (response.ok) {
                const user = await response.json();
                let avatarHtml = user.username.charAt(0);
                if (user.avatarUrl) avatarHtml = `<img src="${user.avatarUrl}" class="w-full h-full object-cover">`;
                container.innerHTML = `
                        <a href="/profile/me" class="flex items-center gap-3 group">
                            <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-xs font-black text-white border border-white/10 shadow-lg overflow-hidden group-hover:scale-105 transition duration-300">${avatarHtml}</div>
                            <div class="hidden sm:flex flex-col"><span class="text-xs font-black app-text uppercase tracking-wider leading-none">${user.username}</span><span class="text-[9px] text-blue-500 font-bold uppercase tracking-tighter">LVL ${user.lvl}</span></div>
                        </a>
                        <button onclick="logout()" class="app-text-muted hover:text-red-500 transition p-2 app-bg-sec rounded-lg ml-2 border app-border"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 01-3-3V7a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg></button>
                    `;
            } else {
                container.innerHTML = `<a href="/login.html" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-black uppercase tracking-widest px-5 py-2.5 rounded-xl transition shadow-lg shadow-blue-900/20">Login</a>`;
            }
        } catch (e) { console.error(e); }
    }

    document.addEventListener('DOMContentLoaded', initApp);
</script>
