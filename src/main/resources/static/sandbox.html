<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Master - Песочница</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alasql@1.7/dist/alasql.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/eclipse.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/sql/sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/sql-hint.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">

    <style>
        svg { transition: all 0.3s ease; }

        .tool-btn {
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            width: 100%; padding: 0.75rem 1rem; border-radius: 0.75rem;
            font-size: 0.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em;
            transition: all 0.2s ease; border: 1px solid transparent;
        }

        @keyframes fadeInRow { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-row { animation: fadeInRow 0.2s ease-out forwards; opacity: 0; }

        #mermaid-chart {
            background-color: var(--bg-body);
            background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
            background-size: 15px 15px;
        }

        .CodeMirror { height: 100% !important; border: none; font-family: 'JetBrains Mono'; font-size: 14px; background: transparent !important; }
        body:not([data-theme="light"]) .CodeMirror { color: #e2e8f0 !important; }
        body:not([data-theme="light"]) .CodeMirror-gutters { background-color: transparent !important; border-right: 1px solid var(--border-color); }

        .CodeMirror-hints { background-color: var(--card-bg) !important; border: 1px solid var(--border-color) !important; border-radius: 12px !important; box-shadow: 0 20px 40px rgba(0,0,0,0.5) !important; padding: 8px !important; font-family: 'JetBrains Mono' !important; z-index: 99999; backdrop-filter: blur(20px); }
        .CodeMirror-hint { color: var(--text-muted) !important; padding: 6px 12px !important; border-radius: 6px !important; transition: all 0.1s; }
        .CodeMirror-hint-active { background-color: #3b82f6 !important; color: white !important; font-weight: bold; }

        /* JOIN Visualizer */
        .join-viz-container { position: relative; width: 100%; display: flex; flex-direction: column; gap: 1rem; padding: 1rem 0; }
        .join-viz-tables-row { display: flex; justify-content: space-between; position: relative; z-index: 2; }
        .viz-table { background-color: var(--bg-editor); border: 1px solid var(--border-color); border-radius: 0.5rem; overflow: hidden; font-size: 0.65rem; font-family: 'JetBrains Mono', monospace; width: 45%; z-index: 10; }
        .viz-table th { background-color: rgba(59, 130, 246, 0.1); color: var(--accent); padding: 0.25rem 0.5rem; text-align: left; border-bottom: 1px solid var(--border-color); }
        .viz-table td { padding: 0.25rem 0.5rem; border-bottom: 1px solid var(--border-color); color: var(--text-muted); position: relative; text-align: center; }
        .viz-table tr:last-child td { border-bottom: none; }

        #join-svg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: visible; }
        .viz-line { stroke-width: 2; fill: none; transition: stroke 0.3s, opacity 0.3s; stroke-dasharray: 6; animation: flow 20s linear infinite; }
        @keyframes flow { to { stroke-dashoffset: -1000; } }

        .viz-result-table { width: 100%; background-color: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2); }
        .viz-result-table th { background-color: rgba(16, 185, 129, 0.1); color: #10b981; text-align: center; }
        .key-match { color: var(--text-main) !important; font-weight: bold; background-color: rgba(59, 130, 246, 0.2); }
        .key-null { color: #ef4444 !important; font-style: italic; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden selection:bg-blue-500/30">

<header id="main-header" class="fixed top-0 w-full bg-theme-nav z-50 transition-colors duration-500 border-b app-border"></header>

<div class="flex-1 relative overflow-hidden app-bg pt-[72px] flex">

    <aside class="w-96 border-r app-border app-bg-sec flex flex-col z-20 flex-shrink-0 backdrop-blur-md overflow-y-auto custom-scrollbar">

        <div class="p-5 border-b app-border grid grid-cols-2 gap-3 flex-shrink-0">
            <button onclick="generateMockData()" class="tool-btn bg-indigo-500/10 text-indigo-400 border-indigo-500/20 hover:bg-indigo-500/20 col-span-2 group">
                <span class="text-lg group-hover:rotate-45 transition-transform duration-300">🎲</span> <span data-i18n="sand_mock">Демо-данные</span>
            </button>
            <button onclick="document.getElementById('csv-upload').click()" class="tool-btn bg-blue-500/10 text-blue-400 border-blue-500/20 hover:bg-blue-500/20">
                <span class="text-lg">📁</span> <span data-i18n="sand_csv">CSV</span>
            </button>
            <input type="file" id="csv-upload" accept=".csv" class="hidden" onchange="handleFileUpload(this)">
            <button onclick="clearDatabase()" class="tool-btn bg-red-500/10 text-red-400 border-red-500/20 hover:bg-red-500/20">
                <span class="text-lg">🗑️</span> <span data-i18n="sand_clear">Сброс</span>
            </button>
        </div>

        <!-- ВИЗУАЛИЗАТОР JOIN -->
        <div class="p-5 border-b app-border bg-black/10 shadow-inner flex-shrink-0">
            <h3 class="text-[10px] font-black app-text-muted uppercase tracking-widest mb-4 flex items-center justify-between" data-i18n="sand_join_viz">
                Визуализатор JOIN
            </h3>

            <div class="grid grid-cols-2 gap-2 mb-4">
                <button onclick="drawJoinViz('INNER')" class="tool-btn bg-slate-800 text-white hover:border-blue-500 transition-colors" id="btn-join-inner" data-i18n="join_inner">INNER</button>
                <button onclick="drawJoinViz('LEFT')" class="tool-btn bg-slate-800 text-white hover:border-blue-500 transition-colors" id="btn-join-left" data-i18n="join_left">LEFT</button>
                <button onclick="drawJoinViz('RIGHT')" class="tool-btn bg-slate-800 text-white hover:border-purple-500 transition-colors" id="btn-join-right" data-i18n="join_right">RIGHT</button>
                <button onclick="drawJoinViz('FULL')" class="tool-btn bg-slate-800 text-white hover:border-pink-500 transition-colors" id="btn-join-full" data-i18n="join_full">FULL</button>
            </div>

            <div class="join-viz-container" id="join-viz-area">
                <svg id="join-svg-canvas"></svg>
                <div class="join-viz-tables-row">
                    <table class="viz-table" id="viz-table-a">
                        <thead><tr><th>id</th><th>name</th></tr></thead>
                        <tbody>
                        <tr><td id="cell-a-1" class="text-center">1</td><td class="text-center">A</td></tr>
                        <tr><td id="cell-a-2" class="text-center">2</td><td class="text-center">B</td></tr>
                        <tr><td id="cell-a-3" class="text-center">3</td><td class="text-center">C</td></tr>
                        </tbody>
                    </table>
                    <table class="viz-table" id="viz-table-b">
                        <thead><tr><th>a_id</th><th>val</th></tr></thead>
                        <tbody>
                        <tr><td id="cell-b-1" class="text-center">1</td><td class="text-center">X</td></tr>
                        <tr><td id="cell-b-2" class="text-center">2</td><td class="text-center">Y</td></tr>
                        <tr><td id="cell-b-4" class="text-center">4</td><td class="text-center">Z</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="mt-2 text-center text-[9px] text-slate-500 font-bold uppercase tracking-widest">Result</div>
                <table class="viz-table viz-result-table mx-auto !w-full" id="viz-table-result"></table>
            </div>
        </div>

        <!-- Схема ERD -->
        <div class="p-5 border-b app-border flex flex-col flex-shrink-0 min-h-[220px]">
            <h3 class="text-[10px] font-black app-text-muted uppercase tracking-widest mb-2" data-i18n="sand_viz">Схема (ERD)</h3>
            <div id="mermaid-chart" class="flex-1 rounded-xl border app-border flex items-center justify-center overflow-auto p-2 relative group">
                <span class="app-text-muted text-[10px] font-bold uppercase tracking-widest opacity-30">No Schema</span>
            </div>
        </div>

        <!-- Структура БД -->
        <div class="p-5 flex-1 flex flex-col flex-shrink-0 min-h-[200px]">
            <h2 class="text-[10px] font-black app-text-muted uppercase tracking-widest mb-3" data-i18n="sand_struct">Структура БД</h2>
            <div id="schema-container" class="flex-1 overflow-y-auto custom-scrollbar space-y-3 pr-2">
                <div class="text-center text-xs font-black uppercase tracking-widest app-text-muted mt-6 opacity-30">Empty</div>
            </div>
        </div>
    </aside>

    <!-- ПРАВАЯ ЧАСТЬ -->
    <main class="flex-1 relative flex flex-col min-w-0">

        <!-- РЕДАКТОР -->
        <div class="h-1/2 flex flex-col relative border-b app-border">
            <div class="app-bg-sec px-6 py-3 flex justify-between items-center border-b app-border z-10 shadow-sm">
                <div class="flex items-center gap-3">
                    <span class="text-[10px] font-black app-text-muted uppercase tracking-widest" data-i18n="lbl_editor">SQL Editor</span>
                    <span class="px-2 py-0.5 bg-blue-500/10 text-blue-400 rounded text-[9px] font-black uppercase tracking-widest border border-blue-500/20 hidden md:block">Ctrl + Space for AutoComplete</span>
                </div>

                <div class="flex items-center gap-3">
                    <div id="query-spinner" class="loader !w-4 !h-4 hidden"></div>
                    <span class="text-[10px] app-text-muted hidden md:inline font-mono">Alt + Enter</span>
                    <button onclick="runQuery()" id="run-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-2 rounded-xl text-xs font-black uppercase tracking-widest shadow-[0_0_15px_rgba(59,130,246,0.3)] active:scale-95 transition-all flex items-center gap-2">
                        <span>▶</span> <span data-i18n="btn_run">RUN</span>
                    </button>
                </div>
            </div>

            <div class="flex-1 relative overflow-hidden bg-[var(--bg-editor)]">
                <textarea id="editor" class="w-full h-full"></textarea>
            </div>
        </div>

        <!-- РЕЗУЛЬТАТ -->
        <div class="h-1/2 flex flex-col relative app-bg">
            <div class="app-bg-sec px-6 py-3 border-b app-border flex justify-between items-center shadow-sm z-10">
                <div class="flex items-center gap-3">
                    <span class="text-[10px] font-black app-text-muted uppercase tracking-widest" data-i18n="lbl_result">Output</span>
                    <span id="status-msg" class="text-[10px] font-black uppercase tracking-wider px-3 py-1 rounded-md hidden transition-all"></span>
                </div>

                <div class="flex gap-2">
                    <button id="chart-btn" onclick="showChartModal()" class="hidden text-[10px] font-black uppercase tracking-widest text-purple-500 hover:text-white border border-purple-500/30 hover:border-purple-500 bg-purple-500/10 hover:bg-purple-500 px-4 py-1.5 rounded-lg transition-all flex items-center gap-2">
                        📊 <span data-i18n="sand_chart">Chart</span>
                    </button>
                    <button id="export-btn" onclick="exportToCSV()" class="hidden text-[10px] font-black uppercase tracking-widest text-green-500 hover:text-white border border-green-500/30 hover:border-green-500 bg-green-500/10 hover:bg-green-500 px-4 py-1.5 rounded-lg transition-all flex items-center gap-2">
                        💾 <span data-i18n="sand_dl_csv">CSV</span>
                    </button>
                </div>
            </div>

            <div class="flex-1 overflow-auto custom-scrollbar p-0 relative bg-[var(--bg-body)]">
                <div id="error-msg" class="hidden m-6 p-4 text-red-500 bg-red-500/10 border border-red-500/20 rounded-xl text-xs font-mono shadow-inner leading-relaxed"></div>

                <table class="w-full text-left text-sm whitespace-nowrap hidden" id="result-table">
                    <thead class="app-bg-sec sticky top-0 z-10 shadow-sm">
                    <tr id="result-head" class="text-blue-500 text-[10px] font-black uppercase tracking-widest border-b app-border"></tr>
                    </thead>
                    <tbody id="result-body" class="divide-y app-border app-text-muted font-mono text-xs"></tbody>
                </table>

                <div id="empty-state" class="h-full flex flex-col items-center justify-center app-text-muted select-none opacity-40">
                    <div class="text-6xl mb-4">⌨️</div>
                    <div class="text-[10px] font-black uppercase tracking-widest" data-i18n="empty_state">Execute query to see results</div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Модалка Графика -->
<div id="chart-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-md p-4 transition-opacity duration-300 opacity-0" onclick="closeModal('chart-modal')">
    <div class="app-bg-sec border app-border p-8 rounded-[2rem] w-full max-w-5xl h-[80vh] flex flex-col shadow-2xl transform scale-95 transition-transform duration-300 relative overflow-hidden" onclick="event.stopPropagation()">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-purple-500 to-pink-500"></div>
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-white font-black text-2xl tracking-tight uppercase flex items-center gap-3">
                <span class="text-purple-500">Analytics</span> Dashboard
            </h3>
            <button onclick="closeModal('chart-modal')" class="w-10 h-10 rounded-full bg-slate-800 text-slate-400 hover:text-white hover:bg-red-500 transition flex items-center justify-center text-2xl">&times;</button>
        </div>
        <div class="flex-1 relative bg-[var(--bg-body)] rounded-2xl p-6 border app-border shadow-inner">
            <canvas id="myChart"></canvas>
        </div>
    </div>
</div>

<!-- Скрипты -->
<script src="/js/i18n.js"></script>
<script type="module">
    import { fetchWithAuth, logout } from '/js/api.js';
    import { renderHeader } from '/js/components/header.js';

    window.logout = logout;

    let cmEditor;
    let lastResultData = null;
    let myChart = null;

    mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });

    // --- УПРАВЛЕНИЕ ТЕМОЙ ---
    window.toggleTheme = function() {
        const body = document.body;
        const newTheme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        body.setAttribute('data-theme', newTheme);
        localStorage.setItem('sql_theme', newTheme);

        const sunIcon = document.getElementById('icon-sun');
        const moonIcon = document.getElementById('icon-moon');

        if (sunIcon && moonIcon) {
            if (newTheme === 'dark') {
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            } else {
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            }
        }

        if (cmEditor) {
            cmEditor.setOption("theme", newTheme === 'light' ? 'eclipse' : 'dracula');
        }

        renderMermaid(newTheme);

        if (myChart && lastResultData) {
            window.showChartModal(true);
        }
    };

    window.toggleLangMenu = () => {
        const menu = document.getElementById('lang-menu');
        if (menu) {
            menu.classList.toggle('open');
        }
    };

    window.handleLangChange = (lang, label) => {
        const menu = document.getElementById('lang-menu');
        if (menu) {
            menu.classList.remove('open');
        }
        if (window.changeLanguage) {
            window.changeLanguage(lang);
        }
        const langLabel = document.getElementById('current-lang-label');
        if (langLabel) {
            langLabel.innerText = label;
        }
    };

    window.confirmLogout = async function() {
        if (typeof Swal !== 'undefined') {
            const t = window.t || ((k) => k);
            const res = await Swal.fire({
                title: t('confirm_logout_title') || 'Logout',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Yes',
                cancelButtonText: 'No',
                background: 'var(--bg-body)',
                color: 'var(--text-main)',
                reverseButtons: true
            });

            if (res.isConfirmed) {
                logout();
            }
        } else {
            logout();
        }
    };

    window.closeModal = function(id) {
        const el = document.getElementById(id);
        if (!el) {
            return;
        }
        el.classList.add('opacity-0');
        const innerDiv = el.querySelector('div');
        if (innerDiv) {
            innerDiv.classList.add('scale-95');
        }
        setTimeout(() => {
            el.classList.add('hidden');
        }, 300);
    };

    // --- ИНИЦИАЛИЗАЦИЯ ---
    async function initApp() {
        const savedTheme = localStorage.getItem('sql_theme') || 'dark';
        document.body.setAttribute('data-theme', savedTheme);

        const token = localStorage.getItem('sql_token');
        let authData = { isLoggedIn: false };

        if (token) {
            try {
                const res = await fetchWithAuth('/api/v1/profiles/me');
                if (res.ok) {
                    const userJson = await res.json();
                    authData = { isLoggedIn: true, ...userJson };
                }
            } catch(e) {
                console.error("Auth init failed", e);
            }
        }

        if (typeof renderHeader === 'function') {
            renderHeader(authData);

            const sunIcon = document.getElementById('icon-sun');
            const moonIcon = document.getElementById('icon-moon');
            if (sunIcon && moonIcon) {
                if (savedTheme === 'dark') {
                    sunIcon.classList.add('hidden');
                    moonIcon.classList.remove('hidden');
                } else {
                    sunIcon.classList.remove('hidden');
                    moonIcon.classList.add('hidden');
                }
            }
        }

        if (window.initTranslations) {
            window.initTranslations();
        }

        const curLang = localStorage.getItem('sql_lang') || 'ru';
        const langLabels = { ru: 'Русский', en: 'English', es: 'Español', zh: '中文' };
        const lLabel = document.getElementById('current-lang-label');
        if (lLabel) {
            lLabel.innerText = langLabels[curLang];
        }

        cmEditor = CodeMirror.fromTextArea(document.getElementById("editor"), {
            mode: "text/x-sql",
            theme: savedTheme === 'light' ? 'eclipse' : 'dracula',
            lineNumbers: true,
            smartIndent: true,
            extraKeys: {
                "Ctrl-Space": "autocomplete",
                "Alt-Enter": () => window.runQuery()
            },
            hintOptions: { tables: {} }
        });

        cmEditor.on("keyup", function (cm, event) {
            if (!cm.state.completionActive && event.keyCode >= 65 && event.keyCode <= 90) {
                CodeMirror.commands.autocomplete(cm, null, {completeSingle: false});
            }
        });

        cmEditor.setValue("-- Sandbox Mode\n-- Используй визуализатор слева, чтобы понять JOIN-ы\n\nSELECT * FROM Users;");

        setTimeout(() => {
            window.drawJoinViz('INNER');
        }, 500);

        if (alasql('SHOW TABLES').length === 0) {
            window.generateMockData(true);
        } else {
            onDbChange();
        }
    }

    // --- ЛОГИКА ВИЗУАЛИЗАТОРА JOIN ---
    const vizDataA =[ { id: 1, name: 'A' }, { id: 2, name: 'B' }, { id: 3, name: 'C' } ];
    const vizDataB =[ { a_id: 1, val: 'X' }, { a_id: 2, val: 'Y' }, { a_id: 4, val: 'Z' } ];

    window.drawJoinViz = function(joinType) {
        const types =['inner', 'left', 'right', 'full'];

        types.forEach(type => {
            const btn = document.getElementById(`btn-join-${type}`);
            if (btn) {
                btn.classList.remove('ring-2', 'ring-blue-500', 'bg-blue-600', 'bg-purple-600', 'bg-pink-600');
            }
        });

        const activeBtn = document.getElementById(`btn-join-${joinType.toLowerCase()}`);

        if (activeBtn) {
            if (joinType === 'INNER' || joinType === 'LEFT') {
                activeBtn.classList.add('ring-2', 'ring-blue-500', 'bg-blue-600');
            }
            if (joinType === 'RIGHT') {
                activeBtn.classList.add('ring-2', 'ring-purple-500', 'bg-purple-600');
            }
            if (joinType === 'FULL') {
                activeBtn.classList.add('ring-2', 'ring-pink-500', 'bg-pink-600');
            }
        }

        const svgCanvas = document.getElementById('join-svg-canvas');
        const resultTable = document.getElementById('viz-table-result');
        const area = document.getElementById('join-viz-area');

        if (svgCanvas) svgCanvas.innerHTML = '';

        const tdElements = document.querySelectorAll('.viz-table td');
        tdElements.forEach(td => {
            td.className = 'text-center';
        });

        let resultRows = [];
        let connections =[];

        if (joinType === 'INNER') {
            vizDataA.forEach(a => {
                const match = vizDataB.find(b => b.a_id === a.id);
                if (match) {
                    resultRows.push({ id: a.id, name: a.name, a_id: match.a_id, val: match.val });
                    connections.push({ fromId: `cell-a-${a.id}`, toId: `cell-b-${match.a_id}`, color: '#3b82f6' });
                }
            });
        } else if (joinType === 'LEFT') {
            vizDataA.forEach(a => {
                const match = vizDataB.find(b => b.a_id === a.id);
                if (match) {
                    resultRows.push({ id: a.id, name: a.name, a_id: match.a_id, val: match.val });
                    connections.push({ fromId: `cell-a-${a.id}`, toId: `cell-b-${match.a_id}`, color: '#3b82f6' });
                } else {
                    resultRows.push({ id: a.id, name: a.name, a_id: 'NULL', val: 'NULL' });
                    const cellA = document.getElementById(`cell-a-${a.id}`);
                    if (cellA) cellA.classList.add('key-match');
                }
            });
        } else if (joinType === 'RIGHT') {
            vizDataB.forEach(b => {
                const match = vizDataA.find(a => a.id === b.a_id);
                if (match) {
                    resultRows.push({ id: match.id, name: match.name, a_id: b.a_id, val: b.val });
                    connections.push({ fromId: `cell-a-${match.id}`, toId: `cell-b-${b.a_id}`, color: '#a855f7' });
                } else {
                    resultRows.push({ id: 'NULL', name: 'NULL', a_id: b.a_id, val: b.val });
                    const cellB = document.getElementById(`cell-b-${b.a_id}`);
                    if (cellB) cellB.classList.add('key-match');
                }
            });
        } else if (joinType === 'FULL') {
            vizDataA.forEach(a => {
                const match = vizDataB.find(b => b.a_id === a.id);
                if (match) {
                    resultRows.push({ id: a.id, name: a.name, a_id: match.a_id, val: match.val });
                    connections.push({ fromId: `cell-a-${a.id}`, toId: `cell-b-${match.a_id}`, color: '#ec4899' });
                } else {
                    resultRows.push({ id: a.id, name: a.name, a_id: 'NULL', val: 'NULL' });
                    const cellA = document.getElementById(`cell-a-${a.id}`);
                    if (cellA) cellA.classList.add('key-match');
                }
            });
            vizDataB.forEach(b => {
                const match = vizDataA.find(a => a.id === b.a_id);
                if (!match) {
                    resultRows.push({ id: 'NULL', name: 'NULL', a_id: b.a_id, val: b.val });
                    const cellB = document.getElementById(`cell-b-${b.a_id}`);
                    if (cellB) cellB.classList.add('key-match');
                }
            });
        }

        let thead = `<thead><tr><th>id</th><th>name</th><th>a_id</th><th>val</th></tr></thead>`;
        let tbody = `<tbody>`;

        resultRows.forEach(r => {
            const idClass = r.id === 'NULL' ? 'key-null' : '';
            const aIdClass = r.a_id === 'NULL' ? 'key-null' : '';
            tbody += `<tr><td class="${idClass} text-center">${r.id}</td><td class="text-center">${r.name}</td><td class="${aIdClass} text-center">${r.a_id}</td><td class="text-center">${r.val}</td></tr>`;
        });

        tbody += `</tbody>`;

        if (resultTable) {
            resultTable.innerHTML = thead + tbody;
        }

        setTimeout(() => {
            if (!area || !svgCanvas) return;

            const areaRect = area.getBoundingClientRect();

            connections.forEach(conn => {
                const elA = document.getElementById(conn.fromId);
                const elB = document.getElementById(conn.toId);

                if (elA && elB) {
                    elA.classList.add('key-match');
                    elB.classList.add('key-match');

                    const rectA = elA.getBoundingClientRect();
                    const rectB = elB.getBoundingClientRect();

                    const startX = rectA.right - areaRect.left;
                    const startY = rectA.top + (rectA.height / 2) - areaRect.top;
                    const endX = rectB.left - areaRect.left;
                    const endY = rectB.top + (rectB.height / 2) - areaRect.top;

                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    const cp1X = startX + 30;
                    const cp2X = endX - 30;

                    path.setAttribute("d", `M ${startX} ${startY} C ${cp1X} ${startY}, ${cp2X} ${endY}, ${endX} ${endY}`);
                    path.setAttribute("class", "viz-line");
                    path.setAttribute("stroke", conn.color);

                    svgCanvas.appendChild(path);
                }
            });
        }, 50);

        let sqlText = `SELECT A.id, A.name, B.a_id, B.val\nFROM Table_A AS A\n${joinType} JOIN Table_B AS B\n  ON A.id = B.a_id;`;
        if (cmEditor && cmEditor.getValue() !== sqlText) {
            cmEditor.setValue(sqlText);
            window.runQuery();
        }
    };

    // --- ИНСТРУМЕНТЫ ---
    function updateDynamicAutocomplete() {
        try {
            const tables = alasql("SHOW TABLES");
            let hintData = {};
            tables.forEach(t => {
                const cols = alasql(`SHOW COLUMNS FROM ${t.tableid}`).map(c => c.columnid);
                hintData[t.tableid] = cols;
            });
            if (cmEditor) {
                cmEditor.setOption("hintOptions", { tables: hintData });
            }
        } catch(e) {}
    }

    window.renderMermaid = async function(themeOverride = null) {
        const chartDiv = document.getElementById('mermaid-chart');
        if(!chartDiv) return;

        let tables =[];
        try {
            tables = alasql("SHOW TABLES");
        } catch(e) {}

        if (tables.length === 0) {
            chartDiv.innerHTML = `<span class="app-text-muted text-[10px] font-black uppercase tracking-widest opacity-30">No Schema</span>`;
            return;
        }

        let code = "erDiagram\n";
        tables.forEach(t => {
            code += `  ${t.tableid} {\n`;
            try {
                const cols = alasql(`SHOW COLUMNS FROM ${t.tableid}`);
                cols.forEach(c => {
                    let type = c.type ? c.type.toLowerCase() : 'varchar';
                    if(type === 'int') type = 'int';
                    code += `    ${type} ${c.columnid}\n`;
                });
            } catch(e) {}
            code += `  }\n`;
        });

        const currentTheme = themeOverride || document.body.getAttribute('data-theme') || 'dark';
        mermaid.initialize({ startOnLoad: false, theme: currentTheme === 'light' ? 'default' : 'dark', securityLevel: 'loose' });

        try {
            chartDiv.innerHTML = '';
            const { svg } = await mermaid.render(`graphDiv_${Date.now()}`, code);
            chartDiv.innerHTML = svg;
            const svgEl = chartDiv.querySelector('svg');
            if(svgEl) {
                svgEl.style.maxWidth = '100%';
                svgEl.style.height = 'auto';
            }
        } catch (e) {
            chartDiv.innerHTML = '<span class="text-red-500 text-[10px] font-bold">ERD Render Error</span>';
        }
    }

    function renderSchema() {
        const container = document.getElementById('schema-container');
        if (!container) return;

        container.innerHTML = '';

        try {
            const tables = alasql("SHOW TABLES");
            if (tables.length === 0) {
                container.innerHTML = '<div class="text-center text-[10px] font-black uppercase tracking-widest app-text-muted mt-10 opacity-30">Empty</div>';
                return;
            }

            tables.forEach(t => {
                const div = document.createElement('div');
                div.className = "app-bg-ter rounded-xl p-3 border app-border";

                let html = `<div class="font-black text-blue-500 mb-2 flex items-center justify-between text-[10px] uppercase tracking-widest"><span class="flex items-center gap-2">▤ ${t.tableid}</span><button onclick="dropTable('${t.tableid}')" class="text-slate-500 hover:text-red-500 transition px-1" title="Drop Table">×</button></div><ul class="space-y-1 pl-1">`;

                const cols = alasql(`SHOW COLUMNS FROM ${t.tableid}`);
                cols.forEach(c => {
                    html += `<li class="flex justify-between text-[10px] font-mono border-b border-gray-700/20 pb-1 last:border-0"><span class="app-text font-bold">${c.columnid}</span> <span class="app-text-muted">${c.type || 'AUTO'}</span></li>`;
                });

                div.innerHTML = html + "</ul>";
                container.appendChild(div);
            });
        } catch(e) {}
    }

    window.dropTable = function(name) {
        if(confirm(`DROP TABLE ${name}?`)) {
            try {
                alasql(`DROP TABLE ${name}`);
                onDbChange();
            } catch(e) {}
        }
    }

    function onDbChange() {
        renderSchema();
        window.renderMermaid();
        updateDynamicAutocomplete();
    }

    window.generateMockData = function(silent = false) {
        if(!silent) {
            const tText = window.t ? window.t('confirm_mock') : "Create Mock Data?";
            if(!confirm(tText)) return;
        }

        const queries =[
            "DROP TABLE IF EXISTS Users",
            "DROP TABLE IF EXISTS Products",
            "DROP TABLE IF EXISTS Orders",
            "CREATE TABLE Users (id INT, name STRING, country STRING)",
            "INSERT INTO Users VALUES (1, 'Admin', 'RU'), (2, 'Jakunya', 'RU'), (3, 'Guest', 'US')",
            "CREATE TABLE Products (id INT, title STRING, price INT)",
            "INSERT INTO Products VALUES (101, 'MacBook', 2500), (102, 'Iphone', 1000), (103, 'Coffee', 5)",
            "CREATE TABLE Orders (id INT, user_id INT, product_id INT, amount INT)",
            "INSERT INTO Orders VALUES (1, 1, 101, 1), (2, 2, 102, 2), (3, 2, 103, 5)"
        ];

        try {
            queries.forEach(q => alasql(q));
            onDbChange();
            if (cmEditor) {
                cmEditor.setValue("SELECT Users.name, Products.title, Orders.amount \nFROM Orders \nJOIN Users ON Orders.user_id = Users.id\nJOIN Products ON Orders.product_id = Products.id;");
            }
            if(!silent) window.runQuery();
        } catch(e) {}
    }

    window.clearDatabase = function() {
        const tText = window.t ? window.t('confirm_clear') : "Clear Database?";
        if(confirm(tText)) {
            try {
                alasql('DROP DATABASE IF EXISTS main');
                alasql('CREATE DATABASE main');
                alasql('USE main');

                if (cmEditor) cmEditor.setValue("");
                lastResultData = null;
                onDbChange();

                const resHead = document.getElementById('result-head');
                const resBody = document.getElementById('result-body');
                const emptyState = document.getElementById('empty-state');
                const resTable = document.getElementById('result-table');
                const expBtn = document.getElementById('export-btn');
                const chartBtn = document.getElementById('chart-btn');
                const statMsg = document.getElementById('status-msg');
                const errMsg = document.getElementById('error-msg');

                if (resHead) resHead.innerHTML = '';
                if (resBody) resBody.innerHTML = '';
                if (emptyState) emptyState.classList.remove('hidden');
                if (resTable) resTable.classList.add('hidden');
                if (expBtn) expBtn.classList.add('hidden');
                if (chartBtn) chartBtn.classList.add('hidden');

                if (statMsg) {
                    statMsg.innerHTML = '';
                    statMsg.classList.add('hidden');
                }
                if (errMsg) errMsg.classList.add('hidden');

                const types = ['inner', 'left', 'right', 'full'];
                types.forEach(type => {
                    const btn = document.getElementById(`btn-join-${type}`);
                    if (btn) btn.classList.remove('ring-2', 'ring-blue-500', 'bg-blue-600', 'bg-purple-600', 'bg-pink-600');
                });

                const svgCanvas = document.getElementById('join-svg-canvas');
                const vizTable = document.getElementById('viz-table-result');
                if (svgCanvas) svgCanvas.innerHTML = '';
                if (vizTable) vizTable.innerHTML = '';

            } catch(e) {}
        }
    }

    window.handleFileUpload = function(input) {
        const file = input.files[0];
        if (!file) return;
        const tableName = file.name.split('.')[0].replace(/[^a-zA-Z0-9]/g, "_");
        const reader = new FileReader();

        reader.onload = function(e) {
            const text = e.target.result;
            const rows = text.split('\n').filter(r => r.trim()).map(row => row.split(','));
            if (rows.length < 2) return;

            const headers = rows[0].map(h => h.trim().replace(/['"]+/g, ''));
            try {
                alasql(`DROP TABLE IF EXISTS ${tableName}`);
                alasql(`CREATE TABLE ${tableName} (` + headers.map(h => `${h} STRING`).join(', ') + `)`);

                const data = rows.slice(1).map(row => {
                    let obj = {};
                    row.forEach((val, idx) => {
                        let v = val.trim().replace(/['"]+/g, '');
                        obj[headers[idx]] = isNaN(v) || v === '' ? v : Number(v);
                    });
                    return obj;
                });

                alasql(`INSERT INTO ${tableName} SELECT * FROM ?`, [data]);
                onDbChange();

                if (cmEditor) cmEditor.setValue(`SELECT * FROM ${tableName} LIMIT 100;`);
                window.runQuery();
            } catch(err) {
                alert("Import Error: " + err.message);
            }
        };

        reader.readAsText(file);
        input.value = '';
    }

    window.exportToCSV = function() {
        if (!lastResultData) return;
        try {
            alasql('SELECT * INTO CSV("sql_export.csv", {headers:true}) FROM ?',[lastResultData]);
        } catch(e) {}
    }

    // --- ВЫПОЛНЕНИЕ SQL ---
    window.runQuery = function() {
        if (!cmEditor) return;
        const sql = cmEditor.getValue();
        const status = document.getElementById('status-msg');
        const empty = document.getElementById('empty-state');
        const table = document.getElementById('result-table');
        const thead = document.getElementById('result-head');
        const tbody = document.getElementById('result-body');
        const exportBtn = document.getElementById('export-btn');
        const chartBtn = document.getElementById('chart-btn');
        const errorDiv = document.getElementById('error-msg');

        if(empty) empty.classList.add('hidden');
        if(errorDiv) errorDiv.classList.add('hidden');
        if(table) table.classList.remove('hidden');
        if(status) status.classList.remove('hidden');

        try {
            let result = alasql(sql);
            if(status) status.innerHTML = '<span class="text-green-500 bg-green-500/10 border border-green-500/20 px-3 py-1 rounded-lg">SUCCESS</span>';

            let dataToShow = result;
            if (Array.isArray(result) && result.length > 0 && Array.isArray(result[0])) {
                dataToShow = result[result.length - 1];
            }

            if (Array.isArray(dataToShow) && dataToShow.length > 0 && typeof dataToShow[0] === 'object') {
                lastResultData = dataToShow;
                if(exportBtn) exportBtn.classList.remove('hidden');

                const hasNumbers = Object.values(dataToShow[0]).some(v => typeof v === 'number');
                if (hasNumbers) {
                    if(chartBtn) chartBtn.classList.remove('hidden');
                } else {
                    if(chartBtn) chartBtn.classList.add('hidden');
                }
            } else {
                lastResultData = null;
                if(exportBtn) exportBtn.classList.add('hidden');
                if(chartBtn) chartBtn.classList.add('hidden');
            }

            if(thead) thead.innerHTML = '';
            if(tbody) tbody.innerHTML = '';

            if (typeof dataToShow === 'number' || typeof dataToShow === 'string') {
                if(tbody) tbody.innerHTML = `<tr><td class="p-4 app-text-muted">${dataToShow}</td></tr>`;
            } else if (Array.isArray(dataToShow) && dataToShow.length > 0) {
                Object.keys(dataToShow[0]).forEach(k => {
                    const th = document.createElement('th');
                    th.className = "px-4 py-3 text-left";
                    th.innerText = k;
                    if(thead) thead.appendChild(th);
                });

                dataToShow.forEach((row, idx) => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-blue-500/5 transition-colors animate-row";
                    tr.style.animationDelay = `${idx * 0.02}s`;

                    Object.values(row).forEach(v => {
                        const isNull = v === null || v === 'NULL';
                        const tdClass = isNull ? 'text-red-500 italic' : 'app-text-muted';
                        const td = document.createElement('td');
                        td.className = `px-4 py-2 app-border border-b ${tdClass}`;
                        td.innerText = isNull ? 'NULL' : v;
                        tr.appendChild(td);
                    });
                    if(tbody) tbody.appendChild(tr);
                });
            } else {
                if(tbody) tbody.innerHTML = `<tr><td class="p-4 text-slate-500 italic font-medium">Query executed successfully. No data returned.</td></tr>`;
            }

            const sqlUpper = sql.toUpperCase();
            if(sqlUpper.includes('CREATE') || sqlUpper.includes('DROP') || sqlUpper.includes('ALTER')) {
                onDbChange();
            }

        } catch (e) {
            if(status) status.innerHTML = '<span class="text-red-500 bg-red-500/10 border border-red-500/20 px-3 py-1 rounded-lg">ERROR</span>';
            if(errorDiv) {
                errorDiv.innerText = e.message;
                errorDiv.classList.remove('hidden');
            }
            if(table) table.classList.add('hidden');
            if(exportBtn) exportBtn.classList.add('hidden');
            if(chartBtn) chartBtn.classList.add('hidden');
        }
    };

    // --- ГРАФИКИ ---
    window.showChartModal = function(silentUpdate = false) {
        if (!lastResultData || lastResultData.length === 0) return;

        if(!silentUpdate) {
            const el = document.getElementById('chart-modal');
            if(el) {
                el.classList.remove('hidden');
                setTimeout(() => {
                    el.classList.remove('opacity-0');
                    const inner = el.querySelector('div');
                    if(inner) inner.classList.remove('scale-95');
                }, 10);
            }
        }

        const canvas = document.getElementById('myChart');
        if(!canvas) return;

        const ctx = canvas.getContext('2d');
        const keys = Object.keys(lastResultData[0]);

        let labelKey = keys[0];
        let valueKey = keys.find(k => typeof lastResultData[0][k] === 'number') || keys[1];

        const labels = lastResultData.map(row => row[labelKey]);
        const data = lastResultData.map(row => row[valueKey]);

        if (myChart) myChart.destroy();

        const isLight = document.body.getAttribute('data-theme') === 'light';
        const textColor = isLight ? '#475569' : '#94a3b8';
        const gridColor = isLight ? '#e2e8f0' : '#1e293b';

        myChart = new Chart(ctx, {
            type: labels.length > 15 ? 'line' : 'bar',
            data: {
                labels: labels,
                datasets:[{
                    label: valueKey,
                    data: data,
                    backgroundColor: 'rgba(168, 85, 247, 0.5)',
                    borderColor: '#a855f7',
                    borderWidth: 2,
                    borderRadius: 4,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: gridColor }, ticks: { color: textColor } },
                    x: { grid: { display: false }, ticks: { color: textColor } }
                }
            }
        });
    }

    document.addEventListener('DOMContentLoaded', initApp);

    document.addEventListener('click', (e) => {
        const menu = document.getElementById('lang-menu');
        const btn = document.getElementById('lang-btn');
        if (menu && btn && !btn.contains(e.target)) {
            menu.classList.remove('open');
        }
    });
</script>
