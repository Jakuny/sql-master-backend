<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Master - Sandbox</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Внешние зависимости -->
    <script src="https://cdn.jsdelivr.net/npm/alasql@1.7/dist/alasql.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/sql/sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/sql-hint.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .code-font { font-family: 'JetBrains Mono', monospace; }

        /* FIX: Принудительно темный редактор */
        .CodeMirror {
            height: 100% !important;
            border-radius: 0.5rem;
            font-family: 'JetBrains Mono', monospace;
            background-color: #1e293b !important;
            color: #e2e8f0 !important;
            border: 1px solid #334155;
            font-size: 14px;
        }
        .CodeMirror-gutters { background-color: #1e293b !important; border-right: 1px solid #334155; }

        /* FIX: Темные подсказки (Autocomplete) */
        .CodeMirror-hints {
            background-color: #1e293b !important;
            border: 1px solid #475569 !important;
            border-radius: 8px !important;
            padding: 4px !important;
            color: #cbd5e1 !important;
            font-family: 'JetBrains Mono', monospace !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5) !important;
            z-index: 9999 !important;
        }
        .CodeMirror-hint { padding: 4px 8px !important; border-radius: 4px !important; color: #94a3b8 !important; }
        .CodeMirror-hint-active { background-color: #3b82f6 !important; color: white !important; font-weight: bold !important; }

        .loader { border: 3px solid rgba(255, 255, 255, 0.1); border-left-color: #10b981; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<!-- УНИФИЦИРОВАННЫЙ ХЕДЕР -->
<header class="border-b border-slate-800 bg-slate-900 p-4 flex justify-between items-center shadow-lg z-20">
    <div class="flex items-center gap-4">
        <a href="/" class="font-bold text-xl tracking-tight text-white flex items-center gap-3 select-none">
            <div class="bg-blue-600 px-3 py-1 rounded-lg shadow-lg shadow-blue-500/20 tracking-wide text-white">SQL</div>
            <span>Master</span>
        </a>
        <div class="h-6 w-px bg-slate-700 mx-2"></div>
        <h1 class="text-lg font-bold tracking-tight text-white italic">
            Sandbox <span class="text-green-500 text-xs not-italic font-black ml-1 uppercase tracking-tighter">BI Mode</span>
        </h1>
    </div>

    <div class="flex items-center gap-3">
        <!-- Языки -->
        <select id="lang-select" onchange="changeLanguage(this.value)" class="bg-slate-800 text-xs font-bold text-slate-300 border border-slate-700 rounded-lg px-3 py-1 focus:outline-none focus:border-blue-500 cursor-pointer hover:bg-slate-700 transition">
            <option value="ru">Русский</option>
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="zh">中文</option>
        </select>

        <!-- Кнопки инструментов -->
        <button onclick="document.getElementById('csv-upload').click()" class="text-xs text-blue-400 hover:text-white border border-blue-900/50 hover:border-blue-500 bg-blue-900/10 px-3 py-1.5 rounded-lg transition flex items-center gap-2 font-bold">
            <span data-i18n="sand_csv">Загрузить CSV</span>
        </button>
        <input type="file" id="csv-upload" accept=".csv" class="hidden" onchange="handleFileUpload(this)">

        <button onclick="clearDatabase()" class="text-xs text-red-400 hover:text-red-300 border border-red-900/50 hover:border-red-500 px-3 py-1.5 rounded-lg transition flex items-center gap-2 font-bold">
            <span data-i18n="sand_clear">Сброс</span>
        </button>
    </div>
</header>

<div class="flex flex-1 overflow-hidden relative">
    <!-- Сайдбар -->
    <aside class="w-1/4 min-w-[300px] border-r border-slate-800 bg-slate-900/50 flex flex-col z-10">
        <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/30">
            <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]" data-i18n="sand_struct">DB Structure</h2>
        </div>

        <!-- Таблицы -->
        <div id="schema-container" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar text-sm"></div>

        <!-- Схема ERD -->
        <div class="p-4 border-t border-slate-800 bg-slate-900/30">
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3" data-i18n="sand_viz">Schema (ERD)</h3>
            <div id="mermaid-chart" class="bg-slate-900 p-2 rounded-xl border border-slate-700/50 min-h-[120px] flex items-center justify-center overflow-hidden transition-all duration-500">
                <span class="text-slate-700 text-[10px] italic">No active relations</span>
            </div>
        </div>

        <!-- Демо данные -->
        <div class="px-4 pb-4 pt-2 border-t border-slate-800">
            <button onclick="generateMockData()" class="w-full bg-indigo-600/20 hover:bg-indigo-600/40 text-indigo-400 border border-indigo-500/30 text-[10px] font-black uppercase tracking-widest py-3 rounded-xl transition flex items-center justify-center gap-2 group">
                <span class="group-hover:rotate-45 transition duration-300">🎲</span> <span data-i18n="sand_mock">Generate Mock</span>
            </button>
        </div>
    </aside>

    <!-- Главная область -->
    <main class="flex-1 flex flex-col min-w-0 bg-[#0f172a] relative">

        <!-- Редактор (Верх) -->
        <div class="h-1/2 flex flex-col p-4 pb-0">
            <div class="flex justify-between items-end mb-2">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest pl-1" data-i18n="lbl_editor">SQL Input</label>
                <button id="run-btn" onclick="runQuerySequence()" class="bg-green-600 hover:bg-green-500 active:scale-95 text-white px-8 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all shadow-lg shadow-green-900/20 flex items-center gap-2">
                    <span>▶</span> <span data-i18n="btn_run">Execute</span>
                </button>
            </div>
            <div class="flex-1 overflow-hidden rounded-xl shadow-2xl">
                <textarea id="editor" class="w-full h-full"></textarea>
            </div>
        </div>

        <!-- Результат (Низ) -->
        <div class="h-1/2 flex flex-col p-4 relative">
            <div class="flex justify-between items-center mb-2 px-1">
                <div class="flex items-center gap-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest" data-i18n="lbl_result">Output</label>
                    <span id="status-msg" class="text-[10px] font-bold uppercase tracking-wider ml-2 transition-all"></span>
                </div>
                <div class="flex gap-2">
                    <button id="chart-btn" onclick="showChartModal()" class="hidden text-[10px] font-black uppercase tracking-widest text-purple-400 hover:text-white border border-purple-900/50 hover:border-purple-500 bg-purple-900/20 px-3 py-1.5 rounded-lg transition flex items-center gap-2">
                        📊 <span data-i18n="sand_chart">Chart</span>
                    </button>
                    <button id="export-btn" onclick="exportToCSV()" class="hidden text-[10px] font-black uppercase tracking-widest text-blue-400 hover:text-white border border-blue-900/50 hover:border-blue-500 bg-blue-900/20 px-3 py-1.5 rounded-lg transition flex items-center gap-2">
                        💾 <span data-i18n="sand_dl_csv">Excel</span>
                    </button>
                </div>
            </div>

            <div class="flex-1 bg-[#0a0f1d] rounded-xl border border-slate-800 overflow-auto relative custom-scrollbar">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-[#05070a] sticky top-0 z-10">
                    <tr id="result-head" class="text-blue-500 text-[10px] font-black uppercase tracking-widest border-b border-slate-800"></tr>
                    </thead>
                    <tbody id="result-body" class="divide-y divide-slate-800 text-slate-400 font-mono text-xs"></tbody>
                </table>
                <div id="empty-state" class="absolute inset-0 flex items-center justify-center text-slate-700 select-none uppercase text-[10px] font-black tracking-widest opacity-50" data-i18n="empty_state">
                    Ready for instructions
                </div>
            </div>
        </div>

        <!-- Лоадер -->
        <div id="loader-overlay" class="absolute inset-0 bg-slate-900/90 backdrop-blur-sm z-40 hidden flex flex-col items-center justify-center">
            <div class="loader mb-4"></div>
            <div class="text-green-500 font-mono text-[10px] font-black uppercase tracking-[0.3em] animate-pulse">Computing...</div>
        </div>
    </main>
</div>

<!-- Модалка Графика -->
<div id="chart-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-xl p-4 transition-all duration-300" onclick="closeChartModal()">
    <div class="bg-slate-900 p-8 rounded-[2rem] border border-slate-700 w-full max-w-5xl h-[85vh] flex flex-col shadow-2xl" onclick="event.stopPropagation()">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-white font-black text-xl tracking-tight flex items-center gap-3 uppercase">
                <span class="text-purple-500">Analytics</span> Visualize
            </h3>
            <button onclick="closeChartModal()" class="w-10 h-10 rounded-full bg-slate-800 text-slate-400 hover:text-white hover:bg-red-500/20 transition flex items-center justify-center text-2xl">&times;</button>
        </div>
        <div class="flex-1 relative bg-[#05070a] rounded-2xl p-6 border border-slate-800">
            <canvas id="myChart"></canvas>
        </div>
    </div>
</div>

<!-- Скрипты -->
<script src="/js/cheatsheet.js"></script>
<script src="/js/i18n.js"></script>

<script>
    let cmEditor;
    let lastResultData = null;
    let myChart = null;

    mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });

    document.addEventListener('DOMContentLoaded', () => {
        initApp();
    });

    function initApp() {
        if (typeof initTranslations === 'function') initTranslations();

        const area = document.getElementById("editor");
        cmEditor = CodeMirror.fromTextArea(area, {
            mode: "text/x-sql", theme: "dracula", lineNumbers: true, smartIndent: true,
            extraKeys: {"Ctrl-Space": "autocomplete"},
            hintOptions: window.SQL_AUTOCOMPLETE_CONFIG || { tables: {} }
        });

        cmEditor.on("keyup", function (cm, event) {
            if (!cm.state.completionActive && event.keyCode >= 65 && event.keyCode <= 90) {
                CodeMirror.commands.autocomplete(cm, null, {completeSingle: false});
            }
        });

        cmEditor.setValue("-- Sandbox ready\n-- Write your query and hit Execute");
        renderSchema();
    }

    function handleFileUpload(input) {
        const file = input.files[0];
        if (!file) return;
        const tableName = file.name.split('.')[0].replace(/[^a-zA-Z0-9]/g, "_");
        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            const rows = text.split('\n').filter(r => r.trim()).map(row => row.split(','));
            if (rows.length < 2) return;
            const headers = rows[0].map(h => h.trim().replace(/['"]+/g, ''));
            try {
                alasql(`DROP TABLE IF EXISTS ${tableName}`);
                alasql(`CREATE TABLE ${tableName} (` + headers.map(h => `${h} STRING`).join(', ') + `)`);
                const data = rows.slice(1).map(row => {
                    let obj = {};
                    row.forEach((val, idx) => {
                        let v = val.trim().replace(/['"]+/g, '');
                        obj[headers[idx]] = isNaN(v) || v === '' ? v : Number(v);
                    });
                    return obj;
                });
                alasql(`INSERT INTO ${tableName} SELECT * FROM ?`, [data]);
                renderSchema(); renderMermaid();
                cmEditor.setValue(`SELECT * FROM ${tableName} LIMIT 10;`);
                runQuerySequence();
            } catch(err) { alert("Import Error: " + err.message); }
        };
        reader.readAsText(file);
    }

    function generateMockData() {
        if(!confirm(t('confirm_mock'))) return;
        const queries = [
            "DROP TABLE IF EXISTS Users", "DROP TABLE IF EXISTS Products", "DROP TABLE IF EXISTS Orders",
            "CREATE TABLE Users (id INT, name STRING, country STRING)", "INSERT INTO Users VALUES (1, 'Ivan', 'Russia'), (2, 'John', 'USA'), (3, 'Maria', 'Germany'), (4, 'Li', 'China')",
            "CREATE TABLE Products (id INT, title STRING, price INT)", "INSERT INTO Products VALUES (101, 'Laptop', 1200), (102, 'Phone', 800), (103, 'Chair', 150)",
            "CREATE TABLE Orders (id INT, user_id INT, product_id INT, qty INT)", "INSERT INTO Orders VALUES (1, 1, 101, 1), (2, 2, 102, 2), (3, 1, 103, 5)"
        ];
        queries.forEach(q => alasql(q));
        renderSchema(); renderMermaid();
        cmEditor.setValue("SELECT Users.name, Products.title, Orders.qty \nFROM Orders \nJOIN Users ON Orders.user_id = Users.id\nJOIN Products ON Orders.product_id = Products.id;");
        runQuerySequence();
    }

    function clearDatabase() {
        if(confirm(t('confirm_clear'))) {
            alasql('DROP DATABASE IF EXISTS main'); alasql('CREATE DATABASE main'); alasql('USE main');
            cmEditor.setValue(""); renderSchema();
            document.getElementById('mermaid-chart').innerHTML = '<span class="text-slate-700 text-[10px] italic">No active relations</span>';
            document.getElementById('result-head').innerHTML = ''; document.getElementById('result-body').innerHTML = '';
            document.getElementById('empty-state').classList.remove('hidden');
            document.getElementById('export-btn').classList.add('hidden'); document.getElementById('chart-btn').classList.add('hidden');
            lastResultData = null;
        }
    }

    function runQuerySequence() {
        const loader = document.getElementById('loader-overlay');
        loader.classList.remove('hidden');
        setTimeout(() => { runQueryCore(); loader.classList.add('hidden'); }, 300);
    }

    function runQueryCore() {
        const userSql = cmEditor.getValue();
        const head = document.getElementById('result-head'); const body = document.getElementById('result-body');
        const status = document.getElementById('status-msg'); const empty = document.getElementById('empty-state');
        const exportBtn = document.getElementById('export-btn'); const chartBtn = document.getElementById('chart-btn');
        head.innerHTML = ''; body.innerHTML = '';

        try {
            let result = alasql(userSql);
            empty.classList.add('hidden');
            status.innerHTML = '<span class="text-green-500">● EXECUTION SUCCESS</span>';
            let dataToShow = result;
            if (Array.isArray(result) && result.length > 0 && Array.isArray(result[0])) dataToShow = result[result.length - 1];

            if (Array.isArray(dataToShow) && dataToShow.length > 0 && typeof dataToShow[0] === 'object') {
                lastResultData = dataToShow;
                exportBtn.classList.remove('hidden');
                const hasNumbers = Object.values(dataToShow[0]).some(v => typeof v === 'number');
                if (hasNumbers) chartBtn.classList.remove('hidden'); else chartBtn.classList.add('hidden');
            } else { lastResultData = null; exportBtn.classList.add('hidden'); chartBtn.classList.add('hidden'); }
            renderTable(dataToShow); renderSchema(); renderMermaid();
        } catch (e) {
            empty.classList.add('hidden'); exportBtn.classList.add('hidden'); chartBtn.classList.add('hidden'); lastResultData = null;
            status.innerHTML = '<span class="text-red-500">● FAILED: ' + e.message + '</span>';
            body.innerHTML = `<tr><td class="p-4 text-red-400 font-mono text-xs bg-red-900/10 border border-red-900/50 rounded">${e.message}</td></tr>`;
        }
    }

    function exportToCSV() { if (!lastResultData) return; alasql('SELECT * INTO CSV("sql_export.csv", {headers:true}) FROM ?', [lastResultData]); }

    function renderTable(data) {
        const head = document.getElementById('result-head'); const body = document.getElementById('result-body');
        if (typeof data === 'number' || typeof data === 'string') { body.innerHTML = `<tr><td class="p-4 text-slate-300">${data}</td></tr>`; return; }
        if (!data || data.length === 0) return;
        Object.keys(data[0]).forEach(k => { const th = document.createElement('th'); th.className = "px-4 py-3"; th.innerText = k; head.appendChild(th); });
        data.forEach(row => { const tr = document.createElement('tr'); Object.values(row).forEach(v => { const td = document.createElement('td'); td.className = "px-4 py-2 border-b border-slate-800/50"; td.innerText = v; tr.appendChild(td); }); body.appendChild(tr); });
    }

    function renderSchema() {
        const container = document.getElementById('schema-container'); container.innerHTML = '';
        alasql("SHOW TABLES").forEach(t => {
            const tableName = t.tableid;
            let html = `<div class="font-black text-blue-400 mb-2 flex items-center justify-between text-[10px] uppercase tracking-widest"><span class="flex items-center gap-2">▤ ${tableName}</span><button onclick="dropTable('${tableName}')" class="text-slate-600 hover:text-red-500 transition px-1">×</button></div><ul class="space-y-1 pl-1">`;
            alasql(`SHOW COLUMNS FROM ${tableName}`).forEach(c => { html += `<li class="flex justify-between text-[10px] font-mono border-b border-slate-700/20 pb-1 last:border-0"><span class="text-slate-300">${c.columnid}</span> <span class="text-slate-600">${c.type || ''}</span></li>`; });
            const div = document.createElement('div'); div.className = "bg-slate-800/50 rounded-xl p-3 border border-slate-700/50 hover:border-slate-500 transition group";
            div.innerHTML = html + "</ul>"; container.appendChild(div);
        });
    }

    async function renderMermaid() {
        const chartDiv = document.getElementById('mermaid-chart'); const tables = alasql("SHOW TABLES");
        if (tables.length === 0) return;
        let code = "erDiagram\n";
        for(const t of tables) {
            code += `  ${t.tableid} {\n`;
            alasql(`SHOW COLUMNS FROM ${t.tableid}`).forEach(c => { code += `    ${(c.type || 'str').toLowerCase()} ${c.columnid}\n`; });
            code += `  }\n`;
        }
        try { chartDiv.innerHTML = ''; const { svg } = await mermaid.render('graphDiv', code); chartDiv.innerHTML = svg; } catch (e) { console.warn(e); }
    }

    function showChartModal() {
        if (!lastResultData) return;
        document.getElementById('chart-modal').classList.remove('hidden');
        const keys = Object.keys(lastResultData[0]);
        let valKey = keys.find(k => typeof lastResultData[0][k] === 'number') || keys[1];
        if (myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('myChart'), {
            type: 'bar',
            data: { labels: lastResultData.map(r => r[keys[0]]), datasets: [{ label: valKey, data: lastResultData.map(r => r[valKey]), backgroundColor: 'rgba(59, 130, 246, 0.5)', borderColor: '#3b82f6', borderWidth: 2, borderRadius: 8 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } }, x: { grid: { display: false }, ticks: { color: '#94a3b8' } } } }
        });
    }
    function closeChartModal() { document.getElementById('chart-modal').classList.add('hidden'); }
    function dropTable(name) { if(confirm(`Drop ${name}?`)) { alasql(`DROP TABLE ${name}`); renderSchema(); renderMermaid(); } }
</script>
</body>
</html>
