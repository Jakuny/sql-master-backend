<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Access Denied</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        .gradient-text {
            background: linear-gradient(to right, #f87171, #facc15); /* Красный -> Желтый */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Медленное плавание */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-float { animation: float 4s ease-in-out infinite; }
        
        /* Свечение замка */
        @keyframes lock-pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .lock-icon { animation: lock-pulse 2s infinite; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">

    <!-- Фоновые пятна (Красный акцент) -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
        <div class="absolute top-1/4 left-1/3 w-96 h-96 bg-red-600/10 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-1/4 right-1/3 w-96 h-96 bg-orange-600/10 rounded-full blur-[100px]"></div>
    </div>

    <div class="relative z-10 max-w-2xl w-full text-center">
        
        <!-- Огромная цифра -->
        <h1 class="text-[120px] font-black leading-none tracking-tighter opacity-10 select-none animate-float text-red-500">
            403
        </h1>

        <div class="relative -mt-16">
            <!-- Иконка замка -->
            <div class="mx-auto w-16 h-16 bg-slate-900 border border-red-500/30 rounded-2xl flex items-center justify-center mb-6 shadow-2xl shadow-red-900/20 lock-icon">
                <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>

            <h2 class="text-4xl md:text-5xl font-bold text-white mb-6">
                <span data-i18n="err_403_title">Доступ запрещен</span>
            </h2>
            
            <!-- Терминал -->
            <div class="bg-[#0b1120] border border-slate-700/50 rounded-xl p-6 text-left shadow-2xl max-w-lg mx-auto backdrop-blur-sm">
                <!-- Заголовок терминала -->
                <div class="flex justify-between items-center border-b border-slate-800 pb-3 mb-3">
                    <div class="flex gap-2">
                        <div class="w-3 h-3 rounded-full bg-red-500"></div>
                        <div class="w-3 h-3 rounded-full bg-slate-600"></div>
                        <div class="w-3 h-3 rounded-full bg-slate-600"></div>
                    </div>
                    <span class="text-[10px] text-slate-500 font-mono uppercase">security_audit.log</span>
                </div>
                
                <!-- Код -->
                <div class="font-mono text-sm space-y-2">
                    <div class="text-slate-400">
                        <span class="text-purple-400">user</span>.<span class="text-blue-400">hasPermission</span>(<span class="text-green-400">'admin_panel'</span>)
                    </div>
                    <div class="text-red-400">
                        ➜ false
                    </div>
                    <div class="text-slate-500 border-l-2 border-red-500/50 pl-3 mt-2 text-xs">
                        Error: 403 Forbidden<br>
                        Reason: Insufficient privileges.<br>
                        Incident logged.
                    </div>
                </div>
            </div>

            <p class="text-slate-400 mt-8 mb-8 text-lg" data-i18n="err_403_desc">
                У вас недостаточно прав для просмотра этой страницы.
            </p>

            <div class="flex justify-center gap-4">
                <button onclick="history.back()" class="px-6 py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-xl font-bold transition border border-slate-700">
                    <span data-i18n="btn_back">Назад</span>
                </button>
                <a href="/" class="px-6 py-3 bg-red-600 hover:bg-red-500 text-white rounded-xl font-bold transition shadow-lg shadow-red-500/20">
                    <span data-i18n="btn_home">На главную</span>
                </a>
            </div>
        </div>
    </div>

    <script src="/i18n.js"></script>
    <script>document.addEventListener('DOMContentLoaded', () => { if(window.initTranslations) initTranslations(); });</script>
</body>
</html>
