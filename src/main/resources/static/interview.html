<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Master - Interview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alasql@1.7/dist/alasql.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/sql/sql.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #ccc; }
        .code-font { font-family: 'JetBrains Mono', monospace; }
        
        /* Хардкорный стиль редактора */
        .CodeMirror { 
            height: 100% !important; 
            font-family: 'JetBrains Mono'; 
            background-color: #0a0a0a !important; 
            color: #d4d4d4 !important; 
            border: 1px solid #333; 
            font-size: 14px;
        }
        .CodeMirror-gutters { background-color: #0a0a0a !important; border-right: 1px solid #333; }
        .CodeMirror-cursor { border-left: 2px solid #ef4444 !important; } /* Красный курсор */

        /* Анимация таймера */
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .timer-dot { animation: pulse-red 1s infinite; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden bg-black text-slate-300">

    <!-- Хедер -->
    <header class="border-b border-red-900/30 bg-[#050505] p-4 flex justify-between items-center z-10">
        <div class="flex items-center gap-4">
            <a href="../../../../../../Downloads/sql%20trainer/index.html" class="text-zinc-500 hover:text-white transition font-bold text-sm tracking-wider hover:text-red-500">EXIT</a>
            <div class="h-6 w-px bg-zinc-800"></div>
            <h1 class="text-lg font-bold tracking-tight text-white uppercase tracking-widest flex items-center gap-2">
                Tech Interview <span class="bg-red-600 text-white text-[10px] px-1.5 rounded font-black">HARD</span>
            </h1>
        </div>
        
        <div class="flex items-center gap-4">
            <!-- Выбор языка (минималистичный) -->
            <select id="lang-select" onchange="changeLanguage(this.value)" class="bg-black text-xs font-bold text-zinc-500 border border-zinc-800 rounded px-2 py-1 focus:outline-none hover:text-white transition">
                <option value="ru">RU</option>
                <option value="en">EN</option>
                <option value="es">ES</option>
                <option value="zh">CN</option>
            </select>

            <!-- Таймер -->
            <div class="flex items-center gap-2 bg-red-950/20 px-4 py-1.5 rounded border border-red-900/50">
                <div class="timer-dot w-2 h-2 bg-red-600 rounded-full"></div>
                <div id="timer" class="font-mono text-xl font-bold text-red-500">15:00</div>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        <!-- Панель задачи -->
        <aside class="w-1/3 min-w-[350px] border-r border-zinc-800 bg-[#0a0a0a] flex flex-col p-6 overflow-y-auto">
            <div class="mb-6">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-xs font-bold text-zinc-500 uppercase tracking-widest">Question <span id="q-num" class="text-white">1</span>/3</span>
                    <span class="text-[10px] border border-zinc-700 px-2 py-0.5 rounded text-zinc-500">JOIN Required</span>
                </div>
                <div id="q-desc" class="text-sm leading-7 text-zinc-300 font-light">
                    <!-- Вопрос JS -->
                </div>
            </div>
            
            <div class="mt-auto p-4 bg-black/50 rounded border border-zinc-800">
                <h3 class="text-[10px] font-bold text-zinc-600 uppercase mb-3 tracking-wider">Database Schema</h3>
                <div class="font-mono text-xs text-zinc-400 space-y-2">
                    <div class="flex gap-2"><span class="text-red-400">Managers</span> <span class="text-zinc-600">(id, name)</span></div>
                    <div class="flex gap-2"><span class="text-red-400">Sales</span> <span class="text-zinc-600">(id, manager_id, amount)</span></div>
                </div>
            </div>
        </aside>

        <!-- Редактор и Консоль -->
        <main class="flex-1 flex flex-col min-w-0 bg-black">
            <div class="h-2/3 flex flex-col relative">
                <div class="absolute top-0 right-0 z-10 p-2">
                    <span class="text-[10px] text-zinc-600 uppercase font-bold tracking-widest">SQL Editor</span>
                </div>
                <textarea id="editor"></textarea>
            </div>
            <div class="h-1/3 border-t border-zinc-800 bg-[#050505] flex flex-col">
                <div class="px-4 py-2 border-b border-zinc-900 flex justify-between items-center bg-[#080808]">
                    <span class="text-xs font-bold text-zinc-500 uppercase flex items-center gap-2">
                        <span class="text-green-500">➜</span> Console
                    </span>
                    <button onclick="runCheck()" class="bg-zinc-100 hover:bg-white text-black px-6 py-1 text-xs font-black uppercase tracking-widest transition hover:scale-105">
                        Submit Code
                    </button>
                </div>
                <div id="console-output" class="p-4 font-mono text-xs text-zinc-400 overflow-auto flex-1 custom-scrollbar">
                    <span class="opacity-50">// Waiting for input...</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Модалка финиша -->
    <div id="finish-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-sm transition-opacity duration-500">
        <div class="text-center animate-bounce-in">
            <h1 id="finish-title" class="text-6xl font-black text-white mb-4 tracking-tighter">FAILED</h1>
            <p id="finish-desc" class="text-zinc-500 mb-10 text-lg uppercase tracking-widest">Time is up</p>
            <a href="../../../../../../Downloads/sql%20trainer/index.html" class="border border-zinc-700 text-zinc-400 px-10 py-4 hover:bg-white hover:text-black hover:border-white transition uppercase font-bold tracking-widest text-sm">
                Return to Menu
            </a>
        </div>
    </div>

    <!-- Подключаем переводы -->
    <script src="/js/i18n.js"></script>

    <script>
        const QUESTIONS = [
            {
                desc: {
                    ru: "У нас есть менеджеры и их продажи. Найдите имена менеджеров, у которых сумма продаж <b>больше 1000</b>. Отсортируйте по сумме убывания.",
                    en: "We have managers and sales. Find names of managers with total sales <b>greater than 1000</b>. Sort by total descending.",
                    es: "Encuentra gerentes con ventas totales <b>mayores a 1000</b>. Ordenar descendente.",
                    zh: "查找销售总额<b>大于 1000</b> 的经理姓名。按总额降序排列。"
                },
                check: "SELECT Managers.name, SUM(Sales.amount) as total FROM Managers JOIN Sales ON Managers.id = Sales.manager_id GROUP BY Managers.name HAVING total > 1000 ORDER BY total DESC"
            },
            {
                desc: {
                    ru: "Найдите менеджера, который <b>не сделал ни одной продажи</b> (используйте LEFT JOIN).",
                    en: "Find a manager who <b>has made no sales</b> (use LEFT JOIN).",
                    es: "Encuentra un gerente que <b>no haya realizado ventas</b> (usa LEFT JOIN).",
                    zh: "查找<b>没有销售记录</b>的经理（使用 LEFT JOIN）。"
                },
                check: "SELECT Managers.name FROM Managers LEFT JOIN Sales ON Managers.id = Sales.manager_id WHERE Sales.id IS NULL"
            },
            {
                desc: {
                    ru: "Посчитайте средний чек (amount) для каждого менеджера.",
                    en: "Calculate the average sales amount for each manager.",
                    es: "Calcule el monto promedio de ventas para cada gerente.",
                    zh: "计算每位经理的平均销售额。"
                },
                check: "SELECT Managers.name, AVG(Sales.amount) FROM Managers JOIN Sales ON Managers.id = Sales.manager_id GROUP BY Managers.name"
            }
        ];

        let qIndex = 0;
        let timeLeft = 15 * 60; 
        let editor;
        let timerInterval;

        function init() {
            // Инициализация БД
            try {
                alasql('DROP DATABASE IF EXISTS interview_db');
                alasql('CREATE DATABASE interview_db');
                alasql('USE interview_db');
                alasql('CREATE TABLE Managers (id INT, name STRING)');
                alasql('INSERT INTO Managers VALUES (1, "Steve"), (2, "Bill"), (3, "Elon")');
                alasql('CREATE TABLE Sales (id INT, manager_id INT, amount INT)');
                alasql('INSERT INTO Sales VALUES (10, 1, 500), (11, 1, 600), (12, 2, 2000), (13, 2, 100)');
            } catch(e) { console.error(e); }
            
            // Настройка языка
            if(window.initTranslations) initTranslations();
            
            // Редактор
            editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
                mode: "text/x-sql", theme: "dracula", lineNumbers: true, smartIndent: true
            });
            
            loadQuestion();
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                finish(false, "TIME IS UP");
                return;
            }
            timeLeft--;
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
            
            // Краснеет когда мало времени
            if(timeLeft < 60) document.getElementById('timer').classList.add('text-red-600', 'animate-pulse');
        }

        function loadQuestion() {
            let lang = localStorage.getItem('sql_lang') || 'ru';
            const q = QUESTIONS[qIndex];
            const text = q.desc[lang] || q.desc['en'];
            
            document.getElementById('q-num').innerText = qIndex + 1;
            document.getElementById('q-desc').innerHTML = text;
            editor.setValue("");
            document.getElementById('console-output').innerHTML = `<span class="opacity-50 text-zinc-500">// System ready. Waiting for input...</span>`;
        }

        // Переключение языка обновляет текущий вопрос
        window.changeLanguage = function(lang) {
            localStorage.setItem('sql_lang', lang);
            loadQuestion();
        }

        function runCheck() {
            const userSql = editor.getValue();
            const consoleEl = document.getElementById('console-output');
            
            if(!userSql.trim()) {
                consoleEl.innerHTML = `<span class="text-yellow-600">⚠ Empty query</span>`;
                return;
            }

            try {
                const userRes = alasql(userSql);
                const checkRes = alasql(QUESTIONS[qIndex].check);

                // Вывод результата в консоль
                let output = JSON.stringify(userRes.slice(0,3), null, 2);
                if(userRes.length > 3) output += "\n... (" + (userRes.length-3) + " more rows)";
                
                consoleEl.innerHTML = `<div class="text-zinc-300 mb-2">OUTPUT:</div><pre class="text-xs text-zinc-500">${output}</pre>`;

                if (JSON.stringify(userRes) === JSON.stringify(checkRes)) {
                    consoleEl.innerHTML += `<div class="mt-4 text-green-500 font-bold border-t border-zinc-800 pt-2">
                        [SUCCESS] Test Case Passed.
                    </div>`;
                    
                    if (qIndex < QUESTIONS.length - 1) {
                        setTimeout(() => {
                            qIndex++;
                            loadQuestion();
                        }, 1500);
                    } else {
                        setTimeout(() => finish(true), 1000);
                    }
                } else {
                    consoleEl.innerHTML += `<div class="mt-4 text-red-500 font-bold border-t border-zinc-800 pt-2">
                        [FAILED] Expected different result.
                    </div>`;
                }
            } catch (e) {
                consoleEl.innerHTML = `<span class="text-red-500 font-mono">RUNTIME ERROR: ${e.message}</span>`;
            }
        }

        function finish(success, reason) {
            clearInterval(timerInterval);
            const modal = document.getElementById('finish-modal');
            const title = document.getElementById('finish-title');
            const desc = document.getElementById('finish-desc');
            
            modal.classList.remove('hidden');
            if (success) {
                title.innerText = "HIRED";
                title.classList.remove('text-white');
                title.classList.add('text-green-500');
                desc.innerText = "You have successfully passed the technical interview.";
                confetti({ particleCount: 300, spread: 120, colors: ['#22c55e', '#ffffff'] });
            } else {
                title.innerText = "REJECTED";
                title.classList.remove('text-white');
                title.classList.add('text-red-600');
                desc.innerText = reason || "Too many errors or time limit exceeded.";
            }
        }

        init();
    </script>
</body>
</html>
