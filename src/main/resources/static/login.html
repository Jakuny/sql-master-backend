<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- (Head такой же, как был, с тем же стилем) -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Master - Вход</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        @keyframes softFadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-soft-fade { animation: softFadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; will-change: transform, opacity; }
        .logo-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .input-box { background-color: #1e293b; border: 1px solid #334155; transition: all 0.3s ease-in-out; }
        .input-box:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); outline: none; }
        .lang-dropdown { opacity: 0; transform: translateY(-10px) scale(0.95); pointer-events: none; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .lang-dropdown.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
        @keyframes gentleShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        .shake { animation: gentleShake 0.2s ease-in-out; }
        .loader { width: 18px; height: 18px; border: 2px solid rgba(255, 255, 255, 0.2); border-top-color: #ffffff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden selection:bg-blue-500/30">

<div class="absolute top-[-20%] left-[-10%] w-[600px] h-[600px] bg-blue-600/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[600px] h-[600px] bg-purple-600/10 rounded-full blur-[120px] pointer-events-none"></div>

<!-- Язык -->
<div class="absolute top-6 right-6 z-50 animate-soft-fade">
    <div class="relative">
        <button onclick="toggleLangMenu()" id="lang-btn" class="bg-slate-800/50 backdrop-blur-md border border-slate-700 hover:border-slate-500 px-4 py-2 rounded-xl flex items-center gap-2 text-xs font-bold text-slate-300 transition-all active:scale-95">
            <span id="current-lang-label">Русский</span>
            <svg class="w-3 h-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </button>
        <div id="lang-menu" class="lang-dropdown absolute right-0 mt-2 w-40 bg-slate-900/90 backdrop-blur-xl border border-slate-700 rounded-2xl shadow-2xl p-2">
            <button onclick="handleLangChange('ru', 'Русский')" class="w-full text-left px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-blue-600 transition-colors">Русский</button>
            <button onclick="handleLangChange('en', 'English')" class="w-full text-left px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-blue-600 transition-colors">English</button>
            <button onclick="handleLangChange('es', 'Español')" class="w-full text-left px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-blue-600 transition-colors">Español</button>
            <button onclick="handleLangChange('zh', '中文')" class="w-full text-left px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-blue-600 transition-colors">中文</button>
        </div>
    </div>
</div>

<!-- Лого -->
<div class="mb-10 animate-soft-fade">
    <a href="/" class="flex items-center select-none group">
        <div class="bg-blue-600 px-3 py-1 rounded-lg logo-glow font-black text-white transform group-hover:scale-110 transition-transform duration-300 flex-shrink-0 will-change-transform">SQL</div>
        <span class="ml-3 font-black text-2xl tracking-tight text-white group-hover:text-blue-400 transition-colors duration-300">Master</span>
    </a>
</div>

<!-- Карточка -->
<div id="login-card" class="w-full max-w-[420px] bg-slate-900/70 backdrop-blur-2xl border border-slate-800 rounded-[2.5rem] shadow-2xl p-10 animate-soft-fade relative z-10 overflow-hidden text-center">
    <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-blue-500 to-purple-500"></div>

    <h2 class="text-2xl font-black text-white tracking-tight uppercase mb-2" data-i18n="auth_welcome">С возвращением!</h2>
    <p class="text-slate-500 text-sm font-medium mb-8" data-i18n="auth_login_desc">Введите данные для входа</p>

    <div id="error-msg" class="hidden mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-xs font-bold"></div>

    <form id="login-form" class="space-y-5 text-left">
        <div class="space-y-1.5">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1" data-i18n="lbl_email">Email</label>
            <input type="email" id="email" required class="input-box w-full text-white text-sm rounded-2xl p-4 transition-all placeholder-slate-600" placeholder="mail@example.com">
        </div>

        <div class="space-y-1.5">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1" data-i18n="lbl_password">Пароль</label>
            <input type="password" id="password" required class="input-box w-full text-white text-sm rounded-2xl p-4 transition-all placeholder-slate-600" placeholder="••••••••">
        </div>

        <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black uppercase tracking-[0.2em] text-[10px] py-5 rounded-2xl transition-all shadow-lg shadow-blue-900/20 flex items-center justify-center gap-3 active:scale-[0.98] mt-4">
            <span id="btn-text" data-i18n="btn_login">Войти</span>
            <div id="loading-spinner" class="loader hidden"></div>
        </button>
    </form>

    <div class="mt-8">
        <p class="text-slate-500 text-xs font-medium">
            <span data-i18n="login_footer">Нет аккаунта?</span>
            <a href="register.html" class="text-blue-400 hover:text-blue-300 font-bold ml-1 transition-colors" data-i18n="btn_register">Регистрация</a>
        </p>
    </div>
</div>

<div class="mt-10 animate-soft-fade">
    <a href="/" class="text-[10px] font-black text-slate-600 hover:text-slate-400 uppercase tracking-[0.3em] transition-colors" data-i18n="back_menu">← На главную</a>
</div>

<script src="/js/i18n.js"></script>
<script>
    window.toggleLangMenu = () => document.getElementById('lang-menu').classList.toggle('open');
    window.handleLangChange = (lang, label) => {
        document.getElementById('lang-menu').classList.remove('open');
        if(localStorage.getItem('sql_lang') === lang) return;
        const card = document.getElementById('login-card');
        card.style.transition = 'all 0.4s ease'; card.style.opacity = '0'; card.style.transform = 'translateY(15px)';
        setTimeout(() => {
            if(window.changeLanguage) window.changeLanguage(lang);
            document.getElementById('current-lang-label').innerText = label;
            card.style.opacity = '1'; card.style.transform = 'translateY(0)';
        }, 400);
    };

    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submit-btn');
    const spinner = document.getElementById('loading-spinner');
    const btnText = document.getElementById('btn-text');
    const card = document.getElementById('login-card');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Сбрасываем UI ПЕРЕД запросом
        setLoading(true);
        showError(null);

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            // ВНИМАНИЕ: Эндпоинт с опечаткой как в ТЗ (sing-in)
            const response = await fetch('/api/v1/auth/sing-in', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            // Если сервер вернул 401/403/500
            if (!response.ok) {
                const data = await response.json().catch(() => ({}));
                throw new Error(data.message || "Неверный логин или пароль");
            }

            const data = await response.json();

            if (data.token && data.refreshToken) {
                localStorage.setItem('sql_token', data.token);
                localStorage.setItem('sql_refresh_token', data.refreshToken);

                // Успех!
                btnText.innerText = "SUCCESS";
                submitBtn.classList.replace('bg-blue-600', 'bg-green-600');

                // Редирект
                const params = new URLSearchParams(window.location.search);
                const redirectUrl = params.get('from') || 'index.html';
                setTimeout(() => window.location.href = redirectUrl, 600);
            } else {
                throw new Error("Invalid server response (no token)");
            }

        } catch (err) {
            showError(err.message);
            // ВАЖНО: Разблокируем кнопку при ошибке
            setLoading(false);
        }
    });

    function setLoading(isLoading) {
        submitBtn.disabled = isLoading;
        spinner.classList.toggle('hidden', !isLoading);
        btnText.style.display = isLoading ? 'none' : 'block';
        if(!isLoading) {
            // Возвращаем текст кнопки (берем перевод, если есть)
            const lang = localStorage.getItem('sql_lang') || 'ru';
            // Простая заглушка, если i18n не успел
            btnText.innerText = (lang === 'ru') ? "Войти" : "Login";
            // Вызываем i18n обновление, чтобы текст был точно верным
            if(window.initTranslations) window.initTranslations();
        }
    }

    function showError(msg) {
        if (msg) {
            errorMsg.innerText = msg;
            errorMsg.classList.remove('hidden');
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 300);
        } else {
            errorMsg.classList.add('hidden');
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        if (window.initTranslations) initTranslations();
        const savedLang = localStorage.getItem('sql_lang') || 'ru';
        const labels = { ru: 'Русский', en: 'English', es: 'Español', zh: '中文' };
        document.getElementById('current-lang-label').innerText = labels[savedLang];
    });

    document.addEventListener('click', (e) => {
        if (!document.getElementById('lang-btn').contains(e.target)) document.getElementById('lang-menu').classList.remove('open');
    });
</script>
</body>
</html>
