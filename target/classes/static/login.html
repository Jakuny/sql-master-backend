<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Master - Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        @keyframes softFadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-soft-fade { animation: softFadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .logo-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .input-box { background-color: #1e293b; border: 1px solid #334155; transition: all 0.3s ease-in-out; }
        .input-box:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); outline: none; }
        .lang-dropdown { opacity: 0; transform: translateY(-10px) scale(0.95); pointer-events: none; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .lang-dropdown.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
        @keyframes gentleShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        .shake { animation: gentleShake 0.2s ease-in-out; }
        .loader { width: 18px; height: 18px; border: 2px solid rgba(255, 255, 255, 0.2); border-top-color: #ffffff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden selection:bg-blue-500/30">

<div class="absolute top-[-20%] left-[-10%] w-[600px] h-[600px] bg-blue-600/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[600px] h-[600px] bg-purple-600/10 rounded-full blur-[120px] pointer-events-none"></div>

<div class="absolute top-6 right-6 z-50 animate-soft-fade">
    <div class="relative">
        <button onclick="toggleLangMenu(event)" id="lang-btn" class="bg-slate-800/50 backdrop-blur-md border border-slate-700 hover:border-slate-500 px-4 py-2 rounded-xl flex items-center gap-2 text-xs font-bold text-slate-300 transition-all active:scale-95">
            <span id="current-lang-label">English</span>
            <svg class="w-3 h-3 opacity-50 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </button>
        <div id="lang-menu" class="lang-dropdown absolute right-0 mt-2 w-40 bg-slate-900/90 backdrop-blur-xl border border-slate-700 rounded-2xl shadow-2xl p-2">
            <button onclick="handleLangChange('ru', 'Русский')" class="w-full text-left px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-blue-600 transition-colors">Русский</button>
            <button onclick="handleLangChange('en', 'English')" class="w-full text-left px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-blue-600 transition-colors">English</button>
            <button onclick="handleLangChange('es', 'Español')" class="w-full text-left px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-blue-600 transition-colors">Español</button>
            <button onclick="handleLangChange('zh', '中文')" class="w-full text-left px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-blue-600 transition-colors">中文</button>
        </div>
    </div>
</div>

<div class="mb-10 animate-soft-fade">
    <a href="/static" class="flex items-center select-none group">
        <div class="bg-blue-600 px-3 py-1 rounded-lg logo-glow font-black text-white transform group-hover:scale-110 transition-transform duration-300 flex-shrink-0">SQL</div>
        <span class="ml-3 font-black text-2xl tracking-tight text-white group-hover:text-blue-400 transition-colors duration-300">Master</span>
    </a>
</div>

<div id="auth-card" class="w-full max-w-[420px] bg-slate-900/70 backdrop-blur-2xl border border-slate-800 rounded-[2.5rem] shadow-2xl p-10 animate-soft-fade relative z-10 overflow-hidden text-center transition-all duration-500">
    <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-blue-500 to-purple-500"></div>

    <h2 id="auth-title" class="text-2xl font-black text-white tracking-tight uppercase mb-2 transition-opacity" data-i18n="auth_welcome">Welcome Back!</h2>
    <p id="auth-desc" class="text-slate-500 text-sm font-medium mb-8 transition-opacity" data-i18n="auth_login_desc">Enter your credentials to login</p>

    <div id="error-msg" class="hidden mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-xs font-bold"></div>
    <div id="success-msg" class="hidden mb-6 p-4 bg-green-500/10 border border-green-500/20 rounded-2xl text-green-400 text-xs font-bold"></div>

    <form id="login-form" class="space-y-5 text-left">
        <div class="space-y-1.5">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1" data-i18n="lbl_email">Email</label>
            <input type="email" id="login-email" required class="input-box w-full text-white text-sm rounded-2xl p-4 placeholder-slate-600" placeholder="mail@example.com">
        </div>
        <div class="space-y-1.5">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1" data-i18n="lbl_password">Password</label>
            <input type="password" id="login-password" required class="input-box w-full text-white text-sm rounded-2xl p-4 placeholder-slate-600" placeholder="••••••••">
        </div>
        <button type="submit" class="auth-btn w-full bg-blue-600 hover:bg-blue-500 text-white font-black uppercase tracking-[0.2em] text-[10px] py-5 rounded-2xl transition-all shadow-lg shadow-blue-900/20 flex items-center justify-center gap-3 active:scale-[0.98] mt-4">
            <span class="btn-text" data-i18n="btn_login">Login</span>
            <div class="loader hidden"></div>
        </button>
    </form>

    <form id="register-form" class="space-y-5 text-left hidden">
        <div class="space-y-1.5">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1" data-i18n="lbl_username">Username</label>
            <input type="text" id="reg-username" required maxlength="15" class="input-box w-full text-white text-sm rounded-2xl p-4 placeholder-slate-600" placeholder="user_123">
            <p class="text-[10px] text-slate-600 ml-1" data-i18n="lbl_username_hint">A-Z, 0-9, _ (Max 15)</p>
        </div>
        <div class="space-y-1.5">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1" data-i18n="lbl_email">Email</label>
            <input type="email" id="reg-email" required class="input-box w-full text-white text-sm rounded-2xl p-4 placeholder-slate-600" placeholder="mail@example.com">
        </div>
        <div class="space-y-1.5">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1" data-i18n="lbl_password">Password</label>
            <input type="password" id="reg-password" required class="input-box w-full text-white text-sm rounded-2xl p-4 placeholder-slate-600" placeholder="••••••••">
        </div>
        <button type="submit" class="auth-btn w-full bg-purple-600 hover:bg-purple-500 text-white font-black uppercase tracking-[0.2em] text-[10px] py-5 rounded-2xl transition-all shadow-lg shadow-purple-900/20 flex items-center justify-center gap-3 active:scale-[0.98] mt-4">
            <span class="btn-text" data-i18n="btn_register">Register</span>
            <div class="loader hidden"></div>
        </button>
    </form>

    <div class="mt-8">
        <p class="text-slate-500 text-xs font-medium">
            <span id="toggle-text" data-i18n="login_footer">Don't have an account?</span>
            <button onclick="toggleMode()" id="toggle-btn" class="text-blue-400 hover:text-blue-300 font-bold ml-1 transition-colors" data-i18n="btn_register">Register</button>
        </p>
    </div>
</div>

<div class="mt-10 animate-soft-fade">
    <a href="/static" class="text-[10px] font-black text-slate-600 hover:text-slate-400 uppercase tracking-[0.3em] transition-colors" data-i18n="back_menu">← Go Home</a>
</div>

<script src="/js/i18n.js"></script>
<script>
    let isLogin = true;
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const authTitle = document.getElementById('auth-title');
    const authDesc = document.getElementById('auth-desc');
    const toggleText = document.getElementById('toggle-text');
    const toggleBtn = document.getElementById('toggle-btn');
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    const card = document.getElementById('auth-card');

    document.getElementById('reg-username').addEventListener('input', function() {
        this.value = this.value.replace(/[^a-zA-Z0-9_]/g, '');
    });

    window.toggleLangMenu = (e) => {
        e.stopPropagation();
        document.getElementById('lang-menu').classList.toggle('open');
    };

    window.handleLangChange = (lang, label) => {
        document.getElementById('lang-menu').classList.remove('open');
        if (localStorage.getItem('sql_lang') === lang) return;

        card.style.opacity = '0';
        card.style.transform = 'translateY(15px)';
        setTimeout(() => {
            if(window.changeLanguage) window.changeLanguage(lang);
            document.getElementById('current-lang-label').innerText = label;
            card.style.opacity = '1';
            card.style.transform = 'translateY(0)';
        }, 300);
    };

    document.addEventListener('click', (e) => {
        const menu = document.getElementById('lang-menu');
        const btn = document.getElementById('lang-btn');
        if (menu && menu.classList.contains('open') && !btn.contains(e.target) && !menu.contains(e.target)) {
            menu.classList.remove('open');
        }
    });

    window.toggleMode = () => {
        isLogin = !isLogin;
        errorMsg.classList.add('hidden');
        successMsg.classList.add('hidden');

        authTitle.style.opacity = '0';
        authDesc.style.opacity = '0';

        setTimeout(() => {
            if (isLogin) {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                authTitle.setAttribute('data-i18n', 'auth_welcome');
                authDesc.setAttribute('data-i18n', 'auth_login_desc');
                toggleText.setAttribute('data-i18n', 'login_footer');
                toggleBtn.setAttribute('data-i18n', 'btn_register');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                authTitle.setAttribute('data-i18n', 'auth_reg_title');
                authDesc.setAttribute('data-i18n', 'auth_reg_desc');
                toggleText.setAttribute('data-i18n', 'reg_footer');
                toggleBtn.setAttribute('data-i18n', 'btn_login');
            }
            if (window.applyTranslations) window.applyTranslations();
            authTitle.style.opacity = '1';
            authDesc.style.opacity = '1';
        }, 200);
    };

    function setLoading(form, isLoading) {
        const btn = form.querySelector('.auth-btn');
        const spinner = form.querySelector('.loader');
        const text = form.querySelector('.btn-text');
        btn.disabled = isLoading;
        spinner.classList.toggle('hidden', !isLoading);
        text.style.display = isLoading ? 'none' : 'block';
    }

    function showMessage(msg, isError = true) {
        errorMsg.classList.add('hidden');
        successMsg.classList.add('hidden');
        if (msg) {
            const el = isError ? errorMsg : successMsg;
            el.innerText = msg;
            el.classList.remove('hidden');
            if (isError) {
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 300);
            }
        }
    }

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        setLoading(loginForm, true);
        showMessage(null);

        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        try {
            const response = await fetch('/api/v1/auth/sing-in', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (!response.ok) throw new Error(window.t('err_invalid_credentials'));

            const data = await response.json();
            if (data.token && data.refreshToken) {
                localStorage.setItem('sql_token', data.token);
                localStorage.setItem('sql_refresh_token', data.refreshToken);

                const btnText = loginForm.querySelector('.btn-text');
                btnText.innerText = window.t('msg_success');
                btnText.style.display = 'block';
                loginForm.querySelector('.loader').classList.add('hidden');
                loginForm.querySelector('.auth-btn').classList.replace('bg-blue-600', 'bg-green-600');

                const params = new URLSearchParams(window.location.search);
                setTimeout(() => window.location.href = params.get('from') || '/', 600);
            } else {
                throw new Error("No token received");
            }
        } catch (err) {
            showMessage(err.message, true);
            setLoading(loginForm, false);
        }
    });

    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        setLoading(registerForm, true);
        showMessage(null);

        const username = document.getElementById('reg-username').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;

        try {
            const response = await fetch('/api/v1/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            if (!response.ok) {
                const data = await response.json().catch(() => ({}));
                throw new Error(data.message || window.t('err_reg_failed'));
            }

            setLoading(registerForm, false);
            showMessage(window.t('msg_success_reg'), false);

            setTimeout(() => {
                document.getElementById('login-email').value = email;
                document.getElementById('login-password').value = '';
                toggleMode();
            }, 1500);

        } catch (err) {
            showMessage(err.message, true);
            setLoading(registerForm, false);
        }
    });

    window.onTranslationsLoaded = function() {
        const labels = { ru: 'Русский', en: 'English', es: 'Español', zh: '中文' };
        const savedLang = localStorage.getItem('sql_lang') || 'en';
        const lbl = document.getElementById('current-lang-label');
        if (lbl) lbl.innerText = labels[savedLang];
    };
</script>
</body>
</html>
