<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Master - Sandbox</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/alasql@1.7/dist/alasql.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/eclipse.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/sql/sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/sql-hint.min.js"></script>

    <link rel="stylesheet" href="/css/style.css">

    <style>
        :root {
            --bg-body: #050b14; --text-main: #f8fafc; --text-muted: #94a3b8;
            --card-bg: #0f172a; --card-border: #334155;
            --nav-bg: rgba(5, 11, 20, 0.85); --nav-border: rgba(255, 255, 255, 0.05);
        }[data-theme="light"] {
             --bg-body: #f8fafc; --text-main: #0f172a; --text-muted: #475569;
             --card-bg: #ffffff; --card-border: #e2e8f0;
             --nav-bg: rgba(248, 250, 252, 0.9); --nav-border: rgba(0, 0, 0, 0.05);
         }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); transition: background-color 0.5s ease, color 0.5s ease; overflow: hidden; }
        .bg-theme-nav { background-color: var(--nav-bg); backdrop-filter: blur(16px); border-bottom: 1px solid var(--nav-border); }
        .bg-theme-card { background-color: var(--card-bg); border: 1px solid var(--card-border); }

        .loader { width: 24px; height: 24px; border: 3px solid rgba(59, 130, 246, 0.2); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Результаты таблицы */
        .result-cell { border-bottom: 1px solid var(--card-border); padding: 0.5rem 1rem; font-size: 0.75rem; font-family: 'JetBrains Mono', monospace; }
        .result-head { border-bottom: 1px solid var(--card-border); padding: 0.75rem 1rem; color: #3b82f6; font-size: 0.625rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background-color: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; border: 2px solid var(--bg-body); }[data-theme="light"] ::-webkit-scrollbar-thumb { background-color: #cbd5e1; }
        .swal2-popup { background: var(--card-bg) !important; border-radius: 1.5rem !important; border: 1px solid var(--card-border) !important; color: var(--text-main) !important; backdrop-filter: blur(10px); }

        /* Кнопки сайдбара */
        .tool-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.25rem; width: 100%; padding: 0.75rem 0; border-radius: 1rem; font-size: 0.65rem; font-weight: 900; text-transform: uppercase; transition: all 0.2s ease; border: 1px solid transparent; color: var(--text-muted); }
        .tool-btn:hover { background: var(--card-bg); color: var(--text-main); border-color: var(--card-border); }

        /* --- КАНВАС И СЕТКА --- */
        .canvas-bg {
            background-color: var(--bg-body);
            background-image: radial-gradient(var(--card-border) 1px, transparent 1px);
            background-size: 24px 24px;
            cursor: grab;
            position: relative;
            overflow: hidden;
        }
        .canvas-bg:active { cursor: grabbing; }
        #canvas-inner {
            position: absolute;
            transform-origin: 0 0;
            width: 10000px;
            height: 10000px;
        }

        /* --- ТАБЛИЦЫ БД (ERD NODES) --- */
        .db-table-card {
            position: absolute;
            background: #1e293b; /* Всегда темные, как в IDE */
            border: 1px solid #334155;
            border-radius: 0.75rem;
            width: 220px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
            cursor: default;
        }
        [data-theme="light"] .db-table-card { background: #ffffff; border-color: #e2e8f0; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        .db-table-header {
            background: #0f172a;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            font-weight: 700;
            color: #f8fafc;
            border-bottom: 1px solid #334155;
            cursor: move; /* Индикатор перетаскивания */
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        [data-theme="light"] .db-table-header { background: #f8fafc; color: #0f172a; border-color: #e2e8f0; }

        .db-table-row {
            padding: 0.25rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: #94a3b8;
        }
        .db-table-row:hover { background: rgba(255,255,255,0.05); }
        [data-theme="light"] .db-table-row { color: #475569; }
        [data-theme="light"] .db-table-row:hover { background: rgba(0,0,0,0.02); }

        .db-col-name { display: flex; items-center; gap: 0.5rem; color: #e2e8f0; }
        [data-theme="light"] .db-col-name { color: #0f172a; }
        .db-col-type { color: #64748b; font-size: 0.65rem; }

        /* --- РЕСАЙЗЕРЫ --- */
        .resizer-x { width: 6px; background: var(--nav-border); cursor: col-resize; transition: background 0.2s; z-index: 50; }
        .resizer-x:hover, .resizer-x.active { background: #3b82f6; }

        .resizer-y { height: 6px; background: var(--nav-border); cursor: row-resize; transition: background 0.2s; z-index: 50; }
        .resizer-y:hover, .resizer-y.active { background: #3b82f6; }

        .no-select { user-select: none; pointer-events: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden selection:bg-blue-500/30">

<!-- ХЕДЕР -->
<header id="main-header" class="fixed top-0 w-full bg-theme-nav z-50 transition-colors duration-500 border-b border-theme h-[88px]"></header>

<!-- ОСНОВНОЙ КОНТЕЙНЕР (С Flex для ресайза) -->
<div class="flex-1 w-full flex relative overflow-hidden app-bg" style="height: calc(100vh - 88px); margin-top: 88px;">

    <!-- Сайдбар инструментов -->
    <aside class="w-16 md:w-20 border-r border-theme bg-theme-nav flex flex-col items-center py-4 gap-2 z-20 shadow-xl shrink-0">
        <button onclick="generateMockData()" class="tool-btn group" title="Load Mock Data">
            <span class="text-xl group-hover:rotate-12 transition-transform">🎲</span>
            <span data-i18n="sand_mock">Mock</span>
        </button>
        <button onclick="document.getElementById('csv-upload').click()" class="tool-btn group" title="Upload CSV">
            <span class="text-xl group-hover:-translate-y-1 transition-transform">📁</span>
            <span data-i18n="sand_csv">CSV</span>
        </button>
        <input type="file" id="csv-upload" accept=".csv" class="hidden" onchange="handleFileUpload(this)">

        <div class="flex-1"></div>
        <button onclick="clearDatabase()" class="tool-btn group hover:!border-red-500/30 hover:!bg-red-500/10" title="Clear Database">
            <span class="text-xl text-red-500 group-hover:scale-110 transition-transform">🗑️</span>
            <span data-i18n="sand_clear" class="text-red-500">Clear</span>
        </button>
    </aside>

    <!-- ЛЕВАЯ ПАНЕЛЬ (Редактор + Вывод) -->
    <div id="left-panel" class="flex flex-col min-w-0 z-10 shadow-2xl" style="width: 45%;">

        <!-- Верх: Редактор -->
        <div id="editor-panel" class="flex flex-col relative" style="height: 50%;">
            <div class="bg-theme-card px-6 py-2 flex justify-between items-center z-10 border-b border-theme">
                <div class="flex items-center gap-3">
                    <span class="text-[10px] font-black text-theme-muted uppercase tracking-widest" data-i18n="lbl_editor">SQL Editor</span>
                    <span class="text-[9px] text-theme-muted font-mono px-2 py-0.5 bg-slate-800/50 rounded border border-slate-700/50">Alt+Enter</span>
                </div>
                <div class="flex items-center gap-3">
                    <div id="query-spinner" class="loader !w-4 !h-4 hidden"></div>
                    <button onclick="runQuery()" id="run-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-1.5 rounded-xl text-xs font-black uppercase tracking-widest shadow-[0_0_15px_rgba(59,130,246,0.3)] active:scale-95 transition-all flex items-center gap-2">
                        <span>▶</span> <span data-i18n="btn_run">RUN</span>
                    </button>
                </div>
            </div>
            <div class="flex-1 relative overflow-hidden" style="background-color: var(--bg-editor);">
                <textarea id="editor" class="w-full h-full"></textarea>
            </div>
        </div>

        <!-- Ресайзер по вертикали -->
        <div id="resizer-y" class="resizer-y flex items-center justify-center">
            <div class="w-8 h-1 bg-slate-500/50 rounded-full"></div>
        </div>

        <!-- Низ: Вывод -->
        <div id="output-panel" class="flex flex-col relative app-bg flex-1">
            <div class="bg-theme-card px-6 py-2 flex justify-between items-center z-10 border-b border-theme">
                <span class="text-[10px] font-black text-theme-muted uppercase tracking-widest" data-i18n="lbl_result">Output</span>
                <div class="flex items-center gap-3">
                    <span id="status-msg" class="text-[10px] font-black uppercase tracking-wider px-3 py-1 rounded-md hidden transition-all"></span>
                    <button onclick="exportToCSV()" id="export-btn" class="hidden text-[10px] font-black uppercase tracking-widest text-green-500 hover:text-white border border-green-500/30 hover:border-green-500 bg-green-500/10 hover:bg-green-500 px-3 py-1 rounded-lg transition-all flex items-center gap-2">
                        💾 CSV
                    </button>
                </div>
            </div>
            <div class="flex-1 overflow-auto custom-scrollbar p-0 relative">
                <table class="w-full text-left whitespace-nowrap hidden" id="result-table">
                    <thead class="bg-theme-card sticky top-0 z-10 shadow-sm"><tr id="result-head"></tr></thead>
                    <tbody id="result-body" class="divide-y border-theme"></tbody>
                </table>
                <div id="error-msg" class="hidden m-6 p-4 text-red-500 bg-red-500/10 border border-red-500/20 rounded-xl text-xs font-mono shadow-inner leading-relaxed"></div>
                <div id="empty-state" class="h-full flex flex-col items-center justify-center text-theme-muted select-none opacity-40">
                    <div class="text-6xl mb-4">⌨️</div>
                    <div class="text-[10px] font-black uppercase tracking-widest" data-i18n="empty_state">Execute query</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Ресайзер по горизонтали -->
    <div id="resizer-x" class="resizer-x flex flex-col items-center justify-center">
        <div class="w-1 h-8 bg-slate-500/50 rounded-full"></div>
    </div>

    <!-- ПРАВАЯ ПАНЕЛЬ (Канвас ERD) -->
    <div id="right-panel" class="flex-1 relative canvas-bg">

        <!-- Элементы управления канвасом -->
        <div class="absolute bottom-6 right-6 z-20 flex gap-2">
            <button onclick="resetCanvas()" class="w-10 h-10 bg-theme-card border border-theme rounded-xl flex items-center justify-center text-theme-main hover:bg-slate-800 transition-colors shadow-lg" title="Center View">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
        </div>

        <div class="absolute top-6 right-6 z-20 bg-theme-card px-4 py-2 rounded-xl border border-theme shadow-lg opacity-70 pointer-events-none">
            <span class="text-[10px] font-black uppercase tracking-widest text-theme-muted" data-i18n="sand_viz">Schema View</span>
        </div>

        <!-- Само полотно -->
        <div id="canvas-inner">
            <!-- Сюда JS будет инжектить карточки таблиц -->
        </div>
    </div>
</div>

<script src="/js/i18n.js"></script>
<script type="module">
    import { fetchWithAuth, logout } from '/js/api.js';
    import { renderHeader } from '/js/components/header.js';
    window.logout = logout;

    let cmEditor;
    let lastResultData = null;

    // --- ПЕРЕМЕННЫЕ CANVAS И DRAG-N-DROP ---
    let scale = 1, panX = 0, panY = 0;
    let isCanvasDragging = false, canvasStartX, canvasStartY;
    let tablePositions = {}; // Хранит { tableName: {x, y} }
    let activeDragTable = null, tableStartX, tableStartY;

    // --- ПЕРЕМЕННЫЕ РЕСАЙЗЕРОВ ---
    let isResizingX = false;
    let isResizingY = false;

    async function initPage() {
        const savedTheme = localStorage.getItem('sql_theme') || 'dark';
        document.body.setAttribute('data-theme', savedTheme);

        let authData = { isLoggedIn: false };
        if (localStorage.getItem('sql_token')) {
            try {
                const response = await fetchWithAuth('/api/v1/profiles/me');
                if (response.ok) authData = { isLoggedIn: true, ...(await response.json()) };
            } catch (e) {}
        }

        renderHeader(authData);
        if (window.initTranslations) await window.initTranslations();

        cmEditor = CodeMirror.fromTextArea(document.getElementById("editor"), {
            mode: "text/x-sql",
            theme: savedTheme === 'light' ? 'eclipse' : 'dracula',
            lineNumbers: true,
            smartIndent: true,
            extraKeys: { "Ctrl-Space": "autocomplete", "Alt-Enter": () => window.runQuery() },
            hintOptions: { tables: {} }
        });
        window.cmEditor = cmEditor;

        cmEditor.on("keyup", function (cm, event) {
            if (!cm.state.completionActive && event.keyCode >= 65 && event.keyCode <= 90) {
                CodeMirror.commands.autocomplete(cm, null, {completeSingle: false});
            }
        });

        cmEditor.setValue("-- Welcome to SQL Sandbox\n-- Try clicking 'Mock' to generate tables\n\nSELECT * FROM Users;");

        initResizers();
        initCanvasPanZoom();
        centerCanvas();

        if (alasql('SHOW TABLES').length > 0) onDbChange();

        document.addEventListener('keydown', function(e) {
            if (e.altKey && e.key === 'Enter') { e.preventDefault(); window.runQuery(); }
        });
    }

    // ==========================================
    // ЛОГИКА РЕСАЙЗЕРОВ
    // ==========================================
    function initResizers() {
        const resizerX = document.getElementById('resizer-x');
        const resizerY = document.getElementById('resizer-y');
        const leftPanel = document.getElementById('left-panel');
        const editorPanel = document.getElementById('editor-panel');
        const overlay = document.createElement('div');
        overlay.className = "fixed inset-0 z-50 hidden cursor-move";
        document.body.appendChild(overlay);

        resizerX.addEventListener('mousedown', (e) => {
            isResizingX = true; resizerX.classList.add('active'); overlay.classList.remove('hidden'); overlay.style.cursor = 'col-resize';
        });

        resizerY.addEventListener('mousedown', (e) => {
            isResizingY = true; resizerY.classList.add('active'); overlay.classList.remove('hidden'); overlay.style.cursor = 'row-resize';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizingX && !isResizingY) return;

            if (isResizingX) {
                const newWidth = e.clientX - leftPanel.getBoundingClientRect().left;
                if (newWidth > 200 && newWidth < window.innerWidth - 200) {
                    leftPanel.style.width = `${newWidth}px`;
                }
            }
            if (isResizingY) {
                const newHeight = e.clientY - leftPanel.getBoundingClientRect().top;
                const totalHeight = leftPanel.getBoundingClientRect().height;
                if (newHeight > 100 && newHeight < totalHeight - 100) {
                    editorPanel.style.height = `${newHeight}px`;
                }
            }
        });

        document.addEventListener('mouseup', () => {
            if (isResizingX || isResizingY) {
                isResizingX = false; isResizingY = false;
                resizerX.classList.remove('active'); resizerY.classList.remove('active');
                overlay.classList.add('hidden');
                if(cmEditor) cmEditor.refresh(); // Фикс отрисовки CodeMirror
            }
        });
    }

    // ==========================================
    // ЛОГИКА CANVAS (УМНЫЙ ЗУМ И ПАН)
    // ==========================================
    function initCanvasPanZoom() {
        const wrapper = document.getElementById('right-panel');
        const inner = document.getElementById('canvas-inner');

        wrapper.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomSensitivity = 0.001;
            const delta = e.deltaY * -zoomSensitivity;
            let newScale = scale * (1 + delta);
            newScale = Math.min(Math.max(0.3, newScale), 3);

            // Умный зум к курсору
            const rect = wrapper.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            panX = mouseX - (mouseX - panX) * (newScale / scale);
            panY = mouseY - (mouseY - panY) * (newScale / scale);
            scale = newScale;
            updateCanvasTransform();
        });

        wrapper.addEventListener('mousedown', (e) => {
            // Игнорируем клик, если мы кликнули по карточке таблицы
            if (e.target.closest('.db-table-card') || e.button !== 0) return;
            isCanvasDragging = true;
            canvasStartX = e.clientX - panX;
            canvasStartY = e.clientY - panY;
            wrapper.style.cursor = 'grabbing';
        });

        window.addEventListener('mouseup', () => {
            isCanvasDragging = false;
            wrapper.style.cursor = 'grab';
            if (activeDragTable) activeDragTable = null; // Отпускаем карточку
        });

        window.addEventListener('mousemove', (e) => {
            if (isCanvasDragging) {
                panX = e.clientX - canvasStartX;
                panY = e.clientY - canvasStartY;
                updateCanvasTransform();
            } else if (activeDragTable) {
                // Двигаем карточку с учетом текущего зума (scale)
                const dx = (e.clientX - tableStartX) / scale;
                const dy = (e.clientY - tableStartY) / scale;
                const tableName = activeDragTable.getAttribute('data-table');

                tablePositions[tableName].x += dx;
                tablePositions[tableName].y += dy;

                activeDragTable.style.left = `${tablePositions[tableName].x}px`;
                activeDragTable.style.top = `${tablePositions[tableName].y}px`;

                tableStartX = e.clientX;
                tableStartY = e.clientY;
            }
        });
    }

    function updateCanvasTransform() {
        document.getElementById('canvas-inner').style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    }

    window.centerCanvas = function() {
        const wrapper = document.getElementById('right-panel');
        const rect = wrapper.getBoundingClientRect();
        scale = 1;
        panX = rect.width / 2; // Смещение в центр
        panY = rect.height / 4;
        updateCanvasTransform();
    }
    window.resetCanvas = centerCanvas;

    // ==========================================
    // РЕНДЕР СХЕМЫ БАЗЫ ДАННЫХ (СОЧНЫЕ КАРТОЧКИ)
    // ==========================================
    function renderSchemaCanvas() {
        const inner = document.getElementById('canvas-inner');
        inner.innerHTML = '';

        let tables =[];
        try { tables = alasql("SHOW TABLES"); } catch(e) {}

        if (tables.length === 0) {
            inner.innerHTML = `<div class="absolute text-theme-muted font-black uppercase tracking-widest text-2xl opacity-20" style="left:-100px; top: -20px;">No Tables</div>`;
            return;
        }

        tables.forEach((t, i) => {
            const tableName = t.tableid;

            // Если таблица новая, даем ей стартовые координаты каскадом
            if (!tablePositions[tableName]) {
                tablePositions[tableName] = { x: (i * 250) - 200, y: (i * 50) - 100 };
            }

            const card = document.createElement('div');
            card.className = "db-table-card shadow-2xl";
            card.setAttribute('data-table', tableName);
            card.style.left = `${tablePositions[tableName].x}px`;
            card.style.top = `${tablePositions[tableName].y}px`;

            // Хедер (За него таскаем)
            const header = document.createElement('div');
            header.className = "db-table-header";
            header.innerHTML = `<span>${tableName}</span> <span class="text-[10px] text-theme-muted font-normal">Table</span>`;

            header.addEventListener('mousedown', (e) => {
                e.stopPropagation(); // Не даем канвасу понять, что мы кликнули
                activeDragTable = card;
                tableStartX = e.clientX;
                tableStartY = e.clientY;
                // Выносим на передний план
                document.querySelectorAll('.db-table-card').forEach(c => c.style.zIndex = 10);
                card.style.zIndex = 20;
            });

            // Тело с колонками
            const body = document.createElement('div');
            body.className = "flex flex-col py-2";

            try {
                alasql(`SHOW COLUMNS FROM ${tableName}`).forEach(col => {
                    const row = document.createElement('div');
                    row.className = "db-table-row";

                    const isId = col.columnid.toLowerCase().includes('id');
                    const keyIcon = isId ? `<span class="text-yellow-500 mr-2 drop-shadow-md text-[10px]">🔑</span>` : `<span class="w-4 mr-2"></span>`;
                    const typeStr = col.type ? col.type.toUpperCase() : 'VARCHAR';

                    row.innerHTML = `
                        <div class="db-col-name font-bold tracking-tight">${keyIcon}${col.columnid}</div>
                        <div class="db-col-type font-black">${typeStr}</div>
                    `;
                    body.appendChild(row);
                });
            } catch(e) {}

            card.appendChild(header);
            card.appendChild(body);
            inner.appendChild(card);
        });
    }

    function updateDynamicAutocomplete() {
        try {
            const tables = alasql("SHOW TABLES");
            let hintData = {};
            tables.forEach(t => { hintData[t.tableid] = alasql(`SHOW COLUMNS FROM ${t.tableid}`).map(c => c.columnid); });
            if (cmEditor) cmEditor.setOption("hintOptions", { tables: hintData });
        } catch(e) {}
    }

    function onDbChange() {
        renderSchemaCanvas();
        updateDynamicAutocomplete();
    }

    // ==========================================
    // УПРАВЛЕНИЕ БД И ЗАПРОСЫ
    // ==========================================
    window.generateMockData = function() {
        const tText = window.t('confirm_mock') || "Create Mock Data?";
        if(!confirm(tText)) return;

        const queries =[
            "DROP TABLE IF EXISTS Users", "DROP TABLE IF EXISTS Products", "DROP TABLE IF EXISTS Orders",
            "CREATE TABLE Users (id INT, name STRING, country STRING)",
            "INSERT INTO Users VALUES (1, 'Admin', 'RU'), (2, 'Jakunya', 'RU'), (3, 'Guest', 'US')",
            "CREATE TABLE Products (id INT, title STRING, price INT)",
            "INSERT INTO Products VALUES (101, 'MacBook', 2500), (102, 'Iphone', 1000), (103, 'Coffee', 5)",
            "CREATE TABLE Orders (id INT, user_id INT, product_id INT, amount INT)",
            "INSERT INTO Orders VALUES (1, 1, 101, 1), (2, 2, 102, 2), (3, 2, 103, 5)"
        ];

        try {
            queries.forEach(q => alasql(q));
            onDbChange();
            if (cmEditor) cmEditor.setValue("SELECT Users.name, Products.title, Orders.amount \nFROM Orders \nJOIN Users ON Orders.user_id = Users.id\nJOIN Products ON Orders.product_id = Products.id;");
            window.runQuery();
            setTimeout(centerCanvas, 100);
        } catch(e) {}
    }

    window.clearDatabase = function() {
        const tText = window.t('confirm_clear') || "Clear Database?";
        if(confirm(tText)) {
            try {
                alasql('DROP DATABASE IF EXISTS main'); alasql('CREATE DATABASE main'); alasql('USE main');
                if (cmEditor) cmEditor.setValue("");
                lastResultData = null;
                tablePositions = {}; // Сброс сохраненных позиций
                onDbChange();

                document.getElementById('result-head').innerHTML = '';
                document.getElementById('result-body').innerHTML = '';
                document.getElementById('empty-state').classList.remove('hidden');
                document.getElementById('result-table').classList.add('hidden');
                document.getElementById('export-btn').classList.add('hidden');
                document.getElementById('status-msg').classList.add('hidden');
                document.getElementById('error-msg').classList.add('hidden');
            } catch(e) {}
        }
    }

    window.handleFileUpload = function(input) {
        const file = input.files[0];
        if (!file) return;
        const tableName = file.name.split('.')[0].replace(/[^a-zA-Z0-9]/g, "_");
        const reader = new FileReader();

        reader.onload = function(e) {
            const rows = e.target.result.split('\n').filter(r => r.trim()).map(row => row.split(','));
            if (rows.length < 2) return;
            const headers = rows[0].map(h => h.trim().replace(/['"]+/g, ''));
            try {
                alasql(`DROP TABLE IF EXISTS ${tableName}`);
                alasql(`CREATE TABLE ${tableName} (` + headers.map(h => `${h} STRING`).join(', ') + `)`);
                const data = rows.slice(1).map(row => {
                    let obj = {};
                    row.forEach((val, idx) => {
                        let v = val.trim().replace(/['"]+/g, '');
                        obj[headers[idx]] = isNaN(v) || v === '' ? v : Number(v);
                    });
                    return obj;
                });
                alasql(`INSERT INTO ${tableName} SELECT * FROM ?`, [data]);
                onDbChange();
                if (cmEditor) cmEditor.setValue(`SELECT * FROM ${tableName} LIMIT 100;`);
                window.runQuery();
            } catch(err) { alert("Import Error: " + err.message); }
        };
        reader.readAsText(file); input.value = '';
    }

    window.exportToCSV = function() {
        if (!lastResultData) return;
        try { alasql('SELECT * INTO CSV("sql_export.csv", {headers:true}) FROM ?',[lastResultData]); } catch(e) {}
    }

    window.runQuery = function() {
        if (!cmEditor) return;
        const sql = cmEditor.getValue();
        const status = document.getElementById('status-msg');
        const empty = document.getElementById('empty-state');
        const table = document.getElementById('result-table');
        const thead = document.getElementById('result-head');
        const tbody = document.getElementById('result-body');
        const exportBtn = document.getElementById('export-btn');
        const errorDiv = document.getElementById('error-msg');

        empty.classList.add('hidden'); errorDiv.classList.add('hidden'); table.classList.remove('hidden'); status.classList.remove('hidden');

        try {
            let result = alasql(sql);
            status.innerHTML = '<span class="text-green-500 bg-green-500/10 px-2 py-1 rounded font-bold">SUCCESS</span>';

            let dataToShow = Array.isArray(result) && result.length > 0 && Array.isArray(result[0]) ? result[result.length - 1] : result;

            if (Array.isArray(dataToShow) && dataToShow.length > 0 && typeof dataToShow[0] === 'object') {
                lastResultData = dataToShow; exportBtn.classList.remove('hidden');
            } else { lastResultData = null; exportBtn.classList.add('hidden'); }

            thead.innerHTML = ''; tbody.innerHTML = '';

            if (typeof dataToShow === 'number' || typeof dataToShow === 'string') {
                tbody.innerHTML = `<tr><td class="result-cell text-theme-muted">${dataToShow}</td></tr>`;
            } else if (Array.isArray(dataToShow) && dataToShow.length > 0) {
                Object.keys(dataToShow[0]).forEach(k => {
                    const th = document.createElement('th'); th.className = "result-head text-left"; th.innerText = k; thead.appendChild(th);
                });
                dataToShow.forEach(row => {
                    const tr = document.createElement('tr'); tr.className = "hover:bg-blue-500/5";
                    Object.values(row).forEach(v => {
                        const td = document.createElement('td');
                        let displayValue = v; let colorClass = "text-theme-muted";
                        if (v === null || v === undefined) { displayValue = "NULL"; colorClass = "text-red-500 italic font-bold"; }
                        else if (typeof v === 'number') colorClass = "text-blue-400 font-bold";
                        else if (typeof v === 'boolean') colorClass = "text-yellow-400 font-bold";
                        else if (typeof v === 'string') { displayValue = `'${v}'`; colorClass = "text-green-400"; }
                        td.className = `result-cell ${colorClass}`; td.innerText = displayValue; tr.appendChild(td);
                    });
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = `<tr><td class="result-cell italic text-theme-muted">Empty result set</td></tr>`;
            }

            const sqlUpper = sql.toUpperCase();
            if(sqlUpper.includes('CREATE') || sqlUpper.includes('DROP') || sqlUpper.includes('ALTER')) onDbChange();

        } catch (e) {
            status.innerHTML = '<span class="text-red-500 bg-red-500/10 px-2 py-1 rounded font-bold">ERROR</span>';
            errorDiv.innerText = e.message; errorDiv.classList.remove('hidden'); table.classList.add('hidden');
            exportBtn.classList.add('hidden');
        }
    };

    window.onTranslationsLoaded = function() { document.title = window.t('sandbox_title') || 'SQL Master - Sandbox'; };
    document.addEventListener('DOMContentLoaded', initPage);
</script>
