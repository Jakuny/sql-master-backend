<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Master - Course Map</title>

    <!-- Tailwind & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Libs -->
    <script src="https://cdn.jsdelivr.net/npm/alasql@1.7/dist/alasql.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/eclipse.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/sql/sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/sql-hint.min.js"></script>

    <link rel="stylesheet" href="/css/style.css">

    <style>
        :root {
            --bg-body: #050b14;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: rgba(15, 23, 42, 0.6);
            --card-border: rgba(51, 65, 85, 0.6);
            --nav-bg: rgba(5, 11, 20, 0.85);
            --nav-border: rgba(255, 255, 255, 0.05);
        }[data-theme="light"] {
             --bg-body: #f8fafc;
             --text-main: #0f172a;
             --text-muted: #475569;
             --card-bg: rgba(255, 255, 255, 0.9);
             --card-border: rgba(203, 213, 225, 1);
             --nav-bg: rgba(248, 250, 252, 0.9);
             --nav-border: rgba(0, 0, 0, 0.05);
         }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); transition: background-color 0.5s ease, color 0.5s ease; }
        .bg-theme-nav { background-color: var(--nav-bg); backdrop-filter: blur(16px); border-bottom: 1px solid var(--nav-border); }
        .text-theme-main { color: var(--text-main) !important; }
        .text-theme-muted { color: var(--text-muted) !important; }
        .bg-theme-card { background-color: var(--card-bg); border: 1px solid var(--card-border); backdrop-filter: blur(12px); }

        .gradient-text-lessons { background: linear-gradient(135deg, #a855f7, #ec4899, #f43f5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .loader { width: 40px; height: 40px; border: 3px solid rgba(168, 85, 247, 0.2); border-top-color: #a855f7; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* SPA Переходы (Исправлен отступ, теперь inset:0, а сам враппер отодвинут на 88px) */
        .view-section {
            position: absolute;
            inset: 0;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
            background-color: var(--bg-body);
            overflow: hidden;
        }
        .view-hidden { opacity: 0; transform: scale(0.98); pointer-events: none; z-index: 0; }
        .view-active { opacity: 1; transform: scale(1); pointer-events: auto; z-index: 10; }

        /* Duolingo-style 3D Buttons */
        .duo-btn { width: 86px; height: 86px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; transition: transform 0.1s, border-width 0.1s; position: relative; z-index: 10; }
        .duo-btn-locked { background: #334155; color: #64748b; border-bottom: 8px solid #1e293b; cursor: not-allowed; }
        .duo-btn-current { background: linear-gradient(180deg, #a855f7, #7e22ce); color: white; border-bottom: 8px solid #581c87; cursor: pointer; box-shadow: 0 0 30px rgba(168, 85, 247, 0.4); animation: floating 2.5s ease-in-out infinite; }
        .duo-btn-current:active { transform: translateY(8px); border-bottom-width: 0px; animation: none; }
        .duo-btn-completed { background: linear-gradient(180deg, #fbbf24, #d97706); color: white; border-bottom: 8px solid #b45309; cursor: pointer; box-shadow: 0 5px 15px rgba(245, 158, 11, 0.2); }
        .duo-btn-completed:active { transform: translateY(8px); border-bottom-width: 0px; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .crown-badge { position: absolute; top: -20px; right: -10px; background: #fcd34d; color: #b45309; font-size: 1rem; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 3px solid var(--bg-body); font-weight: 900; z-index: 20; }

        /* SCRAMBLE CHIPS */
        .scramble-container { min-height: 80px; display: flex; flex-wrap: wrap; align-content: flex-start; gap: 0.75rem; padding: 1rem; border-radius: 1rem; transition: all 0.3s; }
        .scramble-target { background: var(--nav-bg); border: 2px dashed var(--card-border); }
        .scramble-target.error { border-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
        .scramble-source { border: 2px solid transparent; }

        .word-chip {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 0.75rem 1.25rem;
            border-radius: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            user-select: none;
            will-change: transform; /* Подготовка для плавной анимации */
            box-shadow: 0 4px 0 var(--card-border);
            /* Убираем обычный транзишн, он будет назначаться через JS */
        }
        .word-chip:hover { transform: translateY(-2px); border-color: #a855f7; box-shadow: 0 6px 0 #a855f7; color: #a855f7; }
        .word-chip:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
        .word-chip.in-target { background: linear-gradient(180deg, #a855f7, #7e22ce); color: white; border-color: #581c87; box-shadow: 0 4px 0 #581c87; }
        .word-chip.in-target:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #581c87; filter: brightness(1.1); }
        .word-chip.in-target:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }

        /* Theory Markdown styling */
        .prose h1 { font-size: 2rem; font-weight: 900; margin-bottom: 1rem; color: var(--text-main); }
        .prose p { margin-bottom: 1rem; color: var(--text-muted); line-height: 1.7; }
        .prose pre { background: var(--bg-body); padding: 1rem; border-radius: 0.5rem; font-family: 'JetBrains Mono', monospace; margin-bottom: 1rem; border: 1px solid var(--card-border); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background-color: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; border: 2px solid var(--bg-body); }[data-theme="light"] ::-webkit-scrollbar-thumb { background-color: #cbd5e1; }

        .result-cell { border-bottom: 1px solid var(--card-border); padding: 0.5rem 1rem; font-size: 0.75rem; font-family: 'JetBrains Mono', monospace; }
        .result-head { border-bottom: 1px solid var(--card-border); padding: 0.75rem 1rem; color: #3b82f6; font-size: 0.625rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden selection:bg-purple-500/30">

<!-- ХЕДЕР -->
<header id="main-header" class="fixed top-0 w-full bg-theme-nav z-50 transition-colors duration-500 border-b border-theme"></header>

<!-- ИСПРАВЛЕНИЕ: Отступ ровно на высоту хедера (88px) -->
<div class="w-full relative overflow-hidden app-bg" style="height: calc(100vh - 88px); margin-top: 88px;">

    <!-- ============================================== -->
    <!-- ЭКРАН 1: КАРТА УРОКОВ (DUOLINGO PATH)          -->
    <!-- ============================================== -->
    <div id="map-view" class="view-section view-active overflow-y-auto custom-scrollbar">
        <div class="absolute top-[10%] left-1/2 -translate-x-1/2 w-[800px] h-[600px] bg-gradient-to-b from-purple-600/10 to-pink-600/10 rounded-full blur-[120px] pointer-events-none z-0"></div>

        <div class="max-w-4xl mx-auto py-16 px-4 relative z-10 flex flex-col items-center">
            <div class="text-center mb-20 animate-fade-up">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-purple-500/10 border border-purple-500/20 rounded-3xl mb-6 shadow-[0_0_30px_rgba(168,85,247,0.2)] transform -rotate-3">
                    <span class="text-3xl">🗺️</span>
                </div>
                <h1 class="text-5xl md:text-7xl font-black uppercase tracking-tight mb-4">
                    <span class="gradient-text-lessons" data-i18n="lessons_header">Course Map</span>
                </h1>
                <p class="text-theme-muted font-medium text-lg max-w-xl mx-auto" data-i18n="lessons_desc">Follow the path to master SQL. Complete lessons to unlock the next levels.</p>
            </div>

            <div id="lessons-loader" class="flex flex-col items-center justify-center py-10 gap-4">
                <div class="loader !w-12 !h-12 !border-4"></div>
                <span class="text-sm font-bold text-theme-muted uppercase tracking-widest animate-pulse" data-i18n="loading_path">Loading Path...</span>
            </div>

            <div id="path-container" class="relative flex flex-col items-center w-full max-w-md hidden pb-32"></div>
        </div>
    </div>

    <!-- ============================================== -->
    <!-- ЭКРАН 2: ТЕОРИЯ УРОКА                          -->
    <!-- ============================================== -->
    <div id="theory-view" class="view-section view-hidden flex flex-col">
        <div class="bg-theme-nav border-b border-theme px-6 py-4 flex items-center justify-between z-20">
            <button onclick="switchView('map-view')" class="flex items-center gap-2 px-4 py-2 bg-theme-card hover:bg-slate-800 text-theme-muted hover:text-white rounded-xl font-bold transition text-xs uppercase tracking-widest border border-theme">
                ← <span data-i18n="btn_back">Back</span>
            </button>
            <div class="text-yellow-500 font-bold text-sm bg-yellow-500/10 px-4 py-1.5 rounded-xl border border-yellow-500/20 flex items-center gap-1 shadow-sm">
                <span>+</span><span id="theory-xp">0</span> <span>XP</span>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-8 md:p-16 flex justify-center relative">
            <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-blue-500/5 rounded-full blur-[100px] pointer-events-none"></div>

            <div class="max-w-3xl w-full relative z-10">
                <div class="w-16 h-1.5 bg-gradient-to-r from-purple-500 to-blue-500 rounded-full mb-8"></div>
                <h2 class="text-4xl md:text-5xl font-black text-theme-main mb-8 tracking-tight" id="theory-title">...</h2>
                <div id="theory-content" class="prose max-w-none text-lg mb-20">
                    <!-- HTML контент из БД -->
                </div>
            </div>
        </div>

        <div class="p-6 border-t border-theme bg-theme-nav flex justify-center z-20 shadow-[0_-10px_30px_rgba(0,0,0,0.2)]">
            <button onclick="startPractice()" class="group px-12 py-4 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white rounded-2xl font-black uppercase tracking-widest text-sm shadow-xl shadow-purple-900/30 transition-all transform hover:-translate-y-1 flex items-center gap-3 active:scale-95">
                <span data-i18n="btn_start_practice">Start Practice</span>
                <svg class="w-5 h-5 group-hover:translate-x-1 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </div>
    </div>

    <!-- ============================================== -->
    <!-- ЭКРАН 3: ПРАКТИКА (ЗАДАЧИ)                     -->
    <!-- ============================================== -->
    <div id="practice-view" class="view-section view-hidden flex flex-col h-full">

        <!-- Прогресс бар -->
        <div class="bg-theme-nav border-b border-theme px-6 py-4 flex items-center gap-6 z-20">
            <button onclick="switchView('theory-view')" class="text-theme-muted hover:text-white transition p-2 rounded-xl hover:bg-white/5" title="Back to Theory">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </button>
            <div class="flex-1 h-3 bg-slate-800 rounded-full overflow-hidden border border-slate-700/50 shadow-inner">
                <div id="lesson-progress-bar" class="h-full bg-gradient-to-r from-purple-500 to-blue-500 transition-all duration-500 w-0 relative">
                    <div class="absolute top-0 right-0 bottom-0 left-0 bg-white/20" style="animation: shimmer 2s infinite linear;"></div>
                </div>
            </div>
            <div class="text-xs font-black text-theme-muted w-12 text-right tracking-widest"><span id="task-num">1</span>/<span id="task-total">3</span></div>
        </div>

        <div class="flex flex-1 overflow-hidden relative z-10">

            <!-- Левая колонка -->
            <div class="flex-1 flex flex-col min-w-0 border-r border-theme relative">

                <!-- Режим SQL -->
                <div id="mode-sql" class="flex flex-col h-1/2 relative border-b border-theme shadow-sm hidden">
                    <div class="bg-theme-card px-6 py-2 flex justify-between items-center z-10">
                        <span class="text-[10px] font-black text-theme-muted uppercase tracking-widest">SQL Input</span>
                        <span class="text-[10px] text-theme-muted font-mono px-2 bg-slate-800/50 rounded border border-slate-700">Alt + Enter</span>
                    </div>
                    <div class="flex-1 relative overflow-hidden" style="background-color: var(--bg-editor);">
                        <textarea id="editor" class="w-full h-full"></textarea>
                    </div>
                </div>

                <!-- Режим SCRAMBLE -->
                <div id="mode-scramble" class="flex-col h-1/2 p-6 md:p-10 justify-center items-center relative border-b border-theme bg-theme-card hidden overflow-y-auto">
                    <div class="w-full max-w-2xl mx-auto flex flex-col h-full justify-center">
                        <p class="text-[10px] font-black text-theme-muted uppercase tracking-widest mb-3" data-i18n="lbl_your_answer">Your Answer:</p>
                        <div id="scramble-target" class="scramble-container scramble-target shadow-inner mb-8 relative">
                            <!-- Сюда прилетают чипсы -->
                        </div>

                        <p class="text-[10px] font-black text-theme-muted uppercase tracking-widest mb-3" data-i18n="lbl_available_words">Available Words:</p>
                        <div id="scramble-source" class="scramble-container scramble-source relative">
                            <!-- Исходные чипсы -->
                        </div>
                    </div>
                </div>

                <!-- Результат -->
                <div class="h-1/2 flex flex-col relative app-bg">
                    <div class="bg-theme-card px-6 py-3 flex justify-between items-center z-10 border-b border-theme">
                        <span class="text-[10px] font-black text-theme-muted uppercase tracking-widest" data-i18n="lbl_result">Output</span>
                        <span id="status-msg" class="text-[10px] font-black uppercase tracking-wider px-3 py-1 rounded-md hidden transition-all"></span>
                    </div>

                    <div class="flex-1 overflow-auto custom-scrollbar p-0 relative">
                        <table class="w-full text-left whitespace-nowrap hidden" id="result-table">
                            <thead class="bg-theme-card sticky top-0 z-10 shadow-sm"><tr id="result-head"></tr></thead>
                            <tbody id="result-body" class="divide-y border-theme"></tbody>
                        </table>
                        <div id="error-msg" class="hidden m-6 p-4 text-red-500 bg-red-500/10 border border-red-500/20 rounded-xl text-xs font-mono shadow-inner leading-relaxed"></div>
                        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-theme-muted select-none opacity-40">
                            <div class="text-6xl mb-4">⌨️</div>
                            <div class="text-[10px] font-black uppercase tracking-widest" data-i18n="lbl_ready">Ready to execute</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Правая колонка (Описание) -->
            <aside class="w-96 bg-theme-card flex flex-col overflow-y-auto custom-scrollbar relative z-10">
                <div class="p-8 flex-1 flex flex-col">
                    <div class="flex justify-between items-center mb-6">
                        <span id="task-badge" class="px-3 py-1.5 bg-blue-500/10 text-blue-400 rounded-xl text-[10px] font-black uppercase tracking-widest border border-blue-500/20 shadow-sm">SQL</span>
                    </div>
                    <h2 class="text-2xl font-black text-theme-main mb-4 leading-snug" id="task-title">...</h2>
                    <div id="task-desc" class="text-sm text-theme-muted leading-relaxed font-medium mb-8"></div>

                    <!-- Схема БД -->
                    <div id="schema-block" class="mb-8 hidden">
                        <h3 class="text-[10px] font-black text-theme-muted uppercase tracking-widest mb-3" data-i18n="sand_struct">DATABASE SCHEMA</h3>
                        <div id="schema-container" class="space-y-3"></div>
                    </div>

                    <!-- Панель кнопок -->
                    <div class="mt-auto pt-8 border-t border-theme flex justify-end">
                        <button id="btn-check" onclick="checkAnswer()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-xs transition shadow-lg shadow-blue-900/20 active:scale-95">
                            <span data-i18n="btn_check">CHECK</span>
                        </button>
                        <button id="btn-next" onclick="nextTask()" class="hidden w-full bg-green-500 hover:bg-green-400 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-xs transition shadow-lg shadow-green-900/20 active:scale-95 flex justify-center items-center gap-2">
                            <span data-i18n="btn_next">NEXT</span> →
                        </button>
                    </div>
                </div>
            </aside>
        </div>
    </div>
</div>

<!-- ============================================== -->
<!-- МОДАЛКА УСПЕХА (УРОК ПРОЙДЕН)                  -->
<!-- ============================================== -->
<div id="lesson-finish-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-md transition-opacity duration-300 opacity-0" onclick="closeModal('lesson-finish-modal')">
    <div class="bg-theme-card border border-purple-500/30 p-10 rounded-[2.5rem] text-center max-w-sm w-full transform scale-95 transition-transform duration-300 shadow-2xl relative overflow-hidden" onclick="event.stopPropagation()">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-purple-500 to-pink-500"></div>
        <div class="absolute top-0 right-0 w-32 h-32 bg-purple-500/10 rounded-full blur-3xl pointer-events-none"></div>

        <div class="text-7xl mb-6 animate-bounce drop-shadow-lg">🏆</div>
        <h3 class="text-3xl font-black text-theme-main mb-2 uppercase tracking-tight" data-i18n="msg_lesson_passed">LESSON PASSED!</h3>
        <p class="text-theme-muted text-sm mb-8 font-medium">
            <span data-i18n="msg_earned">Earned</span>
            <span class="text-yellow-400 font-bold text-lg mx-1" id="total-xp-earned">0</span>
            XP
        </p>

        <button onclick="switchView('map-view'); closeModal('lesson-finish-modal'); loadPath();" class="w-full bg-slate-800 hover:bg-slate-700 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-xs transition border border-slate-700 shadow-lg shadow-black/20 active:scale-95">
            <span data-i18n="btn_back_to_map">Back to Map</span>
        </button>
    </div>
</div>

<!-- Скрипты -->
<script src="/js/i18n.js"></script>
<script type="module">
    import { fetchWithAuth, logout } from '/js/api.js';
    import { renderHeader } from '/js/components/header.js';
    window.logout = logout;

    const correctSound = new Audio('/sounds/correct_sound.mp3');
    correctSound.volume = 0.5;

    let cmEditor;
    let currentLesson = null;
    let currentTasks =[];
    let currentTaskIndex = 0;

    // ==========================================
    // ДЕМО-ДАННЫЕ
    // ==========================================
    const MOCK_LESSONS =[
        { id: 1, title: "SQL Basics", xpReward: 100, completed: true },
        { id: 2, title: "Filtering Data", xpReward: 150, completed: false }
    ];

    const MOCK_LESSON_DETAILS = {
        1: {
            id: 1, title: "Lesson 1: Select Basics", seasonXp: 100, orderIndex: 1, content: "<h1>Hello!</h1><p>Today we learn SELECT...</p>",
            taskDetailDtos:[
                { id: 2, title: "Practice 1", description: "Select all users", difficulty: "EASY", initScript: "CREATE TABLE users (id INT, name VARCHAR(50)); INSERT INTO users VALUES (1, 'Alex');", scrambleWords: null, xpReward: 0, checkSql: "SELECT * FROM users;" },
                { id: 3, title: "Puzzle Time", description: "Build the correct query", difficulty: "EASY", initScript: null, scrambleWords:["WHERE", "id", "1", "SELECT", "*", "=", "FROM", "users"], xpReward: 0, checkSql: "SELECT * FROM users WHERE id = 1" }
            ]
        }
    };

    async function initPage() {
        const savedTheme = localStorage.getItem('sql_theme') || 'dark';
        document.body.setAttribute('data-theme', savedTheme);

        let authData = { isLoggedIn: false };
        if (localStorage.getItem('sql_token')) {
            try {
                const response = await fetchWithAuth('/api/v1/profiles/me');
                if (response.ok) {
                    const profile = await response.json();
                    authData = { isLoggedIn: true, ...profile };
                }
            } catch (e) {}
        }

        renderHeader(authData);
        if (window.initTranslations) await window.initTranslations();

        const theme = savedTheme === 'light' ? 'eclipse' : 'dracula';
        cmEditor = CodeMirror.fromTextArea(document.getElementById("editor"), {
            mode: "text/x-sql", theme: theme, lineNumbers: true, smartIndent: true,
            extraKeys: { "Alt-Enter": function() { window.checkAnswer(); } }
        });
        window.cmEditor = cmEditor;

        // Автокомплит для редактора
        cmEditor.on("keyup", (cm, event) => {
            if (!cm.state.completionActive && event.keyCode >= 65 && event.keyCode <= 90) {
                CodeMirror.commands.autocomplete(cm, null, {completeSingle: false});
            }
        });

        await loadPath();

        // Глобальный перехват Alt+Enter
        document.addEventListener('keydown', function(e) {
            if (e.altKey && e.key === 'Enter') {
                const view = document.getElementById('practice-view');
                if (view && view.classList.contains('view-active')) {
                    e.preventDefault();
                    window.checkAnswer();
                }
            }
        });
    }

    // ==========================================
    // ЛОГИКА НАВИГАЦИИ ПО ЭКРАНАМ
    // ==========================================
    window.switchView = function(viewId) {
        ['map-view', 'theory-view', 'practice-view'].forEach(id => {
            const el = document.getElementById(id);
            if (id === viewId) {
                el.classList.remove('hidden');
                setTimeout(() => { el.classList.remove('view-hidden'); el.classList.add('view-active'); }, 10);
            } else {
                el.classList.remove('view-active');
                el.classList.add('view-hidden');
                setTimeout(() => el.classList.add('hidden'), 400);
            }
        });
    };

    // ==========================================
    // ЭКРАН 1: КАРТА УРОКОВ
    // ==========================================
    window.loadPath = async function() {
        const container = document.getElementById('path-container');
        const loader = document.getElementById('lessons-loader');
        let lessons =[];

        try {
            const response = await fetchWithAuth('/api/v1/lessons');
            if (!response.ok) throw new Error("Failed");
            lessons = await response.json();
        } catch (e) { lessons = MOCK_LESSONS; }

        container.innerHTML = '';
        const offsets =['-translate-x-16', '-translate-x-6', 'translate-x-6', 'translate-x-16', 'translate-x-6', '-translate-x-6'];

        lessons.forEach((lesson, idx) => {
            const prevCompleted = idx === 0 || lessons[idx - 1].completed;
            const isLocked = !lesson.completed && !prevCompleted;

            let btnClass = "duo-btn "; let icon = ""; let crown = "";
            if (lesson.completed) { btnClass += "duo-btn-completed"; icon = "★"; crown = `<div class="crown-badge shadow-md">👑</div>`; }
            else if (!isLocked) { btnClass += "duo-btn-current"; icon = "▶"; }
            else { btnClass += "duo-btn-locked"; icon = "🔒"; }

            const node = document.createElement('div');
            node.className = `relative flex flex-col items-center mb-10 w-full animate-fade-up`;
            node.style.animationDelay = `${idx * 100}ms`;
            node.innerHTML = `
                <div class="flex flex-col items-center ${offsets[idx % offsets.length]} relative z-10">
                    <div class="mb-3 px-4 py-2 bg-theme-card border border-theme rounded-xl text-[10px] font-black uppercase text-theme-main shadow-lg z-20 whitespace-nowrap relative">
                        ${lesson.title}
                        <div class="absolute -bottom-1.5 left-1/2 -ml-1.5 w-3 h-3 bg-theme-card border-b border-r border-theme transform rotate-45"></div>
                    </div>
                    <button class="${btnClass}" ${isLocked ? 'disabled' : ''}>${crown}<span class="drop-shadow-md">${icon}</span></button>
                </div>
            `;
            if (!isLocked) node.querySelector('button').onclick = () => openLesson(lesson.id);
            container.appendChild(node);
        });

        loader.classList.add('hidden');
        container.classList.remove('hidden');
    }

    // ==========================================
    // ЭКРАН 2: ТЕОРИЯ
    // ==========================================
    window.openLesson = async function(id) {
        try {
            let data;
            try {
                const res = await fetchWithAuth(`/api/v1/lessons/${id}`);
                if (!res.ok) throw new Error();
                data = await res.json();
            } catch(e) {
                data = MOCK_LESSON_DETAILS[id] || MOCK_LESSON_DETAILS[1];
            }

            currentLesson = data;
            currentTasks = data.taskDetailDtos ||[];

            document.getElementById('theory-title').innerText = data.title;
            document.getElementById('theory-xp').innerText = data.seasonXp || 0;
            document.getElementById('theory-content').innerHTML = data.content;

            switchView('theory-view');
        } catch (e) { console.error(e); }
    };

    window.startPractice = function() {
        if (currentTasks.length === 0) return alert("No tasks in this lesson!");
        switchView('practice-view');
        setTimeout(() => { if (cmEditor) cmEditor.refresh(); }, 50);
        loadTask(0);
    };

    // ==========================================
    // ЭКРАН 3: ПРАКТИКА (Задачи)
    // ==========================================
    function loadTask(index) {
        currentTaskIndex = index;
        const task = currentTasks[index];

        // Умное определение SCRAMBLE
        const isScramble = task.scrambleWords && Array.isArray(task.scrambleWords) && task.scrambleWords.length > 0;
        const taskType = isScramble ? 'SCRAMBLE' : 'SQL';

        document.getElementById('lesson-progress-bar').style.width = `${(index / currentTasks.length) * 100}%`;
        document.getElementById('task-num').innerText = index + 1;
        document.getElementById('task-total').innerText = currentTasks.length;
        document.getElementById('task-title').innerText = task.title;
        document.getElementById('task-desc').innerHTML = task.description || "";
        document.getElementById('task-badge').innerText = taskType;

        document.getElementById('btn-check').classList.remove('hidden');
        document.getElementById('btn-check').disabled = false;
        document.getElementById('btn-next').classList.add('hidden');
        document.getElementById('status-msg').classList.add('hidden');
        document.getElementById('empty-state').classList.remove('hidden');
        document.getElementById('result-table').classList.add('hidden');
        document.getElementById('error-msg').classList.add('hidden');

        alasql('DROP DATABASE IF EXISTS lesson_db');
        alasql('CREATE DATABASE lesson_db');
        alasql('USE lesson_db');
        if (task.initScript) {
            try { task.initScript.split(';').filter(s => s.trim().length > 0).forEach(sql => alasql(sql)); } catch(e){}
        }
        renderSchema();

        if (taskType === 'SCRAMBLE') {
            document.getElementById('mode-sql').classList.add('hidden');
            document.getElementById('mode-sql').classList.remove('flex');
            document.getElementById('mode-scramble').classList.remove('hidden');
            document.getElementById('mode-scramble').classList.add('flex');
            initScrambleMode(task);
        } else {
            document.getElementById('mode-scramble').classList.add('hidden');
            document.getElementById('mode-scramble').classList.remove('flex');
            document.getElementById('mode-sql').classList.remove('hidden');
            document.getElementById('mode-sql').classList.add('flex');
            cmEditor.setValue(task.defaultCode || "");
            setTimeout(() => cmEditor.refresh(), 50);
        }
    }

    // --- МАГИЯ FLIP АНИМАЦИИ ДЛЯ SCRAMBLE ---
    function initScrambleMode(task) {
        const sourceDiv = document.getElementById('scramble-source');
        const targetDiv = document.getElementById('scramble-target');

        sourceDiv.innerHTML = '';
        targetDiv.innerHTML = '';
        targetDiv.classList.remove('error');

        let words = task.scrambleWords;
        // Перемешиваем
        words = [...words].sort(() => Math.random() - 0.5);

        words.forEach(word => {
            const btn = document.createElement('div');
            // Убираем дефолтные CSS транзишены, они будут применяться через JS
            btn.className = "word-chip";
            btn.innerText = word;
            btn.style.transition = 'none';

            btn.onclick = function() {
                const isTarget = this.parentElement === targetDiv;
                moveChipWithAnimation(this, !isTarget);
            };
            sourceDiv.appendChild(btn);
        });
    }

    function moveChipWithAnimation(chip, toTarget) {
        // 1. Получаем стартовые координаты
        const startRect = chip.getBoundingClientRect();

        const targetDiv = document.getElementById('scramble-target');
        const sourceDiv = document.getElementById('scramble-source');
        const dest = toTarget ? targetDiv : sourceDiv;

        // 2. Добавляем классы и перекидываем элемент в DOM
        if (toTarget) {
            chip.classList.add('in-target');
        } else {
            chip.classList.remove('in-target');
        }
        dest.appendChild(chip);

        // 3. Получаем новые координаты
        const endRect = chip.getBoundingClientRect();

        // 4. Вычисляем дельту
        const dx = startRect.left - endRect.left;
        const dy = startRect.top - endRect.top;

        // 5. Invert: Мгновенно возвращаем чипс визуально на старое место (без анимации)
        chip.style.transition = 'none';
        chip.style.transform = `translate(${dx}px, ${dy}px)`;

        // 6. Play: Даем браузеру отрисовать кадр и запускаем плавный полет к новым координатам
        requestAnimationFrame(() => {
            // Форсируем reflow
            chip.offsetHeight;
            // Включаем сочную анимацию кубик безье (эффект упругости)
            chip.style.transition = 'transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.2s, color 0.2s, border-color 0.2s, box-shadow 0.2s';
            // Обнуляем трансформацию - чипс летит на свое новое физическое место
            chip.style.transform = 'translate(0, 0)';
        });
    }

    // --- ПРОВЕРКА ОТВЕТА ---
    window.checkAnswer = async function() {
        const task = currentTasks[currentTaskIndex];
        const btn = document.getElementById('btn-check');
        const status = document.getElementById('status-msg');

        const isScramble = task.scrambleWords && Array.isArray(task.scrambleWords) && task.scrambleWords.length > 0;
        const taskType = isScramble ? 'SCRAMBLE' : 'SQL';

        let userQuery = "";
        if (taskType === 'SCRAMBLE') {
            // Считываем текст прямо из DOM
            userQuery = Array.from(document.getElementById('scramble-target').children).map(c => c.innerText).join(' ');
        } else {
            userQuery = cmEditor.getValue();
        }

        btn.disabled = true;

        if (taskType !== 'SCRAMBLE') {
            const table = document.getElementById('result-table'), tbody = document.getElementById('result-body'), thead = document.getElementById('result-head'), errorDiv = document.getElementById('error-msg'), emptyState = document.getElementById('empty-state');
            emptyState.classList.add('hidden'); errorDiv.classList.add('hidden'); table.classList.remove('hidden'); status.classList.remove('hidden');

            try {
                const localRes = alasql(userQuery);
                thead.innerHTML = ''; tbody.innerHTML = '';
                if(Array.isArray(localRes) && localRes.length > 0) {
                    Object.keys(localRes[0]).forEach(k => { const th = document.createElement('th'); th.className="result-head text-left"; th.innerText=k; thead.appendChild(th); });
                    localRes.forEach(row => {
                        const tr = document.createElement('tr'); tr.className="hover:bg-blue-500/5";
                        Object.values(row).forEach(v => {
                            const td = document.createElement('td');
                            let displayValue = v; let colorClass = "text-theme-muted";
                            if (v === null || v === undefined) { displayValue = "NULL"; colorClass = "text-red-500 italic font-bold"; }
                            else if (typeof v === 'number') colorClass = "text-blue-400 font-bold";
                            else if (typeof v === 'boolean') colorClass = "text-yellow-400 font-bold";
                            else if (typeof v === 'string') { displayValue = `'${v}'`; colorClass = "text-green-400"; }
                            td.className=`result-cell ${colorClass}`; td.innerText=displayValue; tr.appendChild(td);
                        });
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = `<tr><td class="result-cell p-4 italic text-theme-muted">Empty result set</td></tr>`;
                }
            } catch(e) {
                status.innerHTML = `<span class="text-red-500 bg-red-500/10 px-2 py-1 rounded font-bold">SYNTAX ERROR</span>`;
                errorDiv.innerText = e.message; errorDiv.classList.remove('hidden'); table.classList.add('hidden');
                btn.disabled = false;
                return;
            }
        }

        try {
            let isCorrect = false;
            try {
                const res = await fetchWithAuth(`/api/v1/tasks/${task.id}`, { method: 'POST', body: userQuery, headers: { 'Content-Type': 'text/plain' } });
                isCorrect = (await res.text()).includes("result:true");
            } catch(err) {
                if (task.checkSql) {
                    if (taskType === 'SCRAMBLE') {
                        isCorrect = userQuery.trim().toLowerCase() === task.checkSql.trim().toLowerCase();
                    } else {
                        isCorrect = JSON.stringify(alasql(userQuery)) === JSON.stringify(alasql(task.checkSql));
                    }
                }
            }

            status.classList.remove('hidden');
            if (isCorrect) {
                status.innerHTML = `<span class="text-green-500 bg-green-500/10 px-2 py-1 rounded font-bold">CORRECT</span>`;
                try { correctSound.currentTime=0; correctSound.play().catch(()=>{}); confetti({ particleCount: 50, spread: 50, origin: { y: 0.8 } }); } catch(e){}
                btn.classList.add('hidden'); document.getElementById('btn-next').classList.remove('hidden');
            } else {
                status.innerHTML = `<span class="text-red-500 bg-red-500/10 px-2 py-1 rounded font-bold">WRONG</span>`;
                btn.disabled = false;
                if (taskType === 'SCRAMBLE') {
                    const tgt = document.getElementById('scramble-target');
                    tgt.classList.add('error'); setTimeout(() => tgt.classList.remove('error'), 400);
                }
            }
        } catch (e) { btn.disabled = false; }
    };

    window.nextTask = async function() {
        if (currentTaskIndex < currentTasks.length - 1) {
            loadTask(currentTaskIndex + 1);
        } else {
            document.getElementById('lesson-progress-bar').style.width = `100%`;
            try {
                const res = await fetchWithAuth(`/api/v1/lessons/${currentLesson.id}/complete`, { method: 'POST' });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('total-xp-earned').innerText = data.xpEarned || currentLesson.seasonXp;
                }
            } catch(e) { document.getElementById('total-xp-earned').innerText = currentLesson.seasonXp || 0; }

            showModal('lesson-finish-modal');
            try { confetti({ particleCount: 300, spread: 120, origin: { y: 0.5 } }); } catch(e){}
        }
    };

    function renderSchema() {
        const container = document.getElementById('schema-container');
        const block = document.getElementById('schema-block');
        container.innerHTML = '';
        try {
            const tables = alasql("SHOW TABLES");
            if(tables.length > 0) {
                block.classList.remove('hidden');
                tables.forEach(t => {
                    let html = `<div class="bg-theme-nav border border-theme p-3 rounded-xl shadow-sm"><div class="text-[10px] font-black text-blue-500 mb-2 uppercase tracking-widest">▤ ${t.tableid}</div><ul class="space-y-1">`;
                    alasql(`SHOW COLUMNS FROM ${t.tableid}`).forEach(c => { html += `<li class="flex justify-between text-[10px] font-mono border-b border-theme pb-1 last:border-0"><span class="text-theme-main font-bold">${c.columnid}</span><span class="text-theme-muted">${c.type||'INT'}</span></li>`; });
                    container.innerHTML += html + "</ul></div>";
                });
            } else block.classList.add('hidden');
        } catch(e) {}
    }

    window.showModal = (id) => {
        const el = document.getElementById(id); el.classList.remove('hidden');
        setTimeout(() => { el.classList.remove('opacity-0'); el.querySelector('div').classList.remove('scale-95'); }, 10);
    };

    window.closeModal = (id) => {
        const el = document.getElementById(id); el.classList.add('opacity-0'); el.querySelector('div').classList.add('scale-95');
        setTimeout(() => el.classList.add('hidden'), 300);
    };

    window.onTranslationsLoaded = function() {
        document.title = window.t('lessons_page_title') || 'SQL Master - Course Map';
    };

    document.addEventListener('DOMContentLoaded', initPage);
</script>
